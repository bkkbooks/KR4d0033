front:
  text: 雪竇和尚拈古
  hash: sha256:b69c0e789390c06a418c8b44962e8c7004de14f586be7b18aaa5ab7dc5268f25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0033_SBCK_001-1a}
body:
  text: 參學小師允誠思恭集序至像不形無以應群動圎音非扣無以發異聞苟稱謂之迹遽明必佛祖之機曠達師自壬申歳入夏抵秋旦暮拈提抑􅀭今古可一百餘則實不請之友者也崇崇之山浩浩之海分嶮列濬愧我不知其極但集而流諸凡著序文仰俟來哲師舉德山示衆云今夜不荅話問話者三十棒時有僧出禮拜山便打僧云某甲話也未問山云爾是甚處人云新羅人山云未踏船舷好與三十棒法眼拈云大小德山話作兩橛圎明道大小德山龍頭蛇尾師云二老宿雖善裁長補短舎重從輕要見德山亦未可何故德山大似握閫外威權有當斷不斷不招其亂底劒諸人要識新羅僧麽只是撞著露拄底箇瞎漢舉雪峯一日普請自􅀒一束藤路逢一僧峯便抛下僧方擬取峯便踏倒歸舉似長生乃云我今日踏者僧快生云和尚替這僧入􅄺槃堂始得峯便休去師云長生大似東家人死西家􅂇哀也好與一踏舉百丈再參馬祖侍立次祖以目視禪牀角頭拂子丈云即此用離此用祖云爾他後開兩片皮將何爲人丈取拂子豎起祖云即此用離此用丈挂拂子於舊處祖便喝百丈直得三日耳聾師云竒怪諸禪德如今列其􅂀者甚多究其源者極少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差􅀂是明眼漢瞞他一􅀧不得只如馬祖道爾他後開兩片皮將何爲人百丈豎起拂子爲復如蟲禦木爲復啐啄同時諸人要㑹三日耳聾麽大冶精金應無變色舉崇壽指凳子云識得凳子周匝有餘雲門云識得凳子天地懸殊師云澤廣藏山理能伏豹舉永嘉大師到六祖遶禪牀三匝振錫一下卓然而立祖云夫沙門具三千威儀八萬細行大德從何方而來生大我慢師便喝乃云當時􅀂下得者一喝免見龍頭蛇尾又再舉遶禪牀三匝振錫一下卓然而立代祖師云未到曹溪與爾三十棒了也舉仰山指雪師子云還有過得此色者麽雲門云當時便與推倒師云只解推倒不能扶起舉香嚴垂語云如人上樹口㘅樹枝手不攀枝脚不踏樹樹下有人問西來意不對則違他所問􅀂對又喪身失命當恁時作麽生即是有虎頭上座云上樹即不問未上樹請和尚道嚴呵呵大􅀏師云樹上道即易樹下道即難老僧上樹也致將一問來舉僧問魯祖如何是不言言祖云爾口在什麽處僧云某甲無口祖云將什麽喫飯僧無語師云好劈脊便棒者般漢開口了合不得合口了開不得舉僧問雪峯古㵎寒泉時如何峯云瞪目不見底僧云飲者如何峯云不從口入僧舉到趙州州云不可從鼻孔裏入僧却問趙州古㵎寒泉時如何州云苦云飲者如何州云死雪峯聞舉云趙州古佛從此不荅話師云衆中㹅道雪峯不出者僧問頭所以趙州不肯如斯話會深屈古人雪竇即不然斬釘截鐵本分宗師就下平髙難爲作者舉僧問西堂和尚有問有荅賔主歷然無問無荅時如何堂云怕爛却去那僧問長慶有問有荅賔主歷然無問無荅時如何慶云相逢盡道休官去林下何曾見一人師云何不與本分草料舉林際示衆云我於先師處三度喫六十棒如蒿枝子拂相似如今思一頓棒喫誰爲下手僧出衆云某甲下手際拈棒與僧僧擬接際便打師云林際放處較危收來太速舉欽山一日上堂竪起拳又開云開即爲掌五指參差復握云如今爲拳必無髙下還有商量也無一僧出衆竪起拳山云爾只是箇無開合漢師云雪竇即不然乃竪拳云握則爲拳有髙有下復開云開則成掌無黨無偏且道放開爲人好把定爲人好開也造車握也合轍􅀂謂閇門造車出門合轍我也知爾向􅀑窟裏作活計舉僧問睦州髙揖釋迦不拜彌勒時如何州云昨日有人問趕出了也僧云和尚恐專甲不實州云拄杖不在苕菷柄聊與三十師云睦州只有受璧之心且無割城之意舉􅀥樹問僧近離甚處云漢國樹云漢國天子還重佛法也無僧云苦哉賴值問著某甲問著别人即禍生云作箇什麽僧云人尚不見有何佛法可重云闍梨受戒多少時僧云二十夏云大好不見有人便打師云者僧棒即喫要且去不再來􅀥樹令雖行爭奈無風浪起舉趙州問婆子什麽處去云偷趙州笋去州云忽遇趙州又作麽生婆子便掌州便休去師云好掌更下兩掌也無勘處舉保壽開堂日三聖推出一僧壽便打聖云漝麽爲人瞎却鎭州一城人眼去在壽便歸方丈師云保壽三聖雖發明林際正法眼藏要且只解無佛處稱尊當時者僧􅀂是箇漢纔􅀍推出便掀倒禪牀直饒保壽全機也較三千里舉無業馬祖僧問如何是佛云莫妄想師云塞却鼻孔又問如何是佛云即心是佛師云拄却舌頭舉僧問德山從上諸聖什麽處去山云作麽作麽僧云勑􅀧飛龍馬跛鱉出頭來山便休去至來日山浴出其僧過茶與德山山撫僧背一下僧云者老漢方始瞥地師云然精金百煉須要本分鉗鎚德山旣以巳妨人者僧還同受屈以拄杖一劃云適來公案且致從上諸聖什麽處去大衆擬議師一時打趂舉保福簽􅀲次太原孚上座到來福云道得與爾􅀲喫孚云把將來福度一片􅀲與孚孚接得便去師云雖是死蛇解弄也活誰是好手者試請辨看舉南泉示衆云道非物外物外非道趙州出問如何是物外道泉便打州云和尚莫打某甲向後錯打人去在泉云龍蛇易辨衲子難瞞師云趙州如龍無角似蛇有足當時不管盡法無民直須喫棒了趂出舉洞山到雲門門問近離甚處山云查渡云夏在甚處山云湖南報慈云甚時離山云去年八月門云放爾三頓棒山至來日却上問訊昨日蒙和尚放三頓棒不知過在什麽處門云飯袋子江西湖南便漝麽去山於此大悟師云雲門氣宇如王拶著便冰消瓦觧當時􅀂據令而行子孫也未到斷絶舉一僧叅馬大師師畫一圎相云入也打不入也打僧便入師便打僧云和尚打某甲不得大師靠却拄杖休去師云二俱不了和尚打某甲不得靠却拄杖擬議不來劈脊便打舉興化問剋賔維那不乆爲唱道之首賔云不入者保社化云㑹來不入不會不入賔云没交渉化便打乃云剋賔維那法戰不勝罰錢五貫充設饡飯至來日齋時興化自白槌云剋賔維那法戰不勝不得喫飯即便趕出師云剋賔要承嗣興化罰錢出院且致却須索取者一頓棒始得且問諸人棒旣喫了作麽生索雪竇要斷不平之事今夜與剋賔維那雪屈以拄杖一時打散舉僧問長慶衆手淘金誰是得者慶云有􅇊倆者得僧云學人還得也無慶云大逺在師代者僧當時便喝復云有􅇊倆者得一手分付有􅇊倆者不得兩手分付學人還得也無蒼天蒼天舉大慈示衆云山僧不解荅話只是識病時有僧出大慈便歸方丈師云大凢扶竪宗乗須辨箇得失且大慈識病不荅話時有僧出便歸方丈雪竇識病不荅話或有僧出劈脊便打諸方識病不荅話有僧出必然别有長處敢有一箇動著大唐天子只三人舉趙州到黃蘗蘗見來便關却方丈州云救火救火黃蘗便出擒住云道道州云賊過後張弓師云直是好􅀏􅀏湏三十年忽有箇衲僧問雪竇􅀏箇什麽􅀏賊過後張弓舉僧問鏡清學人未逹其源乞師方便清云是什麽源云其源清云􅀂是其源爭受方便師云死水裏浸却有什麽用處侍者問適來成裭伊清云無侍者云不成裭伊清云無侍者云和尚尊意如何清云一􅀧水墨兩處成龍師云猶較些子雪竇不是減鏡清威光要與者僧相見是什麽源其源三十年後與爾三十棒舉僧問香林如何是衲衣下事林云臘月火燒山師云臘月燒山萬種千般翹松鶴冷踏雪人寒逹磨不㑹大難大難舉本仁和尚示衆云㝷常不欲向聲前句後皷弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麽云如何是色不是色仁云喚作聲得麽僧禮拜仁云且道爲汝說荅汝話􅀂人辨得有箇入處師云本仁也甚竒恠要且貪觀天上旣非聲前句後且作麽生入舉雲門示衆云老胡生下一手指天一手指地周行七歩目顧四方天上天下唯我獨尊當時􅀂見一棒打煞與狗喫却貴啚天下太平師云便與掀倒禪牀舉國師三喚侍者􅀧即不到侍者三應到即不􅀧將謂吾辜􅀒汝誰知汝辜􅀒吾瞞雪竇不得雲門道作麽生是國師辜􅀒侍者處㑹得也是無端師云元來不㑹作麽生是侍者􅇳􅀒國師粉骨碎身未報得師云無端無端復舉僧問投子國師三喚侍者意旨如何投子云抑逼人作麽師云垜根漢僧問興化化云一盲引衆盲師云端的瞎僧問玄沙沙云侍者却會師云停囚長智僧問趙州州云如人暗中書字字雖不成文彩巳彰師便喝僧問雪竇雪竇便打也要諸方􅀧檢乃成頌云師資㑹遇意非輕無事相將草裏行􅀒汝􅀒吾人莫問任從天下競頭爭舉僧問智門和尚如何是佛云踏破草鞋赤脚走僧云如何是佛向上事云拄杖頭上挑日月師云千兵易得一將難求舉師祖問南泉摩尼珠人不識如來藏裏親収得如何是如來藏云王老師與爾往來者是藏師云草裏漢祖云不往不來者云亦是藏師云雪上加霜祖云如何是珠師云嶮百尺竿頭作􅇊倆不是好手者裏著得箇眼賔主互換便能深入虎穴或不漝麽縱饒師祖悟去也是龍頭蛇尾漢舉僧禮拜雪峯峯打五棒僧云專甲有什麽過峯又打五棒師云雪竇不曾與人葛藤前五棒日照天臨後五棒雲騰致􅀨爾􅀂辨得也好與五棒舉馬大師令智藏馳書上徑山山接書開見一圎相於中下一􅀧國師聞舉云欽師猶􅀍馬師惑師云徑山􅀍惑且致􅀂將呈似國師别作箇什麽􅇊倆免􅀍惑去有老宿云當時坐却便休亦有道但與劃破􅀂與麽只是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麽雪竇見處也要諸人共知只者馬師當時畫出早自惑了也舉鏡清問僧趙州與茶去爾作麽生㑹僧便出去淸云邯鄲學歩師云者僧不是邯鄲人爲什麽學唐歩􅀂辨得出與爾茶喫舉僧問雲門如何是法身向上事云向上與爾道即不難作麽生㑹法身僧云請和尚鑒云鑒即且致作麽生㑹法身僧云與麽與麽云者箇是長連牀上學得底我且問爾法身還喫飯麽僧無語師云將成九仞之山不進一籄之土過在什麽處舉趙州訪茱茰􅂊上法堂茱茰云看箭州亦云看箭茱茰云過州云中師云二俱作家蓋是茱茰趙州二俱不作家箭鋒不相柱直饒齊發齊中也只是箇射垜漢舉林際與普化去施主家齋際問毛吞巨海芥納須彌爲復是神通妙用爲復法爾如然化踢倒飯牀際云太麤生化云者裏是甚所在說麤說細際休去至來日又同赴一施主齋際復問今日供養何似昨日化又踢倒飯牀際云太麤生化云瞎漢佛法說什麽麤細際吐舌師云兩箇老賊喫飯也不了好與二十棒棒雖行且那箇是正賊舉三角示衆云􅀂論此事眨上眉毛早是蹉過麻谷出云蹉過即不問如何是此事角云蹉過谷便掀倒禪床三角便打師云兩箇有頭無尾漢眉毛未曾眨上說什麽此事蹉過有僧問眉毛爲什麽不眨上師便打舉睦州喚僧大德僧廻首州云擔版漢師云睦州只具一􅃗眼何故者僧喚旣廻頭因甚却成擔版舉巖頭叅德山跨門便問是凢是聖德山便喝巖頭便禮拜洞山聞舉云􅀂不是奯公大難承當巖頭云洞山老漢不識好惡我當時一手擡一手搦師云然則德山門下草偃風行要且不能塞斷人口當時纔禮拜劈脊便打非唯勦絶洞山亦乃把定奯老還會麽李將軍有嘉聲在不得封矦也是閑舉巴陵示衆祖師道不是風動不是幡動旣不是幡風向什麽處著有人與祖師作主出來與巴陵相見師云雪竇道風動幡動旣是風幡向甚處著有人與巴陵作主亦出來與雪竇相見舉則川與龐居士摘茶次士云法界不容身師還見我麽川云􅀂不是老師洎與龐公荅話士云有問有荅蓋是㝷常川不管士云適來莫恠相借問麽川亦不管士喝云者無禮儀漢待我一一舉似明眼人去在川拈茶籃便歸師云則川只解把定封疆不能同生同死當時好與捋下幞頭誰敢喚作龐居士舉僧問雲門一言道盡時如何門云裂破師彈指三下舉僧問睦州一言道盡時如何州云老僧在爾鉢囊裏師呵呵大􅀏舉本生和尚以拄杖示衆云我􅀂拈起爾便向未拈起時作道理我􅀂不拈起爾便向拈起時作主宰且道老僧爲人在甚處時有僧出云不敢妄生節目生云也知闍梨不分外僧云低低處平之有餘髙髙處觀之不足生云節目上更生節目僧無語生云掩鼻偷香空招罪犯師云者僧也善能切磋爭奈弓折箭盡然雖如此且本生是作家宗師拈起也天廻地轉應湏拱手歸降放下也草偃風行必合全身逺害還見本生爲人處也無師復拈起拄杖云太平本是將軍致不許將軍見太平舉僧問雪峯聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何峯打三下其僧復問巖頭巖頭打三掌師云應病設藥且與三下􅀂據令而行合打多少舉太原孚上座叅雪峯至法堂上顧視雪峯便下看知事師云一千五百人作家宗師􅀍孚老一覷便髙竪降旗孚至來日入方丈云昨日觸悮和尚峯云知是般事便休師云果然僧問雲門作麽生是觸悮處門便打師云打得百千萬箇有什麽用處直須盡大地人喫棒方可扶竪雪峯且道太原孚具什麽眼舉安國問僧得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺䔧之園我要箇語具得失兩意僧竪起拳云不可喚作拳頭國云只爲喚作拳頭師云無繩自縛漢拳頭也不識舉僧請益雲門大師玄沙三種病人話門云爾禮拜著僧禮拜起門以拄杖便挃僧退後門云爾不是患盲復喚近前來僧近前門云爾不是患聾乃云還㑹麽僧云不㑹門云爾不是患瘂僧於此有省師便喝云者盲聾瘖瘂漢􅀂不是雲門驢年去如今有底或拈槌竪拂不管教近前又不來還㑹麽不應諸方還奈何得麽雪竇􅀂不奈何爾者一隊驢漢又堪作箇什麽以拄杖一時打趂舉僧問香嚴如何是王索仙陀婆嚴云過者邊來師云鈍致煞人僧問趙州王索仙陀婆時如何州曲躬义手師云索鹽奉馬舉皷山示衆云􅀂論此事如一口劒時有僧問承和尚有言􅀂論此事如一口劒和尚是死屍學人是死屍如何是劒山云拕出者死屍僧應喏歸衣鉢下打揲便行山至晚問首座問話僧在否座云當時便去也山云好與二十棒師云諸方老宿㹅道皷山失却一􅃗眼殊不知重賞之下必有勇夫然雖如此􅀂子細􅀧檢來未免一時埋却舉睦州問武陵長老了即毛端吞巨海始知大地一微塵作麽生云和尚問誰州云問長老云何不領話州云我不領話爾不領話師云墮也墮也復云者葛藤老漢好與劃斷拈拄杖云什麽處去也舉仰山坐次大禪佛到翹一足云西天二十八祖亦如是唐土六祖亦如是和尚亦如是某甲亦如是山下禪牀打四藤條師云藤條未到打折因什麽只與四下湏是箇斬釘截鐵漢始得大禪後到藿山自云集雲峯下四藤條天下大禪佛叅山云打鍾著禪使走師云者漢雖見機而變爭奈有頭無尾舉玄沙與天龍入山見虎龍云前靣是虎沙云是汝師云要與人天爲師前靣端的是虎舉南泉山下有一庵主行僧經過謂庵主云近日南泉和尚出丗何不去禮拜主云非但南泉直饒千佛出興亦不能去泉聞令趙州去看州見便禮拜主不管州從西過東主亦不管州又從東過西主亦不管州云草賊大敗拽下簾子便行歸舉似南泉泉云從來疑著者漢師云大小南泉趙州被箇擔版漢勘破了也舉僧問風穴語嘿渉離微如何通不犯穴云常憶江南三月裏鷓鴣啼處百花鮮曾有僧問雪竇對他道劈腹剜心又且如何復云因風吹火别是一家傷鼈恕􅀛必應有主舉巖頭雪峯欽山到德山欽山問天皇也恁麽道龍潭也恁麽道未審德山作麽生道山云爾試舉天皇龍潭底看欽山擬議德山便打欽山被打歸延壽堂云是即是打我太煞巖頭云爾恁麽他後不得道見德山師云諸禪德欽山致箇問端甚是竒特爭奈龍頭蛇尾爾試舉天皇龍潭底看坐具便􅣔大丈夫漢捋虎􅂡也是本分他旣不能德山令行一半令􅀂盡行雪峯巖頭㹅是􅄺槃堂裏漢舉僧問智門和尚如何是般􅀂體云蚌含明月僧云如何是般􅀂用云兎子懷胎師云非唯把定丗界亦乃安貼􅀖家􅀂善能叅詳便請丹霄獨歩舉烏臼有玄紹二上座到臼云二禪伯近離甚處云江西臼便打僧云乆聞和尚有此機要臼云爾旣不㑹第二箇近前來僧擬議臼亦打云同坑無異土叅堂去師云宗師眼目須至恁麽如金翅擘海直取龍吞有般漢眼目未辨東西拄杖不知顚倒只管說照用同時人境俱奪舉僧辭大隨隨問甚處去云峩眉禮拜普賢去隨竪起拂子云文殊普賢惣在者裏僧畫一圎相抛於背後隨云侍者將一貼茶與者僧雲門別云西天斬頭截臂者裏自領出去師云煞人刀活人劒具眼底辨取舉雪峯問僧見說大德曾爲天使來是否云不敢峯云爭解與麽來德云仰慕道德豈憚關山峯云汝猶醉在出去僧便出峯乃召大德僧廻首峯云是什麽僧亦云是什麽峯云者􅃮桶僧無語峯却顧謂鏡清云好箇師僧向􅃮桶裏著到清云和尚豈不是據􅅃結案峯云也是我㝷常用底忽􅀂喚廻是什麽被他道者􅃮桶又作麽生清云成何道理峯云我與麽及伊爾又道據􅅃結案他與麽及我又道成何道理一等是什麽時節其閒有得不得清云不見道醍醐上味爲丗所珎遇此之人飜成毒藥師云看他父子相投言氣相合知者謂粉骨碎身此恩難報不知者謂扶髙抑下臨危悚人毒藥醍醐千載􅀛鑑還㑹麽者􅃮桶舉僧問大梅如何是祖師西來意梅云西來無意僧舉到鹽官官云一箇棺材兩箇死漢玄沙聞舉云鹽官是作家師云三箇也得舉雲門問新羅僧爾是甚處人云新羅人門云將什麽過海云草賊大敗門云爲什麽在我手裏云恰是門云一任㪍趒師云雲門老漢龍頭蛇尾放過者僧爲什麽在我手裏恰是劈脊便打舉北禪問僧近離甚處云黄州禪云夏在甚處云資福禪云福將何資云兩重公案禪云爭奈在我手裏云在手裏即収取禪便打者僧不甘隨後趂出師云竒恠宛有超師之作還知者僧麽只解貪前不能顧後􅀂在雪竇手裏棒折也未放在舉睦州示衆云我見百丈不識好惡大衆方集以拄杖一時打下復召大衆大衆廻首丈云是什麽有什麽共語處黄蘗和尚大衆方集以拄杖一時打下復召大衆大衆廻首蘗云月似彎弓少雨多風猶較些子師云說什麽猶較直是未在􅀂據雪竇衆集一時打下便休或有箇無孔鐵槌爲衆竭力善能擔荷可以籠􅇁古今乾坤把斷師驀拈拄杖云放過一著舉玄沙見皷山來作一圎相山云人人出者箇不得沙云情知爾向驢胎馬腹裏作活計山云和尚又作麽生玄沙云人人出者箇不得山云和尚漝麽道得某甲爲什麽不得沙云我得爾不得師云只解貪觀白浪不知失却手橈舉南泉示衆云王老師賣身去也還有人買麽一僧出衆云某甲買泉云不作貴不作賤作麽生買僧無語卧龍代云和尚屬專甲禾山云是何道理趙州云明年與和尚作頌布衫師云雖然作家競買要且不解輸機且道南泉還肯麽雪竇也擬酬箇價直令南泉進且無門退亦無地不作貴不作賤作麽生買别處容和尚不得舉茱茰把一橛竹上堂云還有虚空裏釘得橛麽時有靈虚上座出云虚空是橛茱茰便打虚云莫錯打某甲茱茰休去師云􅀂要此話大行直湏打了趂出舉夾山與定山同行言話次定山云生死中無佛則無生死夾山云生死中有佛則不迷生死互相不肯同上大梅相見了具說前事夾山問未審那箇親那箇踈梅云一親一踈山又問那箇親梅云且去明日來夾山至來日又問未審那箇親梅云親者不問問者不親夾山住後云我當時在大梅失却一􅃗眼師云夾山畢竟不知換得一􅃗眼大梅老漢當時聞舉􅀂以棒一時打出豈止劃斷兩人葛藤亦乃爲天下宗匠舉僧問保福雪峯平生有何言句得似羚羊挂角時福云我不可作雪峯弟子不得師云一千五百箇布衲保福較些些子舉僧問長慶羚羊未挂角時如何慶云草裏漢云挂角後如何慶云亂叫喚云畢竟如何慶云驢事未了馬事到來師云寜可碎身􅀂微塵終不瞎箇衆生眼長慶較些些子復云一般漢設使羚羊未挂角也似萬里望郷關舉僧問巴陵祖意敎意同别陵云雞寒上樹鴨寒下水僧問睦州祖意敎意同别州云青山自青山白雲自白雲師云問旣一般荅亦相似其中有利地自利瞞人自瞞􅀂􅀧檢分明管取解空第一舉趙州示衆云今夜荅話去有解問者出來時有僧出州云比來抛塼引玉引得箇墼子法眼和尚遂乃舉問覺鐵觜先師意作麽生覺云如國家拜將乃問甚人去得時有人出云某甲去得云爾去不得法眼去我㑹也師云刢利漢聞舉便知落處然雖如此放過覺鐵觜夫宗師語不虚發出來必是作家因什麽抛塼引墼諸禪德要識趙州麽從前汗馬無人見只要重論蓋代功舉躭源辭國師歸省覲馬祖於地上作一圎相展坐具禮拜祖云子欲作佛去源云某甲不解􅑃目祖云吾不如汝師云然猛虎不食其子爭奈來言不豐諸人要識躭源麽只是箇藏身露影漢舉潙山問仰山甚處來云田中來潙云田中多少人山挿下鍬子义手而立潙云南山大有人刈􅈋山拈得鍬子便行玄沙云我當時􅀂見與踏倒鍬子鏡清云不奈船何打破戽斗僧問明招古人意在挿鍬處义手處招喚某專甲僧應喏招云還曾夣見仰山麽師云諸方老宿咸謂挿鍬話竒特也大似隨邪逐惡􅀂據雪竇見處仰山被潙山一問直得草繩自縛去死十分舉玄沙問僧近離甚處云瑞巖沙云瑞巖有何言句僧云長喚主人翁自云諾醒醒著他後莫受人瞞沙云一等是弄精䰟甚竒恠却云何不且在彼中僧云瑞巖遷化也沙云如今還喚得應麽無對師云蒼天蒼天舉雪峯問僧近離甚處云覆船峯云生死海未渡爲什麽覆船師代云乆響雪峯待者老漢擬議拂袖便行其僧當時無語歸舉似覆船船云何不道渠無生死僧再至雪峯舉此語峯云此不是爾語云是覆船恁麽道峯云我有二十棒􅀉與覆船二十棒老僧自喫不干闍梨事師云能區能别能煞能活􅀂也辨得天下横行舉德山圎明示衆云但有問荅只竪一指頭寒則普天普地寒師云什麽處見俱胝老熱則普天普地熱師云莫錯認定盤星森羅萬像徹下􅀌危大地山河通上嶮絶甚麽處得一指頭禪舉僧問南院從上諸聖什麽處去院云不上天堂即入地獄云和尚作麽生院云還知寶應老落處麽僧擬議院以拂子驀口打復喚僧近前云令合是爾行又打一拂子師云令旣自行且拂子不知來處雪竇道箇瞎且要雪上加霜舉保福問長慶盤山道光境俱忘復是何物洞山道光境未忘復是何物據二老宿㹅未得勦絶作麽生道得勦絶去慶良乆福云情知向􅀑窟裏作活計慶云爾作麽生福云兩手扶犁水過􅂰師云俱忘未忘㹅由我保福因什麽道未得勦絶酌然能有幾箇諸人又作麽生道免得長慶在􅀑窟裏師云栁絮隨風自西自東舉大梅聞鼯鼠鳥聲謂衆云即此物非他物汝善護持吾當逝矣師云者漢生前莽鹵死後顢頇即此物非他物是何物還有分付處也無有般漢不解截斷大梅脚跟只管道貪程太速舉雪峯示衆云望州亭與爾相見了也烏石嶺與爾相見了也僧堂前與爾相見了也保福問鵝湖僧堂前且致望州亭烏石嶺什麽處相見鵝湖驟歩歸方丈保福便入僧堂師云二老宿是即是只知雪峯放行不見雪峯把定忽有箇衲僧出問未審雪竇作麽生豈不是别機冝識休咎底漢還有望州亭烏石嶺相見底衲僧麽良乆云擔版禪和如麻似粟舉趙州問大慈般􅀂以何爲體慈云般􅀂以何爲體州呵呵大􅀏至來日州掃地次大慈却問般􅀂以何爲體州放下掃箒呵呵大􅀏師云前來也􅀏後來也􅀏􅀏中有刀大慈還識麽直饒識得也未免喪身失命舉德山一日飯遲自掌鉢至法堂上雪峯見云者老漢鍾未鳴皷未響托鉢向什麽處去德山便廻峯舉似巖頭頭云大小德山不㑹末後句山聞舉令侍者喚巖頭至方丈問爾不肯老僧那巖頭宻啓其意山至來日上堂與㝷常不同巖頭到僧堂前撫掌大􅀏云且喜得老漢㑹末後句他後天下人不柰何雖然如此只得三年明招代德山云咄咄没處去没處去師云曾聞說箇獨眼龍元來只有一􅃗眼殊不知德山是箇無齒大蟲者不是巖頭識破爭得明日與昨日不同諸人要會末後句麽只許老胡知不許老胡㑹舉雪峯一日見獼猴乃云者獼猴各各背一靣古鏡三聖便問歷劫無名何以彰爲古鏡峯云瑕生也聖云一千五百人善知識話頭也不識峯云老僧住持事煩師云好與二十棒者棒放過也好免見將錯就錯舉僧問國師如何是本身盧舎那云與老僧過淨瓶來僧將到淨瓶云却安舊處著僧復問如何是本身盧舎那云古佛過去乆矣雲門大師道無眹跡師云直得一手指天一手指地爭得無還㑹麽雲在嶺頭閑不徹水流澗下大忙生舉僧問洞山時時勤拂拭莫遣惹塵埃爲什麽不得他衣鉢山云直饒道本來無一物也未合得他衣鉢且道什麽人合得僧下九十六轉語皆不相契末後云設使將來他亦不要洞山深肯師云他旣不受是眼將來底必應是瞎還見祖師衣鉢麽􅀂於此入門便乃兩手分付非但大􅁃嶺頭一箇提不起設使闔國人來且􅅃􅅃將去舉僧問投子依稀似半月髣象􅀂三星乾坤収不得師於何處明子云道什麽云想師只有湛水之波且無滔天之浪子云閑言語師云投子古佛不可道不知􅀂􅀧撿來直是天地懸隔纔問便和聲打舉洛浦乆爲林際侍者到夾山問自逺趨風乞師一接山云目前無闍梨此閒無老僧浦便喝山云住住闍梨莫草草忩忩雲月是同溪山各異截斷天下人舌頭即不無爭敎無舌人解語無對山便打師云者漢可悲可痛鈍致他林際他旣雲月是同我亦溪山各異說什麽無舌人不解語坐具劈口便􅣔夾山􅀂是箇知方漢必然明䆫下安排舉三聖問雪峯透網金鱗以何爲食峯云待汝出網來向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事煩師云可惜放過好與二十棒者棒一棒也饒不得直是罕遇作家舉伏牛爲馬祖馳書到國師處國師問馬祖有何言句示人牛云即心是佛國師云是什麽語話良乆再問更有什麽言句牛云不是心不是佛不是物國師云猶較些子師代當時便喝牛却問和尚此間如何國師云三􅀧如流水曲似刈禾鎌師云是什麽語話也好與一拶見之不取千載難忘舉玄沙問鏡清我不見一法爲大過患爾道不見什麽法清指露柱云莫是不見者箇法麽沙云浙中清水白米從爾喫佛法則未在師云大小鏡清被玄沙熱瞞我當時􅀂見但只向道靈山授記也未到如此舉先報慈問僧近離甚處云卧龍慈云在彼多少時云經冬過夏慈云龍門無宿客爲什麽在彼許多時云師子窟中無異獸慈云爾試作師子吼看云􅀂作師子吼即無和尚慈云念汝新到且放三十棒師云竒恠諸禪德􅀂平展則兩不相傷據令則彼此俱嶮還􅀧撿得麽舉船子云千尺􅁝綸直下垂一波纔動萬波隨夜静水寒魚不食滿船空載月明歸師云者漢勞而無功忽􅀂雲門道一句合頭語萬刼繫驢橛又作麽生免此過良乆云莫謂水寒魚不食如今釣得滿船歸舉投子問巨榮禪客老僧未曽有一言半句挂諸方耳目何用要見山僧僧云到者裏不施三拜要且不甘子云岀家兒得恁麽没碑記僧遶禪床一匝而出子云有眼無耳六月火邊坐師云也不得放過􅂊轉便與擒住便喝是誰不甘􅀂跳得出不妨是一貟衲僧舉祖師道六塵不惡還同正覺拄杖子是塵有甚麽過過旣無應合辨主所以道糞掃堆上現丈六金身且拈在一邊赤肉團上壁立千仞又放過一著直饒八靣四方正好連架打舉古云眼裏著沙不得耳裏著水不得忽􅀂有箇漢信得及把得住不受人瞞祖佛言敎是什麽熱椀鳴聲便請髙挂鉢囊拗折拄杖管取一貟無事道人又云眼裏著得須彌山耳裏著得大海水一般漢受人商量祖佛言敎如龍得水似虎靠山却須挑起鉢囊橫擔拄杖亦是一貟無事道人復云恁麽也不得不恁麽也不得然後没交渉三貟無事道人中要選一人爲師雪竇拈古一百則竟雪竇和尚明覺大師瀑泉集并序叅學小師圎應述師自兩處道􅂣多應機語句門人集之離三巳行於丗斯所紀者乃垂帶自荅及古今因縁朝暮提唱辭意曠嶮而學黨未喻復致之請益師蓋不獲巳隨所疑問以此以彼乍放乍收或抑或􅀭或代或别近百五十則實一時之能事也況圎應忝預參承寧忘捃拾然多聞未益誠有愧於宗師必記諸善言諒無譏於弟子可命曰瀑泉集意以飛流無盡爲義凡知我者幸同味焉時天聖八年八月十五日序明州軍州官請住雪竇䟽歸依無勞謙執謹䟽蘇州在城檀越請住翠峯䟽粤以照乗神珠豈有心而鑑物達空上士曽無念以度生其如體具圎明致五色不能隱情存悲智故十界不能遺是謂妙應無方眞慈廣被者也恭惟和尚靈源本濬道價非沽虎䇿親持遍入祖師之室龍盂髙掌常游居士之門自此秖欲韜光深思逺丗其柰因縁四備道德兼充隨方而民物依歸觸處而學人圍繞在衆何殊於出丗乗時豈吝於提綱伏望和尚深别武林遐之笠澤慧理息肩之地暫罷呼猨支公嘉遯之郷堪追養駿遭累聖重光之主值休牛歸馬之朝誠冝乎大闡一音俯從三請塞輿人之願望鎭先德之叢林上柷皇王旁資􅀺庶前所謂妙應之􅀃眞慈之門良在此時無賜勞讓幸甚謹䟽蘇州僧正并諸名貟䟽竊以柯亭發籟匪知音而孰采希聲陶壁飛梭承奮豫而方同聖化物理尚由於時遇人情豈背於縁求長老和尚祖席爲珍師門作範雄經鉅論傳心者鮮克精明麗句淸辭出丗者少如兼濟繇是歷漢水而德風早偃鑚仰有年入呉􅀖而名翼愈飛遭逢此日遂得群心啓顙咸願摳衣翠峯禪院檀越福􅂣宗師法席漪漣四繞何殊灔澦之寛橘柚千株可奪江陵之羙粗稱來儀知識繼踵住持雅膺聖主承祧賢侯出鎭冝踞法空之座特開心地之門祝萬壽於時君資百禄於朝宰旣臻海衆希振雷音謹䟽上堂汝等諸人盡是乆經陣敵慣戰作家􅀝天長劒即不問你作麽生是䄂裏藏鋒代云寡不敵衆又云彼此上堂寡不敵衆什麽人分上事代云揔由和尚又云彼此又云龍虵易弁衲子難瞞許你眼正頂後一相拈得也無代云收有時云收之一字飲氣吞聲作麽生弁代云衲子難瞞或云傾湫倒岳㝷常之用不渉泥水道將一句來代云三千里外示衆云三千里外還且如何代云過或云佛未出世時一人人鼻孔遼天出世後爲什麽杳無消息代云賊不打貧兒家問僧云賊不打貧兒家因什麽却打代云須到如此或云祖師不到處時人知有時人不知處過在祖師作麽生弁代云不得春風花不開上堂云不得春風花不開箇箇道我會會即且致作麽生舉代云時人祖師又云空刼巳前徒指注空刼之後錯商量正當空刼什麽人爲主代云本是將軍致太平有時云太平本是將軍致莫錯認定盤星我爲你拈了也還㑹麽代云掩靣出去或云交鋒兩刃要定死生彼此無傷功勲不立作麽生是將軍正令代云到即不􅀧或云到即不􅀧還甘也無代云赤心片片有時云釋迦老子出氣不得甚麽處誵訛代云塡溝塞壑又代云退身三歩問云塡溝塞壑􅀒恩者多甚處見老底代云香積世界或云五千四十八卷止啼之􅀃如今啼止也還我黃葉來代云事不􅀌起有時云事不􅀌起你也分一半代云㖿又云合到某甲又云單傳心印過犯彌天甚人委悉代云須見如此上堂云須見如此著甚來由代云也是或云善來文殊還知敗闕麽代云一箭兩垜或云一箭兩垜爲什麽却敗闕代云善來文殊或云乾坤崩䧟且致再見天日道將一句來代云悔不愼當初有時云悔不愼當初便下座却問僧他後作麽生舉代云好事不如無有時云雄兵百萬且定邊疆劒客三千若爲驅使代云不許夜行投明須到示衆云不許夜行投明須到何似生代云孟常門下或云一筆勾下不甘底出來代云只冝拄杖子上堂云只冝拄杖子勾下屬何人代云傍觀者或云威音王巳前無師自悟是第二句還我第一句來代云掃土而盡問僧云掃土而盡你還知麽代云因誰致得有時云三世諸佛􅀃夢六代祖師􅀃夢翠峰今日􅀃夢還有夢見底麽代云掀倒禪牀或云掀倒禪牀蓋是本分過在什麽處代云惱亂春風卒未休或云奔流度刃也是㝷常啐啄同時略請相見代云什麽處去也上堂云什麽處去也代云日月易流又云針眼裏藏身即不問你作麽生是逰戲十方代云踞虎頭收虎尾一日云踞虎頭收虎尾諸方未曾見代云也是或云上來則擾擾端坐則昏昏脫灑一句作麽生道代云春無三日晴示衆云春無三日晴去住還堪􅀏且問諸衲僧曬却何時了代云某甲只管看或云有佛法處不得住無佛法處急走過趙州爲什麽摘楊花代云更事多矣問僧更事多矣亦要商量代云莫敎屈著有時云明眼衲僧入門便話墮三十年後誰是知音代云拂䄂便出有時云拂䄂便出也好與三十棒代云賊過後張弓或云七縱八橫拈却把定乾坤眼爲什麽却有沙代云黃連未是苦或云黃連未是苦黃蘗好爲隣復問僧還弁得者時節麽僧云不會自代云抑巳而巳或云遶天下行脚到處豈無尊􅀫相爲還有盡力道得底句麽代云口只堪喫飯上堂云口只堪喫飯雲門大師拈了也你來者裏聽什麽椀鳴聲以拄杖一時打下代僧當時但近前把住拄杖云和尚今日困又云關捩子即不問上座作麽生是牛頭横􅀃竪說代云著甚來由一日云著甚來由便下座代云能有幾箇有時拈起拄杖云天不能蓋地不能載復以拄杖一劃云百千諸佛諸代祖師盡向翠峯乞命代云官不容針或云舉一明三爲什麽不著便代云作賊人心虚又云文殊起佛見法見貶向二鐵圍山衲僧起佛見法見列在五條椽下翠峰起佛見法見誰敢覷著代云秤尺在手或云洞庭湖水一吸淨盡魚鼈向甚處藏身代云咦又云喝下承當崖州萬里棒頭薦得别有條章作麽生是衲僧本分代云惡或云虚空爲皷須彌爲槌王老師不打還肯得諸方也無代云千年田八百主有時云髑髏常干世界鼻孔摩觸家風拈却别致一問來代云祖師遺下又云你若􅀛頭鼈頭向後莫道親見翠峰好代云何必上堂云天不能蓋地不能載衲僧坐斷如􅁪河沙閙市裏指出一箇來代云便摑傍僧或云生門易過死門難入逆順無拘底爲什麽不垂手代云收得安南又憂塞北或云荒田不揀草變爲金信手拈來金變成草古聖日用不知且致你爲什麽臨機道得代云如虫禦木上堂云如來唯一􅀃無二說穿却衲僧鼻孔換却衲僧眼睛即得􅀂敎我明破恐帶累你不是好人代云欲見其師先觀弟子或云諸佛有難炭庫裏衆生有難火熖裏你衲僧不得動著代云魯般繩墨或云火待日熱風待月涼北斗南星句不要你道留與後人貶剥代云一言巳出駟馬難追上堂云色不異空空不異色園頭甚要古人道了也因什麽知而故犯代云爭奈轉多問僧我道轉多你作麽生僧云某甲不會師云惱亂春風卒未休或云本分事道我知有將錯就錯甚人承當代云不惜眉毛者或云年來一度春也畢竟事作麽生代云藏身露影或云至道無難唯嫌揀擇德山不在付與黃蘗代云洗脚上船復問僧云我恁麽道正是時人窠窟趙州直得五年分踈不下你何不救取僧無語師云雪峯道底上堂云開門待知識知識不來過直得出門相接爲什麽土曠人稀代云和尚年老或云放憨道著藥忌即不管你死中得活致將一問來代云略無些子上堂云逺則照近則明你會也笠子拄杖拈放一邊入水見長人作麽生弁代云平出或云因一事長一智針筒藥袋不得失却如履輕冰道將一句來代云以己妨人又云會則事同一家且放你過不會則東西南北付與驢年代云一日便頭白或云今日也恁麽明日也恁麽第三第四不問你後五日事作麽生若道只恁麽代云苦哉佛陁耶有時云什麽劫中無祖佛你不著便猶可代云解􅀏底亦少或云朝堂門下難舉令雲門道底不要代云但咳嗽一聲一日云謀臣猛將用不著到即不􅀧是什麽人代云不犯之令上堂云􅀂道得隔身句知你是箇了事人忽􅀂揔道不得我也知你親代云猛虎不食其子一日云千兵昜得一將難求上將來也三軍在什麽處代云退後退後或云閫內者不出閫外者不入將相雙行句作麽生道代云弔民伐罪因普請問僧甚處來云摘茶來師云茶園裏有玄沙見底還見麽代但指露柱云和尚問又問僧甚處來云摘茶來師云人摘茶茶摘人不問你無底籃子重多少代云慣得其便又問僧甚處來云摘茶來云茶叢列作鼻孔茶葉是你眼睛作麽生摘代云今日不著便一日云佛法不用學觸目皆成滯百城旣未遊樓閣門長閉勸君廻首看請下一轉語自云莫辜􅀒人好一日問僧南泉斬猫兒你作麽生會云有什麽難師云作麽生無語代云一刀兩段一日遊園次問僧苦瓠連根苦甜􅀲徹蔕甜明得箇什麽邊事無對代云平出一日請益退侍者問訊云和尚不易師云有什麽不易無對師代云法堂上寸草不生僧便禮拜師云若不是我師一日問僧諸方道不得底句你作麽生道僧云天平地平師云漝麽則黃老師不如你僧無語師云只道得一半師一日見僧來師云是什麽物與麽來僧云口痛祗對和尚不得師云鼻孔僧無語師云黃連未是苦師一日見云僧來拈起拄杖云與你二人分取僧云只恐和尚不平第二僧云郍上座先到雪竇師云有功者賞師一日見二化主城中歸問云你慿箇什麽入城敎化衆生僧云雖有好心且無好報第二僧云禍不入愼家之門師云近火先燋師一日晚叅問僧是什麽時􅀱也僧應喏師便喝僧云和尚何不領話師云日勢稍晚師一日見僧來拈起拄杖云我兩手分付你作麽生僧退身云不敢師云爲什麽棒上不成龍僧云三十年後恐辜􅀒和尚師放下拄杖云吽吽師一日問僧你見雪竇後録未僧云見了師云向甚處見我僧云也知和尚是川中人師將拄杖打一下云夢見師一日見僧出歸師云閙市裏還見天子麽僧無語師代云非但又云苦哉佛陁耶一日十數僧侍立次師云佛法無人􅀃雖惠不能了復問僧還有無師自悟底麽衆無語師云􅀒命者上鈎師因在莊數僧侍立次師問云維摩老云歩歩是道􅂣者裏何似山裏衆下語師皆不諾師代云只恐和尚不肯師一日問僧你作箇什麽來僧云合靈寳丹來師云靈即不問作麽生是寳僧云不敢祇對和尚師不肯自代云洎與和尚答話師一日問僧你浴未僧云專甲此生不浴師云你不浴啚箇什麽僧云今日􅀍和尚勘破師云賊不打貧兒家師一日同僧遊山次到開山和尚塔頭僧云見􅀃開山便是黃巢師云黃巢是草頭天子爲什麽却作住山人僧云忌辰也好與他設粥師不肯自代云賞不避仇讎師一日同三五僧看種田師云靈苗無根作麽生種僧云明年更有新條在師云你問我我與你道僧便問師云分付田舎奴師一日出城見下院山主師云旣是山主爲什麽却在城中山主無語師自云􅀒命者上鈎來師一日與數僧遊山次見牯牛舉頭師問水牯牛舉頭作什麽僧云怕和尚穿却師不肯自云看入草底師一日燒亡僧師問僧還將得火來麽僧云將得來師云弄假像眞師一日問僧甚處來僧云浴來師云三身中郍身浴僧云或皷聲前或皷聲後師云飽叢林師一日問僧你㝷常爲什麽不上來僧云長上來只是門閉師云爲什麽不入來僧云來也師云賊過後張弓師一日爲首座寫眞師云旣是首座爲什麽却有兩箇首座云爭之不足師云你問我我與你道首座擬問師云雪竇門下巨宋太宗皇帝因事六問當時無人奏對因入寺見僧看經問云看什麽經對云仁王經帝云旣是寡人經爲甚在卿手裏師代云皇天無親唯德是輔因入塔院問僧卿是甚人僧云塔主云此是寡人塔爲什麽卿作主代云蓋國咸知因僧燒却藏經朝見告乞宣問昔日摩騰不燒如今爲什麽燒却代云陛下不忘付囑因帝夜夢神人報云請陛下發菩提心帝至曉宣問左右街菩提心作麽生發代云實謂今古罕聞因僧朝見帝問甚處來云卧雲來帝曰朕聞卧雲深處不朝天爲什麽却到者裏代云難逃至化因僧朝見帝賜坐僧云陛下還記得麽帝云甚處相見來僧云靈山一别直至如今帝曰以何爲驗無對代云貧道得得而來唐憲宗迎舎利現五色光百辟俱賀唯韓愈端立帝問百寮皆賀卿爲甚不賀愈曰臣曾㸔經來佛光非青黃赤白等相此是神龍荷助之帝云作麽生是佛光代云陛下髙垂天鑒裴相公捧一尊佛像於黄蘗前跪云請師安名蘗云裴休師代相公當時便喝廣南劉王請雲門入内於含春殿坐次帝令鞠常侍宣問靈樹菓子熟也未門云甚年中得信道生師代進語云猶帶酸澁在又代雲門云聖意難測又云喏喏復宣問如何是禪云皇帝有勑臣僧對代進語云錯又代雲門云念以臣僧年邁龍光問僧名什麽云自觀光云自觀見什麽代云有悮龍光悟空禪師問座主講什麽經云法華經空云有􅀃法華經處我現寳塔當爲證明座主講請甚人證明代云私通車馬投子示衆云汝等諸人盡道我實頭􅀂出門三歩有人問你作麽生是投子實頭處作麽生道代云疑煞天下人有老宿見官人手中執笏乃問在官人手中爲笏在天子手中爲珪在老僧手中喚作什麽代云弄巧成拙四祖到牛頭後庵見虎便作怕勢牛頭云和尚猶有者箇在祖云適來見什麽代云但亦作怕勢又代云洎合放過僧問惠濟古人道得坐披衣向後自看如何是得坐披衣濟云暢我平生代云喏喏問投子定慧等學明見佛性此理如何投子云打水用桶舀粥用杓代云爭得不問玄沙見孚上座便云新到相看孚云巳相見了也沙云什麽劫中曾相見來孚云莫瞌睡别云者賊敗也玄沙與地藏在方丈說話夜深沙云待者關隔子門汝作麽生出得地藏云喚甚麽作門别云珍重便行崇壽問僧泉眼不通􅀍沙礙道眼不通􅀍甚麽礙僧云眼礙别云強將下無弱兵保福在疾問僧我與你相識年深有何名方妙藥相救僧云藥方甚有聞􅀃和尚不解忌口别云只恐難爲和尚有西天聲鳴三藏到三大王處王令玄沙驗過玄沙以銅火筯擊鐵火爐問三藏云是什麽聲云銅鐵聲沙云大王莫受外國人瞞師别云大王冝加信敬又别三藏云莫瞞外國人國師問座主講什麽經云金剛經國師云最初是什麽字座主云如是國師云是什麽别云以拄杖便打陸郎中問仰山如何是不斷煩惱而入􅄺槃仰山竪拂子郎中便拜異時仰山却問郎中曾問不斷煩惱而入􅄺槃老僧竪拂子郎中作麽生會陸云據某甲見處入之一字也不用得仰山云入之一字不爲郎中師云作麽生會云别陸云拂子到某甲手裏也又别仰山後語云我將謂你是箇俗漢陸大夫問南泉大悲菩薩甚處得許多手眼來泉云如國家用大夫作什麽别云不及大夫所問僧問雲門十方薄伽梵一路􅄺槃門如何是一路􅄺槃門門云我道不得云和尚爲什麽道不得云你舉話即得别云淺水無魚徒勞下釣呉尚書訪睦州至門首便問三門俱開弟子從何門而入睦召尚書尚書應喏睦云從信門而入别云客是主人相師南泉遷化陸亘大夫到院主云大夫何不哭大夫云道得即哭長慶代云合􅀏不合哭别云蒼天蒼天雲巖遷化時道吾問離却殻漏子了後向何處再得相見巖云向不生不滅處相見别云喚侍者與我記取者一問僧問法燈百骸俱潰散一物鎭長靈未審百骸一物相去多少燈云百骸一物一物百骸别云吾不如汝僧問歸宗如何是佛宗云我向你道還信麽云和尚言重爭得不信宗云只汝便是别云侍者寮裏輿茶去麻谷持錫到國師處振錫而立國師云汝旣如是何用見吾谷又振錫一下别云洎不到此妙濟於僧前書一字問云是什麽僧云不識濟云滿口道著别云老僧罪過僧問曹山清稅􅀌貧請師拯濟山云稅闍梨應喏山云清源白家酒三盞猶道未霑唇别云稅闍梨應喏是什麽心行僧問玄覺先師舉不及處請和尚舉覺云聽者須是竒人别云大衆看者一貟禪客石頭問讓大師不慕諸聖不重巳靈時如何讓云子問太髙生何不向下問將來别云三十棒敎誰喫僧問玄沙盡十方丗界是一顆明珠學人爲什麽不㑹沙云用會作麽别云諸方即得我者裏不得玄沙問南際云此事唯我能知長老作麽生㑹際云須知有百求知者别云雪峯門下幾箇如斯法眼問百法座主云百法是體用雙陳明門是能所兼舉座主是能法座是所作麽生􅀃箇兼舉有老宿代云和尚喚什麽作法座别云和尚分半院與某甲始得睦州問座主講什麽經云􅄺槃經州云問大德一叚義得麽云問什麽義州以脚趯一吹云者箇是什麽義云經中無此義州云脫空謾語漢此是五百力士揭石義麽老宿代云和尚瞞某甲瞞大衆别云和尚慣得其便雲門示衆云丗尊生下一手指天一手指地周行七歩目顧四方云天上天下唯我獨尊我當時􅀂見一棒打煞與狗喫却貴得天下太平法眼云雲門氣勢甚大要且無佛法道理老宿代云將謂無人證明别云鈎在不疑之地巖頭雪峯欽山三人坐次洞山􅀧茶來欽山閉眼洞云什麽處去來欽山云入定來洞云定本無門從何而入老宿代云大有人恁麽會别云當時但指巖頭雪峯云與者兩箇瞌睡漢茶喫雲門問僧近離甚處云新羅門云將甚麽過海云草賊大敗門云你爲什麽在我手裏僧云恰是别云嘘嘘雲門到洞巖得數日上叅恰見巖下來巖問什麽處去云親近去巖云亂走作什麽云暫時不在巖云什麽處去來别云好與三十棒東平問官人風作何色無對却問僧僧提起衲衣云者箇在府下鋪平云用多少帛子别云蝦跳不出斗雲門問曹山密密爲什麽不知有山云只爲密密所以不知有别云達磨來也雪峯在國淸拈起鉢盂問座主道得與你鉢盂主云此是化佛邊事别云只恐鈍置和尚峯當時云你作座主奴也未得主云某甲不㑹峯云你問我我與你道座主方禮拜峯便踏倒後座主舉似雲門云某甲得七年方見門云你得七年方見云是别云草賊敗也道吾見雲巖掃地問云太驅驅生巖云須知有不驅驅者吾云恁麽有第二月也别云洎合放過淸峯辭雪峯問甚處去淸峯云識得者漢即知去處云你是了事人亂走作甚麽别云西天斬頭截臂淸峯當時云和尚莫塗汚人好雪云我即塗汚你你道古人吹布毛作麽生淸峯云殘羹餿飯巳有人喫了也雪峯休去師出雪峯語云一死更不再活韶山勘僧云莫便是多口白頭因云不敢韶云多少口云徧身是韶云大小二事向甚處出云韶山口裏别云從來疑著韶山保福到庵主處茶話次庵主云有僧問某甲如何是祖師西來意某竪起拂子不知得不得福云某爭敢道得不得有箇問有人讃嘆此事如虎帶角有人輕毀此事分毫不直一等是恁麽事爲什麽讃毀不同庵主云適來出自偶爾有老宿云毀又爭得又老宿云惜取眉毛師都别云若非和尚證明拂子一生無用石頭大師叅同契予甞覽斯作頗見開士皆摛辭肇極成賛厥道因亦隨興以擬之匪求蝕木於文也噫先覺洪規可洞照遐古豈復情謂逾越於其間哉蓋往往學者抑問勉意不獲而巳其或金沙混流淘之汰之固必存彼匠手明矣竺土大僊心誰是能舉東西密相付惜取眉毛人根有利鈍作麽生道無南北祖且欵欵靈源明皎潔撫掌呵呵枝􅂀闇流注亦未相許執事元是迷展開兩手契理亦非悟拈却了也門門一切境捨短從長廻互不廻互以頭換尾廻而更相渉者箇是拄杖子不爾依位住莫錯認定盤星色夲殊質像豈弁開眸聲元異樂苦還同掩耳闇合上中言心不􅀒人明明淸濁句口冝挂壁四大性自復隨所依如子得其母可知也火熱風動揺春水自消水濕地堅固從旦至暮眼色耳音聲海晏河清鼻香舌醎醋可慿可據然於一一法重報君依根葉分布好明取本末須歸宗唯我能知尊卑用其語不犯之令當明中有暗暗必可明勿以暗相遇明還非覩當暗中有明一見三勿以明相覩無異􅀃明暗各相對若爲分比如前後歩不如此萬物自有功㫖爾寧止當言用及處縱横十字事存凾蓋合子細看理應箭鋒拄莫敎錯承言須會宗未兆非明勿自立規矩突出難弁觸目不㑹道又何妨運足焉知路也不惡進歩非近逺唱彌髙迷隔山河爾和彌寡謹白叅􅀇人聞必同歸光隂莫虚度誠哉是言也眞讚禪定大師虚凝不器有象殊域伊何郢流卓爾原極鷲峯崔嵬蟾輪乍回列刹望重勞生眼開開也誰覩迅振髙古或葉或花自三自五天子褒稱􅀆禪定師而今而後􅀆香風吹集賢殿學士曾侯天石麟豈輕獻日角月角藏億萬當年文陣獲全功不奪龍頭幾人怨若冰大師水之有光非珠澄徹山之有光非玉凝潔若冰大師殊彼淸絶殊􅀆必群絶兮可覩一字根極三千頂住乍曰義龍或稱律虎相對風規分不分金田獨歩君看取清照大師巨海秋碧鼇峯晝寒巧出匠手依依對㸔寳几乍凭花巾非結以熖續熖話月指月古􅀆今兮請試甄别恭首座道離微􅀆誰與隣貌古澹􅀆飛淸塵巖檜蒼蒼經幾春乳竇堂中第一人禪徒寫予幻質復請爲讃辭曰祖佛怨􅀆非其師叢林害􅀆誰相資冰枯雪殘深索索水冷雲澹空纍纍寳聖錯僧瑤知人間天上爭容伊周生強圖夢身予亦不能伏筆上下三指彼此七馬拈花未曾微􅀏何也石謂玉􅀆器必分水淩虚􅀆月非下不知誰是傍觀者又咄者枯枿遽生􅀲葛來自三川欺乎兩浙指鹿爲馬將日作月罪􅀆彌天焉可分􅀃廣慧禪師寥寥雄機落落虚宇本之不兆傳之奚取取旣有規規還倫古凝明􅀌寛垂應萬端海蚌光絶天珠影殘南來北來玄眸可觀安巖山照禪師并序愚昔游漢水抵廬嶽率訪叢室襲禪家流偕象馬蹴踏至於心口憤悱品藻當代誠難其師然非厚誣方來且指掌輪握何取豈斯欵陪老作覩繪眞相古之今之歎恨亡矣髙深莫究其極明晦靡盡其際故時欽依乃勉抉稱詠庶文外之士道存而同歸者也覺雄慧燈記飲光滅光聮不巳龍昌遽絶善續者誰梅峯之師化偃二浙聲流四維大名無當髙讓太白韜晦殊運虚明曠索歸休安巖寒籠翠杉我􅀏方外花非􅀋㘅郢工筆狂梵儀頓舉肩雲頂絲秋蟾夜渚靜應南軒􅀆相對時空生未解􅀆聞斯語開眸凝瞻迅雷不及揜耳瀑泉集竟人去他亦不㢠頌曰聖諦廓然何當辨的對朕者誰還云不識因兹暗渡江豈免生深􅁄闔國人追不再來千古萬古空相憶休相憶清風匝地有何極師顧視左右云這裏還有祖師麽自云有喚來與老僧洗脚舉趙州示衆云至道無難唯嫌揀擇纔有語言是揀擇是明白老僧不在明白裏是汝還護惜也無時有僧問云旣不在明白裏護惜箇什麽州云我亦不知僧云和尚旣不知爲什麽道不在明白裏州云問事即得禮拜了退頌曰至道無難言端語端一有多種二無兩般天際日上月下檻前山深水寒髑髏識盡喜何立枯木龍吟消未乾難難㨂擇明白君自看舉馬大師不安院主問和尚近日尊位如何大師云日靣佛月靣佛頌曰日靣佛月靣佛五帝三皇是何物二十年來曾苦辛爲君幾下蒼龍窟屈堪述明眼衲僧莫輕忽舉德山到潙山挾複子於法堂上從西過東邊從東過西邊顧視云無無便出師著語云勘破了也德山至門首却云也不得草草便具威儀載入相見潙山坐次德山提起坐具云和尚潙山擬取拂子德山便喝拂袖而出師著語云勘破了也德山背却法堂著草鞋便行潙山至晩問首座適來新到在什麽處首座云當時背却法堂著草鞋岀去也潙山云此子巳後向􅀌峯頂上盤結草庵呵佛罵祖去在師著語云雪上加霜頌曰一勘破二勘破雪上加霜曾險墮飛􅀐將軍入虜庭載得完全能幾箇急走過不放過􅀌峯頂上草裏坐咄舉雪峯示衆云盡大地撮來如粟米粒大抛向靣前􅃮桶不㑹打皷普請看頌曰牛頭没馬頭廻曹溪鏡裏絶塵埃打皷看來君不見百花春至爲誰開舉雲門大師垂語云十五日巳前不問汝十五日巳後道將一句來自代云日日是好日頌曰去却一拈得七上下四維無等匹徐行踏斷流水聲縱觀冩出飛禽跡草茸茸煙􅇈􅇈空生巖畔花狼藉彈指堪悲舜􅀂多莫動著動著三十棒舉僧問法眼慧超咨和尚如何是佛法眼云汝是慧超頌曰江國春風吹不起鷓鴣啼在深花裏三級浪髙魚化龍癡人猶戽夜塘水舉翠巖夏末示衆云一夏巳來爲兄弟說話看翠巖眉毛在麽保福云作賊人心虛長慶云生也雲門云關頌曰翠巖示徒千古無對關字相酬失錢遭罪潦倒保福抑揚難得嘮嘮翠巖分明是賊白珪無玷誰辨眞假長慶相諳眉毛生也舉僧問趙州如何是趙州州云東門南門西門北門頌曰句裏呈機劈靣來爍迦羅眼絶纎埃東南西北門相對無限輪鎚擊不開舉睦州問僧近離什麽處僧便喝州云老僧􅀍汝一喝僧又喝州云三喝四喝後作麽生僧無語州便打云這掠虚漢頌曰兩喝與三喝作者知機變􅀂謂􅀐虎頭二俱成瞎漢誰瞎漢拈來天下與人看舉黄蘗和尚示衆云汝等諸人盡是噇酒糟漢與麽行脚何處有今日還知大唐國裏無禪師麽時有僧出云只如諸方匡徒領衆又作麽生蘗云不道無禪只是無師頌曰凛凛􅀌風不自誇端居寰海定龍蛇大中天子曾輕觸三度親遭弄爪牙舉僧問洞山如何是佛山云麻三斤頌曰金烏急玉兎速善應何曾有輕觸展事投機見洞山跛鼈盲􅀛入空谷花蔟蔟錦蔟蔟南地竹􅀆北地木因思長慶陸大夫解道合􅀏不合哭咦舉僧問巴陵如何是提婆宗巴陵云銀椀裏盛雪頌曰老新開端的别解道銀椀裏盛雪九十六箇應自知不知却問天邊月提婆宗提婆宗赤幡之下起清風舉僧問雲門如何是一代時教門云對一說頌曰對一說太􅀌絶無孔鐵鎚重下楔閻浮樹下􅀏呵呵昨夜驪龍拗角折别别韶陽老人得一橛舉僧問雲門不是目前機亦非目前事時如何雲門云倒一說頌曰倒一說分一節同死同生爲君决八萬四千非鳯毛三十三人入虎穴别别擾擾忩忩水裏月舉僧問鏡清學人啐請師啄淸云還得活也無僧云􅀂不活遭人恠􅀏清云也是草裏漢頌曰古佛有家風對揚遭貶剥子母不相知是誰同啐啄啄覺猶在殻重遭撲天下衲僧徒名邈舉僧問香林如何是祖師西來意林云坐乆成勞頌曰一箇兩箇千萬箇脫却籠頭卸角䭾左轉右轉隨後來紫胡要打劉鐵磨舉肅宗帝問忠國師百年後所須何物國師云與老僧作箇無縫塔帝曰請師塔様國師良乆云㑹麽帝云不㑹國師云吾有付法弟子躭源却諳此事請詔問之國師遷化後肅宗帝詔躭源問此意如何源云相之南潭之北師云獨掌不浪鳴中有黄金充一國山形拄杖子無影樹下合同舩海晏河淸琉璃殿上無知識拈了也頌曰無縫塔見還難澄潭不許蒼龍蟠層落落影團團千古萬古與人看舉俱胝和尚凡有所問只竪一􅃌頌曰對掦深愛老俱胘宇宙空來更有誰曾向滄溟下浮木夜濤相共接盲􅀛舉龍牙問翠微如何是祖師西來意微云與我過禪板來牙取禪板與翠微微接得便打牙云打即任打要且無祖師意又問林際如何是祖師西來意際云與我過蒲團來牙取蒲團與臨際際接得便打牙云打即任打要且無祖師意頌曰龍牙山裏龍無眼死水何曾振古風禪板蒲團不能用只應分付與盧公師拈云這老漢也未得勦絶復成頌曰盧公付了亦何慿坐􅀝休將繼祖燈堪對暮雲歸未合逺山無限碧層層舉僧問智門蓮花未出水時如何智門云蓮花僧云出水後如何智門云荷葉頌曰蓮花荷葉報君知出水何如未出時江北江南問王老一狐疑了一狐疑舉雪峯示衆云南山有一條鼈鼻蛇汝等諸人切須好看長慶出云今日堂中大有人喪身失命僧舉似􅀇沙沙云須是稜兄始得然雖如此我即不與麽僧云和尚作麽生沙云用南山作麽雲門以拄杖攛向雪峯靣前作怕勢頌曰􅁚骨巖髙人不到到者須是弄蛇手稜師備師不柰何喪身失命有多少韶陽知重撥草南北東西無處討忽然突出拄杖頭抛對雪峯大張口大張口􅀆同閃電剔起眉毛還不見如今藏在乳峯前來者一一看方便師髙聲喝云看脚下舉保福長慶遊山次福以手指云只這裏便是妙峯頂慶云是即是可惜許師著語云今日共這漢遊山啚什麽復云百千年後不道無只是少後舉似鏡清清云若不是孫公便見髑髏徧野頌曰妙峯􅀌頂草離離拈得分明付與誰不是孫公辨端的髑髏著地幾人知舉劉鐵磨到潙山山云老牸牛汝來也磨云來日臺山大㑹齋和尚還去麽山放身卧磨便出去頌曰曾􅀐鐵馬入重城勑下傳聞六國清猶握金鞭問歸容夜深誰共御街行舉蓮花峯庵主拈拄杖示衆云古人到這裏爲什麽不肯住衆無語自云爲他途路不得力復云畢竟如何又自云楖栗橫擔不顧人却入千峯萬峯去頌曰眼裏塵沙耳裏土千峯萬峯不肯住落花流水太茫茫剔起眉毛何處去舉僧問百丈如何是竒特事丈云獨坐大雄山僧禮拜丈便打頌曰祖域交馳天馬駒化門舒卷不同途電光石火存機變堪􅀏人來捋虎鬚舉僧問雲門樹凋葉落時如何門云體露金風頌曰問旣有宗荅亦攸同三句可辨一鏃遼空大野􅀆涼飊䬃䬃長天􅀆踈雨濛濛君不見少林乆坐未歸客静依熊耳一叢叢舉南泉叅百丈􅄺槃和尚丈問從上諸聖還有不爲人說底法麽泉云有丈云作麽生是不爲人說底法泉云不是心不是佛不是物丈云說了也泉云某甲只與麽和尚作麽生丈云我又不是善知識争知有說不說泉云某甲不會丈云我大煞爲汝說也頌曰祖佛從來不爲人衲僧今古􅔡頭走明鏡當臺列象殊一一靣南看北斗斗柄垂無處討拈得鼻孔失却口舉僧問大隨刼火洞然大千俱壞未審這箇壞不壞隨云壞僧云與麽則隨他去也隨云隨他頌曰劫火光中立問端衲僧猶滯兩重關可憐一句隨他語萬里區區獨往還舉僧問趙州承聞和尚親見南泉是否州云鎭州出大蘿蔔頭頌曰鎭州出大蘿蔔天下衲僧取則只知自古自今争辨鵠白烏黒賊賊衲僧鼻孔曾拈得舉麻谷持錫到章敬遶繩床三匝振錫一下卓然而立章敬云是是師著語云錯麻谷又到南泉遶繩床三匝振錫一下卓然而立泉云不是不是師著語云錯谷當時云章敬道是和尚爲什麽道不是泉云章敬即是是汝不是此是風力所轉終成敗壞頌曰此錯彼錯切忌拈却四海浪平百川潮落古䇿風髙十二門門門有路空蕭索非蕭索作者好求無病藥舉定上座問臨際如何是佛法大意際下繩床擒住與一掌便托開定佇立傍僧云定上座何不禮拜定方禮忽然大悟頌曰斷際全機繼後蹤持來何必在從容巨靈擡手無多子分破華山千萬重舉陳操尚書看資福福見來便畫一圎相陳操云弟子恁麽來早是不著便更畫圎相資福便掩却門師云陳操只具一􅃗眼頌曰團團珠繞玉􅃢􅃢馬載驢駞上鐵舩分付海山無事客鈞鼇時下一棬攣師復云天下衲僧跳不出舉仰山問僧近離甚處僧云廬山仰山云曾到五老峯麽僧云不曾到仰山云闍梨不曾遊山雲門云此語皆爲慈悲之故有落草之譚頌曰出草入草誰解㝷討白雲重重紅日杲杲左顧無暇右眄巳老君不見寒山子行太早十年歸不得忘却却來時道舉文殊問無著近離甚處著云南方殊云南方佛法如何住持著云末法比丘少奉戒律殊云多少衆著云或三百或五百著問此間如何住持殊云凡聖同居龍蛇混雜著云多少衆殊云前三三後三三頌曰千峯盤屈色如藍誰謂文殊是對譚堪􅀏淸涼多少衆前三三與後三三舉長沙一日遊山歸至門首首座問和尚什麽處去來沙云遊山來座云到什麽處來沙云始隨芳草去又逐落花㢠座云大似春意沙云也勝秋露滴芙蕖師著語云謝荅話頌曰大地絶纎埃何人眼不開始隨芳草去又逐落花㢠嬴鶴翹寒木狂猿嘯古臺長沙無限意咄舉槃山垂語云三界無法何處求心頌曰三界無法何處求心白雲爲蓋流泉作琴一曲兩曲無人㑹􅀨過夜堂秋水深舉風穴在郢州衙内上堂云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時有盧陂長老出問某甲有鐵牛之機請師不搭印風穴云慣釣鯨鯢澄巨浸却嗟蛙歩􅕁泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云還記話頭麽試舉看盧陂擬開口穴又打一拂子牧主云佛法與王法一般穴云見箇什麽牧主云當斷不斷返招其亂穴便下座頌曰擒得盧陂跨鐵牛三􅀇戈甲未輕酬楚王城畔朝宗水喝下曾令却倒流舉僧問雲門如何是清淨法身門云花藥欄僧云便與麽去時如何門云金毛師子頌曰花藥欄莫顢頇星在秤兮不在盤便與麽太無端金毛師子大家看舉陸亘大夫與南泉語話次夫云肇法師道天地同根萬物一體也甚竒恠南泉指庭前花召大夫云時人見此一株花如夢相似頌曰聞見覺知非一一山河不在鏡中觀霜天月落夜將半誰共澄潭照影寒舉趙州問投子大死底人却活時如何投子云不許夜行投明須到頌曰活中有眼還同死藥忌何須鑒作家古佛尚言曾未到不知誰解撒塵沙舉龐居士辭藥山山命十人禪客相送至門首士指空中雪云好雪片片不落别處時有全禪客云落在什麽處士打一掌全云居士也不得草草士云汝恁麽稱禪客閻老子未放汝在全云居士作麽生士又打一掌云眼見如盲口說如啞師别初問處但握雪團便打頌曰雪團打雪團打龐老機關没可把天上人閒不自知眼裏耳裏絶蕭灑蕭灑絶碧眼胡僧難辨别舉僧問洞山和尚寒暑到來如何㢠避山云何不向無寒暑處僧云如何是無寒暑處山云寒時寒殺闍梨熱時熱殺闍梨頌曰垂手還同萬仞崖正偏何必在安排琉璃古殿照明月忍俊韓獹空上階舉禾山垂語云習學謂之聞絶學謂之隣過此二者是爲眞過僧出問如何是眞過山云解打皷問如何是眞諦山云解打皷問即心即佛即不問如何是非心非佛山云解打皷問向上人來如何接山云解打皷頌曰一拽石二般土發機須是千鈞弩象骨老師曾輥毬爭似禾山解打皷報君知莫莽鹵甜者甜􅀆苦者苦舉僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤頌曰編辟曽挨老古錐七斤衫重幾人知如今抛擲西湖裏下載清風付與誰舉鏡清問僧門外什麽聲僧云雨滴聲清云衆生顚倒迷已逐物僧云和尚作麽生清云洎不迷已僧云洎不迷已意旨如何清云出身猶可易脫體道應難頌曰虚堂雨滴聲作者難酬對􅀂謂曾入流依前還不㑹㑹不㑹南山北山轉霶霈舉僧問雲門如何是法身門云六不収頌曰一二三四五六碧眼胡僧數不足少林謾道付神光卷衣又說歸天竺天竺茫茫無處㝷夜來却對乳峯宿舉王太傅入招慶煎茶時朗上座與明招把銚朗飜却茶銚太傅見問上座茶爐下是什麽㓪云捧爐神太傅云旣是捧爐神爲什麽飜却茶朗云仕官千日失在一朝太傅拂袖便去明招云朗上座喫却招慶飯了却江外打野榸朗云上座作麽生招云非人得其便師云當時但踏倒茶爐頌曰來問􅀂成風應機非善巧可悲獨眼龍曾未呈牙爪牙爪開生雲雷逆水之波經幾廻舉三聖問雪峯透網金鱗未審以何爲食峯云待汝出網來向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事煩頌曰透網金鱗休云滯水揺乾蕩坤振鬛擺尾千尺鯨噴洪浪飛一聲雷振清飊起清飊起天上人閒知幾幾舉僧問雲門如何是塵塵三昧門云鉢裏飯桶裏水頌曰鉢裏飯桶裏水多口阿師難下觜北斗南星位不殊白浪滔天平地起擬不擬止不止箇箇無裩長者子舉雪峯住庵時有兩僧來禮拜峯見來以手托庵門放身出云是什麽僧亦云是什麽峯低頭歸庵僧後到巖頭頭問什麽處來僧云嶺南來頭云曾到雪峯麽僧云曾到頭云有何言句僧舉前話頭云他道什麽僧云他無語低頭歸庵頭云噫我當初悔不向他道末後句􅀂向伊道天下人不奈雪老何僧至夏末載舉前話請益頭曰何不早問僧云未敢容易頭云雪峯雖與我同條生不與我同條死要識末後句只這是頌曰末後句爲君說明暗􅀟􅀟底時節同條生也共相知不同條死還殊絶還殊絶黃頭碧眼須甄别南北東西歸去來夜深同看千巖雪舉僧問趙州乆響趙州石橋到來只見略彴州云汝只見略彴不見石橋僧云如何是石橋州云渡驢渡馬頌曰􅀌危不立道方髙入海還須釣巨鼇堪􅀏同時灌溪老解云劈箭亦徒勞舉馬大師與百丈行次見野鴨子飛過大師云是什麽丈云野鴨子大師云什麽處去也丈云飛過去也大師遂扭百丈鼻頭丈作忍痛聲大師云何曾飛去頌曰野鴨子知何許馬祖見來相共語話盡山雲海月情依前不㑹還飛去欲飛去却把住道道舉雲門問僧近離甚處僧云西禪門云西禪近日有何言句僧展兩手門打一掌僧云某甲話在門却展兩手僧無語門便打頌曰虎頭虎尾一時収凛凛威風四百州却問不知何太險師云放過一著舉道吾與漸源至一家吊慰源拍棺木云生耶死耶吾云生也不道死也不道源云爲什麽不道吾云不道不道㢠至中路源云和尚快與某甲道􅀂不道打和尚去吾云打即任打道即不道源便打後道吾遷化源至石霜舉似前話霜云生也不道死也不道源云爲什麽不道霜云不道不道源於言下有省一日將鍬子於法堂上東邊過西邊西邊過東邊霜云作什麽源云覔先師靈骨霜云洪波浩渺白浪滔天覔什麽先師靈骨師著語云蒼天蒼天源云正好著力太原孚云先師靈骨猶在頌曰兎馬有角牛羊無角絶毫絶􅁵如山如嶽黃金靈骨今猶在白浪滔天何處著無處著􅃗履西歸曾失却舉良禪客問欽山一鏃破三關時如何云放出關中主看良云與麽則知過必改山云更待何時良云好箭放不著所在便出山云且來闍梨良廻首山把住云一鏃破三關即且致試與欽山發箭看良擬議山打七棒云且聽這漢疑三十年頌曰與君放出關中主放箭之徒莫莽鹵取箇眼􅀆耳必聾捨箇耳􅀆目􅀟􅎩可憐一鏃破三關的的分明箭後路君不見玄沙有言􅀆大丈夫先天爲心祖舉僧問趙州至道無難唯嫌揀擇如何是不揀擇州云天上天下唯我獨尊僧云此猶是揀擇州云田厙奴什麽處是揀擇僧無語頌曰似海之深如山之固蚊蝱弄空裏猛風螻蟻撼於鐵柱揀􅀆擇􅀆當軒布皷舉僧問趙州至道無難唯嫌揀擇是時人窠窟否州云曾有人問我直得五年分踈不下頌曰象王嚬呻師子哮吼無味之譚塞斷人口南北東西烏飛兎走舉僧問趙州至道無難唯嫌揀擇纔有語言是揀擇和尚如何爲人州云何不引盡這語僧云某甲只念到這裏州云只這至道無難唯嫌揀擇頌曰水灑不著風吹不入虎歩龍行􅀑號神泣頭長三尺知是誰相對無言獨足立舉雲門以拄杖示衆云拄杖子化爲龍吞却乾坤了也山河大地甚處得來頌曰拄杖子吞乾坤徒說桃花浪奔燒尾者不在拏雲霧曝鰓者何必喪膽忘䰟拈了也聞不聞直須灑灑落落休更紛紛紜紜七十二棒且輕恕一百五十難放君師驀拈拄杖下座大衆一時走散舉風穴垂語云􅀂立一塵家國興盛不立一塵家國喪亡師拈拄杖云還有同生同死底衲僧麽頌曰野老從敎不展眉且啚家國立雄基謀臣猛將今何在萬里風清秖自知舉雲門垂語云乾坤之內宇宙之間中有一寳袐在形山拈燈籠向佛殿裏將三門來燈籠上頌曰看看古岸何人把釣竿雲冉冉水漫漫明月蘆花君自看舉南泉一日東西堂猫兒南泉見遂提起云道得即不斬衆無對泉斬却猫兒爲兩段頌曰兩堂俱是杜禪和撥動煙塵不奈何頼得南泉能舉令一刀兩段任偏頗南泉復舉前話問趙州州便脫草鞋於頭上戴出泉云子􅀂在恰救得猫兒頌曰公案圎來問趙州長安城裏任閑遊草鞋頭戴無人㑹歸到家山便即休舉外道問佛不問有言不問無言世尊良乆外道讃歎云世尊大慈大悲開我迷雲令我得入外道去後阿難問佛云外道有何所證而言得入佛云如世良馬見鞭影而行頌曰機輪曾未轉轉必兩頭走明鏡忽臨臺當下分妍醜妍醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得廻喚得廻鳴指三下舉僧問大龍色身敗壞如何是堅固法身龍云山花開似錦澗水湛如藍頌曰問曾不知荅還不會月冷風髙古巖寒檜堪􅀏路逢逹道人不將語黙對手把白玉鞭驪珠盡擊碎不擊碎増瑕纇國有憲章三千條罪舉雲門大師垂語云古佛與露柱相交是第幾機自代云南山起雲北山下雨頌曰南山雲北山雨四七二三面相覩新羅國裏曾上堂大唐國裏未打皷苦中樂樂中苦誰道黃金如糞土舉巖頭問僧什麽處來僧云西京來頭云黃巢過後還收得劒麽僧云收得巖頭引頸近前云㘞僧云師頭落也巖頭呵呵大􅀏僧後到雪峯峯問什麽處來僧云巖頭來峯云有何言句僧舉前話雪峯打三十趂出頌曰黃巢過後曾收劒大􅀏還應作者知三十山藤且輕恕得便冝是落便冝舉梁武帝請傅大士講經大士便於座上揮案一下便下座武帝愕然志公問陛下還㑹麽帝云不㑹公云大士講經竟頌曰不向􅀟林􅀉此身卻於梁土惹埃塵當時不得志公老也是恓恓去國人舉仰山問三聖汝名什麽聖云慧寂山云慧寂是我聖云我名慧然仰山呵呵大􅀏頌曰􅀟收􅀟放􅀂爲宗􅀐虎由來要絶功􅀏罷不知何處去只應千古動悲風舉南泉歸宗麻谷同去禮拜忠國師至路南泉於地上畫一圎相云道得即去歸宗於圎相中坐麻谷便作女人拜泉云漝麽則不去也宗云是什麽心行頌曰由基箭射猿遶樹何太直千箇與萬箇是誰曾中的相喚相呼歸去來曹溪路上休豋陟復云曹溪路坦平爲什麽休登陟舉潙山五峯雲巖同侍立百丈百丈問潙山併却咽喉唇吻作麽生道潙山云却請和尚道百丈云我不辭向汝道恐巳後喪我兒孫頌曰却請和尚道虎頭生角出荒草十洲春盡花凋殘􅃢瑚樹林日杲杲舉百丈復問五峯併却咽喉唇吻作麽生道五峯云和尚也須併却百丈云無人處斫額望汝頌曰和尚也併却龍蛇陣上看謀略令人長憶李將軍萬里天邊飛一鶚舉百丈又問雲巖併却咽喉唇吻作麽生道雲巖云和尚有也未百丈云喪我兒孫頌曰和尚有也未金毛師子不踞地兩兩三三舊路行大雄山上空彈􅃌舉僧問馬大師離四句絶百非請師直指某甲西來意馬師云我今日勞倦不能爲汝說問取智藏去僧問智藏藏云何不問和尚僧云和尚教來問智藏云我今日頭痛不能爲汝說問取海兄去僧問海海云我到這裏却不㑹僧舉似馬大師馬師云藏頭白海頭黒頌曰藏頭白海頭黒明眼衲僧㑹不得馬駒踏殺天下人臨際者是白拈賊離四句絶百非天上人閒唯我知舉金牛和尚每至齋時自將飯於僧堂前作舞呵呵大􅀏云菩薩子喫飯來師云雖然如此金牛不是好心僧問長慶古人道菩薩子喫飯來意􅈲如何長慶云大似因齋慶讃頌曰白雲影裏􅀏呵呵兩手持來付與他􅀂是金毛師子子三千里外見誵訛舉僧問大光長慶道因齋慶讃意旨如何大光作舞僧禮拜光云見箇什麽便禮拜僧作舞光云這野狐精頌曰前箭猶輕後箭深誰云黃葉是黃金曹溪波浪如相似無限平人􅀍陸沉舉鹽官一日喚侍者與我將犀牛扇子來侍者云扇子破也官云扇子旣破還我犀牛兒來侍者無對投子云不辭將出恐頭角不全師拈云我要不全底頭角石霜云􅀂還和尚即無也師拈云犀牛兒猶在資福畫一圎相於中書一牛字師拈云適來爲什麽不將出保福云和尚年尊别請人好師拈云可惜勞而無功頌曰犀牛扇子用多時問著元來㹅不知無限清風與頭角盡同雲雨去難追師復云􅀂要清風再覆頭角重生請禪客下一轉語問云扇子旣破還我犀牛兒來時有僧出云大衆參堂去師喝云抛鈎釣鯤鯨釣得箇蝦䗫便下座舉丗尊一日陞座文殊白槌云諦觀法王法法王法如是丗尊便下座頌曰列聖叢中作者知法王法令不如斯㑹中􅀂有仙陀客何必文殊下一槌舉僧從定州和尚㑹裏到烏臼烏臼問定州法道何似這裏僧云不别臼云􅀂不别更轉彼中去便打僧云棒頭有眼不得草草打人臼云今日打著一箇也又打三下僧便出去臼云屈棒元來有人喫在僧轉云爭奈杓柄在和尚手裏臼云汝􅀂要山僧廻與汝僧近前奪臼手中棒打臼三下臼云屈棒屈棒僧云有人喫在臼云草草打著箇漢僧便禮拜臼云却與麽去也僧大􅀏而出臼云消得漝麽消得漝麽頌曰呼即易遣即難互換機鋒子細看劫石固來猶可壞滄溟深處立須乾烏臼老烏臼老幾何般與他杓柄太無端舉丹霞問僧甚處來僧云山下來霞云喫飯也未僧云喫飯了也霞云將飯與汝喫底人還具眼麽僧無語長慶問保福將飯與人喫報恩有分爲什麽不具眼福云施者受者二俱瞎漢慶云盡其機來還成瞎否福云道我瞎得麽頌曰盡機不成瞎按牛頭喫草四七二三諸祖師寳器持來成過咎過咎深無處㝷天上人間同陸沉舉僧問雲門如何是超佛越祖之譚門云餬餅頌曰超譚禪客問偏多縫鏬披離見也麽餬餅􅩵來猶不住至今天下有誵訛舉古有十六開士於浴僧時隨例入室忽悟水因諸禪德作麽生會他道妙觸宣明成佛子住也須七穿八穴始得頌曰了事衲僧消一箇長連床上展脚卧夢中曾說悟圓通香水洗來驀靣唾舉僧問投子一切聲是佛聲是否投子云是僧云和尚莫㞘沸椀鳴聲子便打又問麤言及細語皆歸第一義是否子云是僧云喚和尚作一頭驢得麽子便打頌曰投子投子機輪無阻放一得二同彼同此可憐無限弄潮人畢竟還落潮中死忽然活百川倒流閙􅣇􅣇舉僧問趙州和尚初生孩子還具六識也無州云急水上打毬子僧復問投子急水上打毬子意􅈲如何子云念念不停流頌曰六識無功伸一問作家曾共辨來端茫茫急水打毬子落處不停誰解看舉僧問藥山平田淺草塵鹿成羣如何射得塵中塵山云看箭僧放身便倒山云侍者拖出僧便走山云弄泥團漢有什麽限師拈云三歩雖活五歩須死頌曰塵中塵君看取下一箭走三歩五歩􅀂活成羣趂虎正眼從來付獵人師髙聲云看箭舉維摩詰問文殊師利何等是菩薩入不二法門文殊師利曰如我意者於一切法無言無說無示無識離諸問荅是爲入不二法門於是文殊師利問維摩詰我等各自說巳仁者當說何等是菩薩入不二法門師云維摩道什麽復云勘破了也頌曰咄這維摩老悲生空懊惱卧疾毗耶離全身太枯槁七佛祖師來一室且頻掃請問不二門當時便靠倒不靠倒金毛師子無處討舉僧到桐峯庵主處便問這裏忽逢大蟲又作麽生庵主便作虎聲僧便作怕勢庵主呵呵大􅀏僧云這老賊主云爭奈老僧何僧休去師云是即是兩箇惡賊只解掩耳偷鈴頌曰見之不取思之千里好箇班班爪牙未備君不見大雄山下忽相逢落落聲光皆振地大丈夫見也無収虎尾兮捋虎鬚舉雲門大師垂語云人人盡有光明在看時不見暗昏昏作麽生是諸人光明自代云厨庫三門又云好事不如無頌曰自照列􅀌明爲君通一線花謝樹無影看時誰不見見不見倒􅀐牛兮入佛殿舉雲門大師示衆云藥病相治盡大地是藥那箇是自已頌曰盡大地是藥古今何太錯閉門不造車通途自寥廓錯錯鼻孔遼天亦穿却舉玄沙示衆云諸方老宿盡道接物利生忽遇三種病人來作麽生接患盲者拈槌竪拂他又不見患聾者語言三昧他又不聞患瘂者教伊說又說不得且作麽生接􅀂接此人不得佛法無靈驗僧請益雲門門云汝禮拜著僧禮拜起門以拄杖便挃僧退後門云汝不是患盲復喚近前來僧近前門云汝不是患聾乃云還㑹麽僧云不㑹門云汝不是患瘂其僧於此有省頌曰盲聾音瘂沓絶機冝天上天下堪􅀏堪悲離朱不辨正色師曠豈識玄􅁝爭如獨坐虚䆫下葉落花開自有時復云還㑹也無無孔鐵鎚舉雲巖問道吾大悲菩薩用許多手眼作什麽吾云如人夜半背手摸枕子巖云我㑹也吾云汝作麽生㑹巖云徧身是手眼吾云道即大殺道只得八成巖云師兄作麽生吾云通身是手眼頌曰徧身是通身是拈來猶較十萬里展翅崩騰六合雲搏風皷蕩四溟水是何埃塏兮忽生那箇毫􅁵兮未止君不見網珠垂範影重重棒頭手眼從何起喝舉僧問智門如何是般􅀂體門云蚌含明月僧云如何是般􅀂用門云兎子懷胎頌曰一片虚凝絶謂情天人從此見空生蚌含玄兎深深意曾與禪家作戰爭舉楞嚴經云吾不見時何不見吾不見之處􅀂見不見自然非彼不見之相􅀂不見吾不見之地自然非物云何非汝頌曰全象全牛翳不殊從來作者共名模如今要見黃頭老刹刹塵塵在半途舉長慶有時云寧說阿羅漢有三毒不說如來有二種語不道如來無語只是無二種語保福云作麽生是如來語慶云聾人爭得聞保福云情知汝向第二頭道長慶云作麽生是如來語保福云喫茶去頌曰頭兮第一第二卧龍不鑒止水無處有月波澄有處無風浪起稜禪客稜禪客三月禹門遭􅀧額舉趙州示衆三轉語頌曰泥佛不度水神光照天地立雪如未休何人不雕僞金佛不度爐人來訪紫胡牌中數箇字淸風何處無木佛不度火常思破竈墮杖子忽擊著方知辜􅀒我舉金剛經云􅀂爲人輕賤是人先丗罪業應墮惡道以今世人輕賤故先世罪業則爲消滅頌曰明珠在掌有功者賞胡漢不來全無􅇊倆􅇊倆旣無波旬失途瞿曇瞿曇識我也無復云勘破了也舉天平依和尚行脚時叅西院常云莫道㑹佛法覔箇舉話人也無一日西院遥見召云從依平舉頭西院云錯平行三兩歩西院又云錯平近前西院云適來這兩錯是西院錯上座錯平云從依錯西院云錯平休去西院云且在這裏過夏待共上座商量這兩錯平當時便行後住謂衆云我當初行脚時􅀍風吹到思明長老處連下兩錯更留我過夏待共我商量我不道恁麽時錯發足南方去時早知道錯了也頌曰禪家流愛輕薄滿肚叅來用不著堪悲堪􅀏天平老却謂當初悔行脚錯錯西院淸風頓銷鑠復云忽有箇衲僧出云錯雪竇錯何似天平錯舉肅宗帝問忠國師如何是十身謂御師云檀越踏毗盧頂上行帝云寡人不㑹師云莫認自已淸淨法身一國之師亦強名南陽獨許振嘉聲大唐扶得眞天子曾踏毗盧頂上行鐡鎚擊碎黃金骨天地之閒更何物三千刹海夜澄澄不知誰入蒼龍窟舉僧問巴陵如何是吹毛劒陵云􅃢瑚枝枝撑著月頌曰要平不平大巧􅀂拙或指或掌􅀝天照雪大冶兮磨礱不下良工兮拂拭未歇別別􅃢瑚枝枝撑著月雪竇顯和尚頌古一百則竟叅學仙都沙門􅂤能校勘
