front:
  text: 雪竇和尚拈古
  hash: sha256:b69c0e789390c06a418c8b44962e8c7004de14f586be7b18aaa5ab7dc5268f25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0033_SBCK_001-1a}
body:
  text: 參學小師允誠思恭集序至像不形無以應群動圎音非扣無以發異聞苟稱謂之迹遽明必佛祖之機曠達師自壬申歲入夏抵秋旦暮拈提抑揚今古可一百餘則實不請之友者也崇崇之山浩浩之海分嶮列濬愧我不知其極但集而流諸凡著序文仰俟來哲師舉德山示衆云今夜不答話問話者三十棒時有僧出禮拜山便打僧云某甲話也未問山云爾是甚處人云新羅人山云未踏船舷好與三十棒法眼拈云大小德山話作兩橛圎明道大小德山龍頭蛇尾師云二老宿雖善裁長補短舍重從輕要見德山亦未可何故德山大似握閫外威權有當斷不斷不招其亂底劒諸人要識新羅僧麼只是撞著露拄底箇瞎漢舉雪峯一日普請自負一束藤路逢一僧峯便拋下僧方擬取峯便踏倒歸舉似長生乃云我今日踏者僧快生云和尚替這僧入涅槃堂始得峯便休去師云長生大似東家人死西家助哀也好與一踏舉百丈再參馬祖侍立次祖以目視禪牀角頭拂子丈云即此用離此用祖云爾他後開兩片皮將何為人丈取拂子豎起祖云即此用離此用丈挂拂子於舊處祖便喝百丈直得三日耳聾師云竒怪諸禪德如今列其派者甚多究其源者極少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差若是明眼漢瞞他一點不得只如馬祖道爾他後開兩片皮將何為人百丈豎起拂子為復如蟲禦木為復啐啄同時諸人要㑹三日耳聾麼大冶精金應無變色舉崇壽指凳子云識得凳子周匝有餘雲門云識得凳子天地懸殊師云澤廣藏山理能伏豹舉永嘉大師到六祖繞禪牀三匝振錫一下卓然而立祖云夫沙門具三千威儀八萬細行大德從何方而來生大我慢師便喝乃云當時若下得者一喝免見龍頭蛇尾又再舉繞禪牀三匝振錫一下卓然而立代祖師云未到曹溪與爾三十棒了也舉仰山指雪師子云還有過得此色者麼雲門云當時便與推倒師云只解推倒不能扶起舉香嚴垂語云如人上樹口銜樹枝手不攀枝腳不踏樹樹下有人問西來意不對則違他所問若對又喪身失命當恁時作麼生即是有虎頭上座云上樹即不問未上樹請和尚道嚴呵呵大笑師云樹上道即易樹下道即難老僧上樹也致將一問來舉僧問魯祖如何是不言言祖云爾口在什麼處僧云某甲無口祖云將什麼喫飯僧無語師云好劈脊便棒者般漢開口了合不得合口了開不得舉僧問雪峯古㵎寒泉時如何峯云瞪目不見底僧云飲者如何峯云不從口入僧舉到趙州州云不可從鼻孔裏入僧却問趙州古㵎寒泉時如何州云苦云飲者如何州云死雪峯聞舉云趙州古佛從此不答話師云衆中㹅道雪峯不出者僧問頭所以趙州不肯如斯話會深屈古人雪竇即不然斬釘截鐵本分宗師就下平髙難為作者舉僧問西堂和尚有問有答賔主歷然無問無答時如何堂云怕爛却去那僧問長慶有問有答賔主歷然無問無答時如何慶云相逢盡道休官去林下何曾見一人師云何不與本分草料舉林際示衆云我於先師處三度喫六十棒如蒿枝子拂相似如今思一頓棒喫誰為下手僧出衆云某甲下手際拈棒與僧僧擬接際便打師云林際放處較危收來太速舉欽山一日上堂竪起拳又開云開即為掌五指參差復握云如今為拳必無髙下還有商量也無一僧出衆竪起拳山云爾只是箇無開合漢師云雪竇即不然乃竪拳云握則為拳有髙有下復開云開則成掌無黨無偏且道放開為人好把定為人好開也造車握也合轍若謂閇門造車出門合轍我也知爾向鬼窟裏作活計舉僧問睦州髙揖釋迦不拜彌勒時如何州云昨日有人問趕出了也僧云和尚恐專甲不實州云拄杖不在苕菷柄聊與三十師云睦州只有受璧之心且無割城之意舉棗樹問僧近離甚處云漢國樹云漢國天子還重佛法也無僧云苦哉賴值問著某甲問著别人即禍生云作箇什麼僧云人尚不見有何佛法可重云闍梨受戒多少時僧云二十夏云大好不見有人便打師云者僧棒即喫要且去不再來棗樹令雖行爭奈無風浪起舉趙州問婆子什麼處去云偷趙州笋去州云忽遇趙州又作麼生婆子便掌州便休去師云好掌更下兩掌也無勘處舉保壽開堂日三聖推出一僧壽便打聖云漝麼為人瞎却鎮州一城人眼去在壽便歸方丈師云保壽三聖雖發明林際正法眼藏要且只解無佛處稱尊當時者僧若是箇漢才𬒳推出便掀倒禪牀直饒保壽全機也較三千里舉無業馬祖僧問如何是佛云莫妄想師云塞却鼻孔又問如何是佛云即心是佛師云拄却舌頭舉僧問德山從上諸聖什麼處去山云作麼作麼僧云勑點飛龍馬跛鱉出頭來山便休去至來日山浴出其僧過茶與德山山撫僧背一下僧云者老漢方始瞥地師云然精金百煉須要本分鉗鎚德山既以巳妨人者僧還同受屈以拄杖一劃云適來公案且致從上諸聖什麼處去大衆擬議師一時打趂舉保福簽瓜次太原孚上座到來福云道得與爾瓜喫孚云把將來福度一片瓜與孚孚接得便去師云雖是死蛇解弄也活誰是好手者試請辨看舉南泉示衆云道非物外物外非道趙州出問如何是物外道泉便打州云和尚莫打某甲向後錯打人去在泉云龍蛇易辨衲子難瞞師云趙州如龍無角似蛇有足當時不管盡法無民直須喫棒了趂出舉洞山到雲門門問近離甚處山云查渡云夏在甚處山云湖南報慈云甚時離山云去年八月門云放爾三頓棒山至來日却上問訊昨日蒙和尚放三頓棒不知過在什麼處門云飯袋子江西湖南便漝麼去山於此大悟師云雲門氣宇如王拶著便冰消瓦解當時若據令而行子孫也未到斷絶舉一僧參馬大師師畫一圎相云入也打不入也打僧便入師便打僧云和尚打某甲不得大師靠却拄杖休去師云二俱不了和尚打某甲不得靠却拄杖擬議不來劈脊便打舉興化問剋賔維那不久為唱道之首賔云不入者保社化云㑹來不入不會不入賔云沒交涉化便打乃云剋賔維那法戰不勝罰錢五貫充設饡飯至來日齊時興化自白槌云剋賔維那法戰不勝不得喫飯即便趕出師云剋賔要承嗣興化罰錢出院且致却須索取者一頓棒始得且問諸人棒既喫了作麼生索雪竇要斷不平之事今夜與剋賔維那雪屈以拄杖一時打散舉僧問長慶衆手淘金誰是得者慶云有伎倆者得僧云學人還得也無慶云大逺在師代者僧當時便喝復云有伎倆者得一手分付有伎倆者不得兩手分付學人還得也無蒼天蒼天舉大慈示衆云山僧不解答話只是識病時有僧出大慈便歸方丈師云大凡扶竪宗乘須辨箇得失且大慈識病不答話時有僧出便歸方丈雪竇識病不答話或有僧出劈脊便打諸方識病不答話有僧出必然别有長處敢有一箇動著大唐天子只三人舉趙州到黃蘗蘗見來便關却方丈州云救火救火黃蘗便出擒住云道道州云賊過後張弓師云直是好笑笑須三十年忽有箇衲僧問雪竇笑箇什麼笑賊過後張弓舉僧問鏡清學人未逹其源乞師方便清云是什麼源云其源清云若是其源爭受方便師云死水裏浸却有什麼用處侍者問適來成裭伊清云無侍者云不成裭伊清云無侍者云和尚尊意如何清云一點水墨兩處成龍師云猶較些子雪竇不是減鏡清威光要與者僧相見是什麼源其源三十年後與爾三十棒舉僧問香林如何是衲衣下事林云臘月火燒山師云臘月燒山萬種千般翹松鶴冷踏雪人寒逹磨不㑹大難大難舉本仁和尚示衆云尋常不欲向聲前句後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麼云如何是色不是色仁云喚作聲得麼僧禮拜仁云且道為汝說答汝話若人辨得有箇入處師云本仁也甚竒怪要且貪觀天上既非聲前句後且作麼生入舉雲門示衆云老胡生下一手指天一手指地周行七步目顧四方天上天下唯我獨尊當時若見一棒打煞與狗喫却貴啚天下太平師云便與掀倒禪牀舉國師三喚侍者點即不到侍者三應到即不點將謂吾辜負汝誰知汝辜負吾瞞雪竇不得雲門道作麼生是國師辜負侍者處㑹得也是無端師云元來不㑹作麼生是侍者辜負國師粉骨碎身未報得師云無端無端復舉僧問投子國師三喚侍者意旨如何投子云抑逼人作麼師云垜根漢僧問興化化云一盲引衆盲師云端的瞎僧問玄沙沙云侍者却會師云停囚長智僧問趙州州云如人暗中書字字雖不成文彩巳彰師便喝僧問雪竇雪竇便打也要諸方點檢乃成頌云師資㑹遇意非輕無事相將草裏行負汝負吾人莫問任從天下競頭爭舉僧問智門和尚如何是佛云踏破草鞋赤腳走僧云如何是佛向上事云拄杖頭上挑日月師云千兵易得一將難求舉師祖問南泉摩尼珠人不識如來藏裏親收得如何是如來藏云王老師與爾往來者是藏師云草裏漢祖云不往不來者云亦是藏師云雪上加霜祖云如何是珠師云嶮百尺竿頭作伎倆不是好手者裏著得箇眼賔主互換便能深入虎穴或不漝麼縱饒師祖悟去也是龍頭蛇尾漢舉僧禮拜雪峯峯打五棒僧云專甲有什麼過峯又打五棒師云雪竇不曾與人葛藤前五棒日照天臨後五棒雲騰致雨爾若辨得也好與五棒舉馬大師令智藏馳書上徑山山接書開見一圎相於中下一點國師聞舉云欽師猶𬒳馬師惑師云徑山𬒳惑且致若將呈似國師别作箇什麼伎倆免𬒳惑去有老宿云當時坐却便休亦有道但與劃破若與麼只是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知只者馬師當時畫出早自惑了也舉鏡清問僧趙州與茶去爾作麼生㑹僧便出去淸云邯鄲學步師云者僧不是邯鄲人為什麼學唐步若辨得出與爾茶喫舉僧問雲門如何是法身向上事云向上與爾道即不難作麼生㑹法身僧云請和尚鑒云鑒即且致作麼生㑹法身僧云與麼與麼云者箇是長連牀上學得底我且問爾法身還喫飯麼僧無語師云將成九仞之山不進一簣之土過在什麼處舉趙州訪茱茰才上法堂茱茰云看箭州亦云看箭茱茰云過州云中師云二俱作家蓋是茱茰趙州二俱不作家箭鋒不相柱直饒齊發齊中也只是箇射垜漢舉林際與普化去施主家齊際問毛吞巨海芥納須彌為復是神通妙用為復法爾如然化踢倒飯牀際云太粗生化云者裏是甚所在說粗說細際休去至來日又同赴一施主齊際復問今日供養何似昨日化又踢倒飯牀際云太粗生化云瞎漢佛法說什麼粗細際吐舌師云兩箇老賊喫飯也不了好與二十棒棒雖行且那箇是正賊舉三角示衆云若論此事眨上眉毛早是蹉過麻谷出云蹉過即不問如何是此事角云蹉過谷便掀倒禪床三角便打師云兩箇有頭無尾漢眉毛未曾眨上說什麼此事蹉過有僧問眉毛為什麼不眨上師便打舉睦州喚僧大德僧回首州云擔版漢師云睦州只具一隻眼何故者僧喚既回頭因甚却成擔版舉巖頭參德山跨門便問是凡是聖德山便喝巖頭便禮拜洞山聞舉云若不是奯公大難承當巖頭云洞山老漢不識好惡我當時一手擡一手搦師云然則德山門下草偃風行要且不能塞斷人口當時才禮拜劈脊便打非唯勦絶洞山亦乃把定奯老還會麼李將軍有嘉聲在不得封矦也是間舉巴陵示衆祖師道不是風動不是幡動既不是幡風向什麼處著有人與祖師作主出來與巴陵相見師云雪竇道風動幡動既是風幡向甚處著有人與巴陵作主亦出來與雪竇相見舉則川與龐居士摘茶次士云法界不容身師還見我麼川云若不是老師洎與龐公答話士云有問有答蓋是尋常川不管士云適來莫怪相借問麼川亦不管士喝云者無禮儀漢待我一一舉似明眼人去在川拈茶籃便歸師云則川只解把定封疆不能同生同死當時好與捋下幞頭誰敢喚作龐居士舉僧問雲門一言道盡時如何門云裂破師彈指三下舉僧問睦州一言道盡時如何州云老僧在爾鉢囊裏師呵呵大笑舉本生和尚以拄杖示衆云我若拈起爾便向未拈起時作道理我若不拈起爾便向拈起時作主宰且道老僧為人在甚處時有僧出云不敢妄生節目生云也知闍梨不分外僧云低低處平之有餘髙髙處觀之不足生云節目上更生節目僧無語生云掩鼻偷香空招罪犯師云者僧也善能切磋爭奈弓折箭盡然雖如此且本生是作家宗師拈起也天回地轉應須拱手歸降放下也草偃風行必合全身逺害還見本生為人處也無師復拈起拄杖云太平本是將軍致不許將軍見太平舉僧問雪峯聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何峯打三下其僧復問巖頭巖頭打三掌師云應病設藥且與三下若據令而行合打多少舉太原孚上座參雪峯至法堂上顧視雪峯便下看知事師云一千五百人作家宗師𬒳孚老一覷便髙竪降旗孚至來日入方丈云昨日觸悮和尚峯云知是般事便休師云果然僧問雲門作麼生是觸悮處門便打師云打得百千萬箇有什麼用處直須盡大地人喫棒方可扶竪雪峯且道太原孚具什麼眼舉安國問僧得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺䔧之園我要箇語具得失兩意僧竪起拳云不可喚作拳頭國云只為喚作拳頭師云無繩自縛漢拳頭也不識舉僧請益雲門大師玄沙三種病人話門云爾禮拜著僧禮拜起門以拄杖便挃僧退後門云爾不是患盲復喚近前來僧近前門云爾不是患聾乃云還㑹麼僧云不㑹門云爾不是患啞僧於此有省師便喝云者盲聾瘖啞漢若不是雲門驢年去如今有底或拈槌竪拂不管教近前又不來還㑹麼不應諸方還奈何得麼雪竇若不奈何爾者一隊驢漢又堪作箇什麼以拄杖一時打趂舉僧問香嚴如何是王索仙陀婆嚴云過者邊來師云鈍致煞人僧問趙州王索仙陀婆時如何州曲躬義手師云索鹽奉馬舉鼓山示衆云若論此事如一口劒時有僧問承和尚有言若論此事如一口劒和尚是死尸學人是死尸如何是劒山云拖出者死尸僧應喏歸衣鉢下打揲便行山至晚問首座問話僧在否座云當時便去也山云好與二十棒師云諸方老宿㹅道鼓山失却一隻眼殊不知重賞之下必有勇夫然雖如此若子細點檢來未免一時埋却舉睦州問武陵長老了即毛端吞巨海始知大地一微塵作麼生云和尚問誰州云問長老云何不領話州云我不領話爾不領話師云墮也墮也復云者葛藤老漢好與劃斷拈拄杖云什麼處去也舉仰山坐次大禪佛到翹一足云西天二十八祖亦如是唐土六祖亦如是和尚亦如是某甲亦如是山下禪牀打四藤條師云藤條未到打折因什麼只與四下須是箇斬釘截鐵漢始得大禪後到藿山自云集雲峯下四藤條天下大禪佛參山云打鍾著禪使走師云者漢雖見機而變爭奈有頭無尾舉玄沙與天龍入山見虎龍云前靣是虎沙云是汝師云要與人天為師前靣端的是虎舉南泉山下有一庵主行僧經過謂庵主云近日南泉和尚出丗何不去禮拜主云非但南泉直饒千佛出興亦不能去泉聞令趙州去看州見便禮拜主不管州從西過東主亦不管州又從東過西主亦不管州云草賊大敗拽下簾子便行歸舉似南泉泉云從來疑著者漢師云大小南泉趙州被箇擔版漢勘破了也舉僧問風穴語默涉離微如何通不犯穴云常憶江南三月裏鷓鴣啼處百花鮮曾有僧問雪竇對他道劈腹剜心又且如何復云因風吹火别是一家傷鱉恕龜必應有主舉巖頭雪峯欽山到德山欽山問天皇也恁麼道龍潭也恁麼道未審德山作麼生道山云爾試舉天皇龍潭底看欽山擬議德山便打欽山被打歸延壽堂云是即是打我太煞巖頭云爾恁麼他後不得道見德山師云諸禪德欽山致箇問端甚是竒特爭奈龍頭蛇尾爾試舉天皇龍潭底看坐具便𢷾大丈夫漢捋虎鬚也是本分他既不能德山令行一半令若盡行雪峯巖頭㹅是涅槃堂裏漢舉僧問智門和尚如何是般若體云蚌含明月僧云如何是般若用云兔子懷胎師云非唯把定丗界亦乃安貼邦家若善能參詳便請丹霄獨步舉烏臼有玄紹二上座到臼云二禪伯近離甚處云江西臼便打僧云久聞和尚有此機要臼云爾既不㑹第二箇近前來僧擬議臼亦打云同坑無異土參堂去師云宗師眼目須至恁麼如金翅擘海直取龍吞有般漢眼目未辨東西拄杖不知顚倒只管說照用同時人境俱奪舉僧辭大隨隨問甚處去云峩眉禮拜普賢去隨竪起拂子云文殊普賢惣在者裏僧畫一圎相拋於背後隨云侍者將一貼茶與者僧雲門別云西天斬頭截臂者裏自領出去師云煞人刀活人劒具眼底辨取舉雪峯問僧見說大德曾為天使來是否云不敢峯云爭解與麼來德云仰慕道德豈憚關山峯云汝猶醉在出去僧便出峯乃召大德僧回首峯云是什麼僧亦云是什麼峯云者􅃮桶僧無語峯却顧謂鏡清云好箇師僧向􅃮桶裏著到清云和尚豈不是據𣢾結案峯云也是我尋常用底忽若喚回是什麼被他道者􅃮桶又作麼生清云成何道理峯云我與麼及伊爾又道據𣢾結案他與麼及我又道成何道理一等是什麼時節其閒有得不得清云不見道醍醐上味為丗所珍遇此之人翻成毒藥師云看他父子相投言氣相合知者謂粉骨碎身此恩難報不知者謂扶髙抑下臨危悚人毒藥醍醐千載龜鑑還㑹麼者􅃮桶舉僧問大梅如何是祖師西來意梅云西來無意僧舉到鹽官官云一箇棺材兩箇死漢玄沙聞舉云鹽官是作家師云三箇也得舉雲門問新羅僧爾是甚處人云新羅人門云將什麼過海云草賊大敗門云為什麼在我手裏云恰是門云一任㪍跳師云雲門老漢龍頭蛇尾放過者僧為什麼在我手裏恰是劈脊便打舉北禪問僧近離甚處云黃州禪云夏在甚處云資福禪云福將何資云兩重公案禪云爭奈在我手裏云在手裏即收取禪便打者僧不甘隨後趂出師云竒怪宛有超師之作還知者僧麼只解貪前不能顧後若在雪竇手裏棒折也未放在舉睦州示衆云我見百丈不識好惡大衆方集以拄杖一時打下復召大衆大衆回首丈云是什麼有什麼共語處黃蘗和尚大衆方集以拄杖一時打下復召大衆大衆回首蘗云月似彎弓少雨多風猶較些子師云說什麼猶較直是未在若據雪竇衆集一時打下便休或有箇無孔鐵槌為衆竭力善能擔荷可以籠罩古今乾坤把斷師驀拈拄杖云放過一著舉玄沙見鼓山來作一圎相山云人人出者箇不得沙云情知爾向驢胎馬腹裏作活計山云和尚又作麼生玄沙云人人出者箇不得山云和尚漝麼道得某甲為什麼不得沙云我得爾不得師云只解貪觀白浪不知失却手橈舉南泉示衆云王老師賣身去也還有人買麼一僧出衆云某甲買泉云不作貴不作賤作麼生買僧無語卧龍代云和尚屬專甲禾山云是何道理趙州云明年與和尚作頌布衫師云雖然作家競買要且不解輸機且道南泉還肯麼雪竇也擬酬箇價直令南泉進且無門退亦無地不作貴不作賤作麼生買别處容和尚不得舉茱茰把一橛竹上堂云還有虛空裏釘得橛麼時有靈虛上座出云虛空是橛茱茰便打虛云莫錯打某甲茱茰休去師云若要此話大行直須打了趂出舉夾山與定山同行言話次定山云生死中無佛則無生死夾山云生死中有佛則不迷生死互相不肯同上大梅相見了具說前事夾山問未審那箇親那箇踈梅云一親一踈山又問那箇親梅云且去明日來夾山至來日又問未審那箇親梅云親者不問問者不親夾山住後云我當時在大梅失却一隻眼師云夾山畢竟不知換得一隻眼大梅老漢當時聞舉若以棒一時打出豈止劃斷兩人葛藤亦乃為天下宗匠舉僧問保福雪峯平生有何言句得似羚羊挂角時福云我不可作雪峯弟子不得師云一千五百箇布衲保福較些些子舉僧問長慶羚羊未挂角時如何慶云草裏漢云挂角後如何慶云亂叫喚云畢竟如何慶云驢事未了馬事到來師云寧可碎身若微塵終不瞎箇衆生眼長慶較些些子復云一般漢設使羚羊未挂角也似萬里望鄉關舉僧問巴陵祖意教意同别陵云雞寒上樹鴨寒下水僧問睦州祖意教意同别州云青山自青山白雲自白雲師云問既一般答亦相似其中有利地自利瞞人自瞞若點檢分明管取解空第一舉趙州示衆云今夜答話去有解問者出來時有僧出州云比來拋磚引玉引得箇墼子法眼和尚遂乃舉問覺鐵觜先師意作麼生覺云如國家拜將乃問甚人去得時有人出云某甲去得云爾去不得法眼去我㑹也師云刢利漢聞舉便知落處然雖如此放過覺鐵觜夫宗師語不虛發出來必是作家因什麼拋磚引墼諸禪德要識趙州麼從前汗馬無人見只要重論蓋代功舉耽源辭國師歸省覲馬祖於地上作一圎相展坐具禮拜祖云子欲作佛去源云某甲不解揑目祖云吾不如汝師云然猛虎不食其子爭奈來言不豐諸人要識耽源麼只是箇藏身露影漢舉溈山問仰山甚處來云田中來溈云田中多少人山插下鍬子義手而立溈云南山大有人刈苑山拈得鍬子便行玄沙云我當時若見與踏倒鍬子鏡清云不奈船何打破戽斗僧問明招古人意在插鍬處義手處招喚某專甲僧應喏招云還曾夢見仰山麼師云諸方老宿咸謂插鍬話竒特也大似隨邪逐惡若據雪竇見處仰山被溈山一問直得草繩自縛去死十分舉玄沙問僧近離甚處云瑞巖沙云瑞巖有何言句僧云長喚主人翁自云諾醒醒著他後莫受人瞞沙云一等是弄精魂甚竒怪却云何不且在彼中僧云瑞巖遷化也沙云如今還喚得應麼無對師云蒼天蒼天舉雪峯問僧近離甚處云覆船峯云生死海未渡為什麼覆船師代云久響雪峯待者老漢擬議拂袖便行其僧當時無語歸舉似覆船船云何不道渠無生死僧再至雪峯舉此語峯云此不是爾語云是覆船恁麼道峯云我有二十棒寄與覆船二十棒老僧自喫不干闍梨事師云能區能别能煞能活若也辨得天下橫行舉德山圎明示衆云但有問答只竪一指頭寒則普天普地寒師云什麼處見俱胝老熱則普天普地熱師云莫錯認定盤星森羅萬像徹下孤危大地山河通上嶮絶甚麼處得一指頭禪舉僧問南院從上諸聖什麼處去院云不上天堂即入地獄云和尚作麼生院云還知寶應老落處麼僧擬議院以拂子驀口打復喚僧近前云令合是爾行又打一拂子師云令既自行且拂子不知來處雪竇道箇瞎且要雪上加霜舉保福問長慶盤山道光境俱忘復是何物洞山道光境未忘復是何物據二老宿㹅未得勦絶作麼生道得勦絶去慶良久福云情知向鬼窟裏作活計慶云爾作麼生福云兩手扶犁水過膝師云俱忘未忘㹅由我保福因什麼道未得勦絶酌然能有幾箇諸人又作麼生道免得長慶在鬼窟裏師云栁絮隨風自西自東舉大梅聞鼯鼠鳥聲謂衆云即此物非他物汝善護持吾當逝矣師云者漢生前莽鹵死後顢頇即此物非他物是何物還有分付處也無有般漢不解截斷大梅腳跟只管道貪程太速舉雪峯示衆云望州亭與爾相見了也烏石嶺與爾相見了也僧堂前與爾相見了也保福問鵝湖僧堂前且致望州亭烏石嶺什麼處相見鵝湖驟步歸方丈保福便入僧堂師云二老宿是即是只知雪峯放行不見雪峯把定忽有箇衲僧出問未審雪竇作麼生豈不是别機冝識休咎底漢還有望州亭烏石嶺相見底衲僧麼良久云擔版禪和如麻似粟舉趙州問大慈般若以何為體慈云般若以何為體州呵呵大笑至來日州掃地次大慈却問般若以何為體州放下掃帚呵呵大笑師云前來也笑後來也笑笑中有刀大慈還識麼直饒識得也未免喪身失命舉德山一日飯遲自掌鉢至法堂上雪峯見云者老漢鍾未鳴鼓未響托鉢向什麼處去德山便回峯舉似巖頭頭云大小德山不㑹末後句山聞舉令侍者喚巖頭至方丈問爾不肯老僧那巖頭密啓其意山至來日上堂與尋常不同巖頭到僧堂前撫掌大笑云且喜得老漢㑹末後句他後天下人不奈何雖然如此只得三年明招代德山云咄咄沒處去沒處去師云曾聞說箇獨眼龍元來只有一隻眼殊不知德山是箇無齒大蟲者不是巖頭識破爭得明日與昨日不同諸人要會末後句麼只許老胡知不許老胡㑹舉雪峯一日見獼猴乃云者獼猴各各背一靣古鏡三聖便問歷劫無名何以彰為古鏡峯云瑕生也聖云一千五百人善知識話頭也不識峯云老僧住持事煩師云好與二十棒者棒放過也好免見將錯就錯舉僧問國師如何是本身盧舍那云與老僧過淨瓶來僧將到淨瓶云却安舊處著僧復問如何是本身盧舍那云古佛過去久矣雲門大師道無眹跡師云直得一手指天一手指地爭得無還㑹麼雲在嶺頭間不徹水流澗下大忙生舉僧問洞山時時勤拂拭莫遣惹塵埃為什麼不得他衣鉢山云直饒道本來無一物也未合得他衣鉢且道什麼人合得僧下九十六轉語皆不相契末後云設使將來他亦不要洞山深肯師云他既不受是眼將來底必應是瞎還見祖師衣鉢麼若於此入門便乃兩手分付非但大庾嶺頭一箇提不起設使闔國人來且𣢾𣢾將去舉僧問投子依稀似半月髣象若三星乾坤收不得師於何處明子云道什麼云想師只有湛水之波且無滔天之浪子云間言語師云投子古佛不可道不知若點撿來直是天地懸隔才問便和聲打舉洛浦久為林際侍者到夾山問自逺趨風乞師一接山云目前無闍梨此閒無老僧浦便喝山云住住闍梨莫草草忩忩雲月是同溪山各異截斷天下人舌頭即不無爭教無舌人解語無對山便打師云者漢可悲可痛鈍致他林際他既雲月是同我亦溪山各異說什麼無舌人不解語坐具劈口便𢷾夾山若是箇知方漢必然明窗下安排舉三聖問雪峯透網金鱗以何為食峯云待汝出網來向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事煩師云可惜放過好與二十棒者棒一棒也饒不得直是罕遇作家舉伏牛為馬祖馳書到國師處國師問馬祖有何言句示人牛云即心是佛國師云是什麼語話良久再問更有什麼言句牛云不是心不是佛不是物國師云猶較些子師代當時便喝牛却問和尚此間如何國師云三點如流水曲似刈禾鎌師云是什麼語話也好與一拶見之不取千載難忘舉玄沙問鏡清我不見一法為大過患爾道不見什麼法清指露柱云莫是不見者箇法麼沙云浙中清水白米從爾喫佛法則未在師云大小鏡清被玄沙熱瞞我當時若見但只向道靈山授記也未到如此舉先報慈問僧近離甚處云卧龍慈云在彼多少時云經冬過夏慈云龍門無宿客為什麼在彼許多時云師子窟中無異獸慈云爾試作師子吼看云若作師子吼即無和尚慈云念汝新到且放三十棒師云竒怪諸禪德若平展則兩不相傷據令則彼此俱嶮還點撿得麼舉船子云千尺絲綸直下垂一波才動萬波隨夜靜水寒魚不食滿船空載月明歸師云者漢勞而無功忽若雲門道一句合頭語萬劫繫驢橛又作麼生免此過良久云莫謂水寒魚不食如今釣得滿船歸舉投子問巨榮禪客老僧未曽有一言半句挂諸方耳目何用要見山僧僧云到者裏不施三拜要且不甘子云出家兒得恁麼沒碑記僧繞禪床一匝而出子云有眼無耳六月火邊坐師云也不得放過才轉便與擒住便喝是誰不甘若跳得出不妨是一貟衲僧舉祖師道六塵不惡還同正覺拄杖子是塵有甚麼過過既無應合辨主所以道糞掃堆上現丈六金身且拈在一邊赤肉團上壁立千仞又放過一著直饒八靣四方正好連架打舉古云眼裏著沙不得耳裏著水不得忽若有箇漢信得及把得住不受人瞞祖佛言教是什麼熱碗鳴聲便請髙挂鉢囊拗折拄杖管取一貟無事道人又云眼裏著得須彌山耳裏著得大海水一般漢受人商量祖佛言教如龍得水似虎靠山却須挑起鉢囊橫擔拄杖亦是一貟無事道人復云恁麼也不得不恁麼也不得然後沒交涉三貟無事道人中要選一人為師雪竇拈古一百則竟雪竇和尚明覺大師瀑泉集并序參學小師圎應述師自兩處道埸多應機語句門人集之離三巳行於丗斯所紀者乃垂帶自答及古今因緣朝暮提唱辭意曠嶮而學黨未喻復致之請益師蓋不獲巳隨所疑問以此以彼乍放乍收或抑或揚或代或别近百五十則實一時之能事也況圎應忝預參承寧忘捃拾然多聞未益誠有愧於宗師必記諸善言諒無譏於弟子可命曰瀑泉集意以飛流無盡為義凡知我者幸同味焉時天聖八年八月十五日序明州軍州官請住雪竇疏歸依無勞謙執謹疏蘇州在城檀越請住翠峯疏粵以照乘神珠豈有心而鑑物達空上士曽無念以度生其如體具圎明致五色不能隱情存悲智故十界不能遺是謂妙應無方真慈廣被者也恭惟和尚靈源本濬道價非沽虎䇿親持遍入祖師之室龍盂髙掌常游居士之門自此秖欲韜光深思逺丗其奈因緣四備道德兼充隨方而民物依歸觸處而學人圍繞在衆何殊於出丗乘時豈吝於提綱伏望和尚深别武林遐之笠澤慧理息肩之地暫罷呼猿支公嘉遁之鄉堪追養駿遭纍聖重光之主值休牛歸馬之朝誠冝乎大闡一音俯從三請塞輿人之願望鎮先德之叢林上柷皇王旁資黎庶前所謂妙應之說真慈之門良在此時無賜勞讓幸甚謹疏蘇州僧正并諸名貟疏竊以柯亭發籟匪知音而孰采希聲陶壁飛梭承奮豫而方同聖化物理尚由於時遇人情豈背於緣求長老和尚祖席為珍師門作範雄經巨論傳心者鮮克精明麗句淸辭出丗者少如兼濟繇是歷漢水而德風早偃鑽仰有年入吳邦而名翼愈飛遭逢此日遂得群心啓顙咸願摳衣翠峯禪院檀越福埸宗師法席漪漣四繞何殊灔澦之寬橘柚千株可奪江陵之美粗稱來儀知識繼踵住持雅膺聖主承祧賢侯出鎮冝踞法空之座特開心地之門祝萬壽於時君資百祿於朝宰既臻海衆希振雷音謹疏上堂汝等諸人盡是久經陳敵慣戰作家倚天長劒即不問你作麼生是䄂裏藏鋒代云寡不敵衆又云彼此上堂寡不敵衆什麼人分上事代云揔由和尚又云彼此又云龍蛇易辨衲子難瞞許你眼正頂後一相拈得也無代云收有時云收之一字飲氣吞聲作麼生辨代云衲子難瞞或云傾湫倒嶽尋常之用不涉泥水道將一句來代云三千里外示衆云三千里外還且如何代云過或云佛未出世時一人人鼻孔遼天出世後為什麼杳無消息代云賊不打貧兒家問僧云賊不打貧兒家因什麼却打代云須到如此或云祖師不到處時人知有時人不知處過在祖師作麼生辨代云不得春風花不開上堂云不得春風花不開箇箇道我會會即且致作麼生舉代云時人祖師又云空劫巳前徒指注空劫之後錯商量正當空劫什麼人為主代云本是將軍致太平有時云太平本是將軍致莫錯認定盤星我為你拈了也還㑹麼代云掩靣出去或云交鋒兩刃要定死生彼此無傷功勳不立作麼生是將軍正令代云到即不點或云到即不點還甘也無代云赤心片片有時云釋迦老子出氣不得甚麼處誵訛代云填溝塞壑又代云退身三步問云填溝塞壑負恩者多甚處見老底代云香積世界或云五千四十八卷止啼之說如今啼止也還我黃葉來代云事不孤起有時云事不孤起你也分一半代云㖿又云合到某甲又云單傳心印過犯彌天甚人委悉代云須見如此上堂云須見如此著甚來由代云也是或云善來文殊還知敗闕麼代云一箭兩垜或云一箭兩垜為什麼却敗闕代云善來文殊或云乾坤崩陷且致再見天日道將一句來代云悔不愼當初有時云悔不愼當初便下座却問僧他後作麼生舉代云好事不如無有時云雄兵百萬且定邊疆劒客三千若為驅使代云不許夜行投明須到示衆云不許夜行投明須到何似生代云孟常門下或云一筆勾下不甘底出來代云只冝拄杖子上堂云只冝拄杖子勾下屬何人代云傍觀者或云威音王巳前無師自悟是第二句還我第一句來代云掃土而盡問僧云掃土而盡你還知麼代云因誰致得有時云三世諸佛說夢六代祖師說夢翠峰今日說夢還有夢見底麼代云掀倒禪牀或云掀倒禪牀蓋是本分過在什麼處代云惱亂春風卒未休或云奔流度刃也是尋常啐啄同時略請相見代云什麼處去也上堂云什麼處去也代云日月易流又云針眼裏藏身即不問你作麼生是逰戲十方代云踞虎頭收虎尾一日云踞虎頭收虎尾諸方未曾見代云也是或云上來則擾擾端坐則昏昏脫灑一句作麼生道代云春無三日晴示衆云春無三日晴去住還堪笑且問諸衲僧曬却何時了代云某甲只管看或云有佛法處不得住無佛法處急走過趙州為什麼摘楊花代云更事多矣問僧更事多矣亦要商量代云莫教屈著有時云明眼衲僧入門便話墮三十年後誰是知音代云拂䄂便出有時云拂䄂便出也好與三十棒代云賊過後張弓或云七縱八橫拈却把定乾坤眼為什麼却有沙代云黃連未是苦或云黃連未是苦黃蘗好為鄰復問僧還辨得者時節麼僧云不會自代云抑巳而巳或云繞天下行腳到處豈無尊宿相為還有盡力道得底句麼代云口只堪喫飯上堂云口只堪喫飯雲門大師拈了也你來者裏聽什麼碗鳴聲以拄杖一時打下代僧當時但近前把住拄杖云和尚今日困又云關捩子即不問上座作麼生是牛頭橫說竪說代云著甚來由一日云著甚來由便下座代云能有幾箇有時拈起拄杖云天不能蓋地不能載復以拄杖一劃云百千諸佛諸代祖師盡向翠峯乞命代云官不容針或云舉一明三為什麼不著便代云作賊人心虛又云文殊起佛見法見貶向二鐵圍山衲僧起佛見法見列在五條椽下翠峰起佛見法見誰敢覷著代云稱尺在手或云洞庭湖水一吸淨盡魚鱉向甚處藏身代云咦又云喝下承當崖州萬里棒頭薦得别有條章作麼生是衲僧本分代云惡或云虛空為鼓須彌為槌王老師不打還肯得諸方也無代云千年田八百主有時云髑髏常干世界鼻孔摩觸家風拈却别致一問來代云祖師遺下又云你若龜頭鱉頭向後莫道親見翠峰好代云何必上堂云天不能蓋地不能載衲僧坐斷如恆河沙閙市裏指出一箇來代云便摑傍僧或云生門易過死門難入逆順無拘底為什麼不垂手代云收得安南又憂塞北或云荒田不揀草變為金信手拈來金變成草古聖日用不知且致你為什麼臨機道得代云如蟲禦木上堂云如來唯一說無二說穿却衲僧鼻孔換却衲僧眼睛即得若教我明破恐帶纍你不是好人代云欲見其師先觀弟子或云諸佛有難炭庫裏衆生有難火熖裏你衲僧不得動著代云魯般繩墨或云火待日熱風待月涼北斗南星句不要你道留與後人貶剝代云一言巳出駟馬難追上堂云色不異空空不異色園頭甚要古人道了也因什麼知而故犯代云爭奈轉多問僧我道轉多你作麼生僧云某甲不會師云惱亂春風卒未休或云本分事道我知有將錯就錯甚人承當代云不惜眉毛者或云年來一度春也畢竟事作麼生代云藏身露影或云至道無難唯嫌揀擇德山不在付與黃蘗代云洗腳上船復問僧云我恁麼道正是時人窠窟趙州直得五年分踈不下你何不救取僧無語師云雪峯道底上堂云開門待知識知識不來過直得出門相接為什麼土曠人稀代云和尚年老或云放憨道著藥忌即不管你死中得活致將一問來代云略無些子上堂云逺則照近則明你會也笠子拄杖拈放一邊入水見長人作麼生辨代云平出或云因一事長一智針筒藥袋不得失却如履輕冰道將一句來代云以己妨人又云會則事同一家且放你過不會則東西南北付與驢年代云一日便頭白或云今日也恁麼明日也恁麼第三第四不問你後五日事作麼生若道只恁麼代云苦哉佛陀耶有時云什麼劫中無祖佛你不著便猶可代云解笑底亦少或云朝堂門下難舉令雲門道底不要代云但咳嗽一聲一日云謀臣猛將用不著到即不點是什麼人代云不犯之令上堂云若道得隔身句知你是箇了事人忽若揔道不得我也知你親代云猛虎不食其子一日云千兵昜得一將難求上將來也三軍在什麼處代云退後退後或云閫內者不出閫外者不入將相雙行句作麼生道代云弔民伐罪因普請問僧甚處來云摘茶來師云茶園裏有玄沙見底還見麼代但指露柱云和尚問又問僧甚處來云摘茶來師云人摘茶茶摘人不問你無底籃子重多少代云慣得其便又問僧甚處來云摘茶來云茶叢列作鼻孔茶葉是你眼睛作麼生摘代云今日不著便一日云佛法不用學觸目皆成滯百城既未遊樓閣門長閉勸君回首看請下一轉語自云莫辜負人好一日問僧南泉斬猫兒你作麼生會云有什麼難師云作麼生無語代云一刀兩段一日遊園次問僧苦瓠連根苦甜瓜徹蒂甜明得箇什麼邊事無對代云平出一日請益退侍者問訊云和尚不易師云有什麼不易無對師代云法堂上寸草不生僧便禮拜師云若不是我師一日問僧諸方道不得底句你作麼生道僧云天平地平師云漝麼則黃老師不如你僧無語師云只道得一半師一日見僧來師云是什麼物與麼來僧云口痛祗對和尚不得師云鼻孔僧無語師云黃連未是苦師一日見云僧來拈起拄杖云與你二人分取僧云只恐和尚不平第二僧云郍上座先到雪竇師云有功者賞師一日見二化主城中歸問云你慿箇什麼入城教化衆生僧云雖有好心且無好報第二僧云禍不入愼家之門師云近火先燋師一日晚參問僧是什麼時候也僧應喏師便喝僧云和尚何不領話師云日勢稍晚師一日見僧來拈起拄杖云我兩手分付你作麼生僧退身云不敢師云為什麼棒上不成龍僧云三十年後恐辜負和尚師放下拄杖云吽吽師一日問僧你見雪竇後録未僧云見了師云向甚處見我僧云也知和尚是川中人師將拄杖打一下云夢見師一日見僧出歸師云閙市裏還見天子麼僧無語師代云非但又云苦哉佛陀耶一日十數僧侍立次師云佛法無人說雖惠不能了復問僧還有無師自悟底麼衆無語師云負命者上鈎師因在莊數僧侍立次師問云維摩老云步步是道埸者裏何似山裏衆下語師皆不諾師代云只恐和尚不肯師一日問僧你作箇什麼來僧云合靈寶丹來師云靈即不問作麼生是寶僧云不敢祇對和尚師不肯自代云洎與和尚答話師一日問僧你浴未僧云專甲此生不浴師云你不浴啚箇什麼僧云今日𬒳和尚勘破師云賊不打貧兒家師一日同僧遊山次到開山和尚塔頭僧云見說開山便是黃巢師云黃巢是草頭天子為什麼却作住山人僧云忌辰也好與他設粥師不肯自代云賞不避仇讎師一日同三五僧看種田師云靈苗無根作麼生種僧云明年更有新條在師云你問我我與你道僧便問師云分付田舍奴師一日出城見下院山主師云既是山主為什麼却在城中山主無語師自云負命者上鈎來師一日與數僧遊山次見牯牛舉頭師問水牯牛舉頭作什麼僧云怕和尚穿却師不肯自云看入草底師一日燒亡僧師問僧還將得火來麼僧云將得來師云弄假像真師一日問僧甚處來僧云浴來師云三身中郍身浴僧云或鼓聲前或鼓聲後師云飽叢林師一日問僧你尋常為什麼不上來僧云長上來只是門閉師云為什麼不入來僧云來也師云賊過後張弓師一日為首座寫真師云既是首座為什麼却有兩箇首座云爭之不足師云你問我我與你道首座擬問師云雪竇門下巨宋太宗皇帝因事六問當時無人奏對因入寺見僧看經問云看什麼經對云仁王經帝云既是寡人經為甚在卿手裏師代云皇天無親唯德是輔因入塔院問僧卿是甚人僧云塔主云此是寡人塔為什麼卿作主代云蓋國咸知因僧燒却藏經朝見告乞宣問昔日摩騰不燒如今為什麼燒却代云陛下不忘付囑因帝夜夢神人報云請陛下發菩提心帝至曉宣問左右街菩提心作麼生發代云實謂今古罕聞因僧朝見帝問甚處來云卧雲來帝曰朕聞卧雲深處不朝天為什麼却到者裏代云難逃至化因僧朝見帝賜坐僧云陛下還記得麼帝云甚處相見來僧云靈山一别直至如今帝曰以何為驗無對代云貧道得得而來唐憲宗迎舍利現五色光百辟俱賀唯韓愈端立帝問百寮皆賀卿為甚不賀愈曰臣曾看經來佛光非青黃赤白等相此是神龍荷助之帝云作麼生是佛光代云陛下髙垂天鑒裴相公捧一尊佛像於黃蘗前跪云請師安名蘗云裴休師代相公當時便喝廣南劉王請雲門入內於含春殿坐次帝令鞠常侍宣問靈樹果子熟也未門云甚年中得信道生師代進語云猶帶酸澀在又代雲門云聖意難測又云喏喏復宣問如何是禪云皇帝有勑臣僧對代進語云錯又代雲門云念以臣僧年邁龍光問僧名什麼云自觀光云自觀見什麼代云有悮龍光悟空禪師問座主講什麼經云法華經空云有說法華經處我現寶塔當為證明座主講請甚人證明代云私通車馬投子示衆云汝等諸人盡道我實頭若出門三步有人問你作麼生是投子實頭處作麼生道代云疑煞天下人有老宿見官人手中執笏乃問在官人手中為笏在天子手中為圭在老僧手中喚作什麼代云弄巧成拙四祖到牛頭後庵見虎便作怕勢牛頭云和尚猶有者箇在祖云適來見什麼代云但亦作怕勢又代云洎合放過僧問惠濟古人道得坐披衣向後自看如何是得坐披衣濟云暢我平生代云喏喏問投子定慧等學明見佛性此理如何投子云打水用桶舀粥用杓代云爭得不問玄沙見孚上座便云新到相看孚云巳相見了也沙云什麼劫中曾相見來孚云莫瞌睡别云者賊敗也玄沙與地藏在方丈說話夜深沙云待者關隔子門汝作麼生出得地藏云喚甚麼作門别云珍重便行崇壽問僧泉眼不通𬒳沙礙道眼不通𬒳甚麼礙僧云眼礙别云強將下無弱兵保福在疾問僧我與你相識年深有何名方妙藥相救僧云藥方甚有聞說和尚不解忌口别云只恐難為和尚有西天聲鳴三藏到三大王處王令玄沙驗過玄沙以銅火筯擊鐵火爐問三藏云是什麼聲云銅鐵聲沙云大王莫受外國人瞞師别云大王冝加信敬又别三藏云莫瞞外國人國師問座主講什麼經云金剛經國師云最初是什麼字座主云如是國師云是什麼别云以拄杖便打陸郎中問仰山如何是不斷煩惱而入涅槃仰山竪拂子郎中便拜異時仰山却問郎中曾問不斷煩惱而入涅槃老僧竪拂子郎中作麼生會陸云據某甲見處入之一字也不用得仰山云入之一字不為郎中師云作麼生會云别陸云拂子到某甲手裏也又别仰山後語云我將謂你是箇俗漢陸大夫問南泉大悲菩薩甚處得許多手眼來泉云如國家用大夫作什麼别云不及大夫所問僧問雲門十方薄伽梵一路涅槃門如何是一路涅槃門門云我道不得云和尚為什麼道不得云你舉話即得别云淺水無魚徒勞下釣吳尚書訪睦州至門首便問三門俱開弟子從何門而入睦召尚書尚書應喏睦云從信門而入别云客是主人相師南泉遷化陸亘大夫到院主云大夫何不哭大夫云道得即哭長慶代云合笑不合哭别云蒼天蒼天雲巖遷化時道吾問離却殼漏子了後向何處再得相見巖云向不生不滅處相見别云喚侍者與我記取者一問僧問法燈百骸俱潰散一物鎮長靈未審百骸一物相去多少燈云百骸一物一物百骸别云吾不如汝僧問歸宗如何是佛宗云我向你道還信麼云和尚言重爭得不信宗云只汝便是别云侍者寮裏輿茶去麻谷持錫到國師處振錫而立國師云汝既如是何用見吾谷又振錫一下别云洎不到此妙濟於僧前書一字問云是什麼僧云不識濟云滿口道著别云老僧罪過僧問曹山清稅孤貧請師拯濟山云稅闍梨應喏山云清源白家酒三盞猶道未霑唇别云稅闍梨應喏是什麼心行僧問玄覺先師舉不及處請和尚舉覺云聽者須是竒人别云大衆看者一貟禪客石頭問讓大師不慕諸聖不重巳靈時如何讓云子問太髙生何不向下問將來别云三十棒教誰喫僧問玄沙盡十方丗界是一顆明珠學人為什麼不㑹沙云用會作麼别云諸方即得我者裏不得玄沙問南際云此事唯我能知長老作麼生㑹際云須知有百求知者别云雪峯門下幾箇如斯法眼問百法座主云百法是體用雙陳明門是能所兼舉座主是能法座是所作麼生說箇兼舉有老宿代云和尚喚什麼作法座别云和尚分半院與某甲始得睦州問座主講什麼經云涅槃經州云問大德一假義得麼云問什麼義州以腳躍一吹云者箇是什麼義云經中無此義州云脫空謾語漢此是五百力士揭石義麼老宿代云和尚瞞某甲瞞大衆别云和尚慣得其便雲門示衆云丗尊生下一手指天一手指地周行七步目顧四方云天上天下唯我獨尊我當時若見一棒打煞與狗喫却貴得天下太平法眼云雲門氣勢甚大要且無佛法道理老宿代云將謂無人證明别云鈎在不疑之地巖頭雪峯欽山三人坐次洞山點茶來欽山閉眼洞云什麼處去來欽山云入定來洞云定本無門從何而入老宿代云大有人恁麼會别云當時但指巖頭雪峯云與者兩箇瞌睡漢茶喫雲門問僧近離甚處云新羅門云將甚麼過海云草賊大敗門云你為什麼在我手裏僧云恰是别云噓噓雲門到洞巖得數日上參恰見巖下來巖問什麼處去云親近去巖云亂走作什麼云暫時不在巖云什麼處去來别云好與三十棒東平問官人風作何色無對却問僧僧提起衲衣云者箇在府下鋪平云用多少帛子别云蝦跳不出斗雲門問曹山密密為什麼不知有山云只為密密所以不知有别云達磨來也雪峯在國淸拈起鉢盂問座主道得與你鉢盂主云此是化佛邊事别云只恐鈍置和尚峯當時云你作座主奴也未得主云某甲不㑹峯云你問我我與你道座主方禮拜峯便踏倒後座主舉似雲門云某甲得七年方見門云你得七年方見云是别云草賊敗也道吾見雲巖掃地問云太驅驅生巖云須知有不驅驅者吾云恁麼有第二月也别云洎合放過淸峯辭雪峯問甚處去淸峯云識得者漢即知去處云你是了事人亂走作甚麼别云西天斬頭截臂淸峯當時云和尚莫塗汚人好雪云我即塗汚你你道古人吹布毛作麼生淸峯云殘羹餿飯巳有人喫了也雪峯休去師出雪峯語云一死更不再活韶山勘僧云莫便是多口白頭因云不敢韶云多少口云遍身是韶云大小二事向甚處出云韶山口裏别云從來疑著韶山保福到庵主處茶話次庵主云有僧問某甲如何是祖師西來意某竪起拂子不知得不得福云某爭敢道得不得有箇問有人讃嘆此事如虎帶角有人輕毀此事分毫不直一等是恁麼事為什麼讃毀不同庵主云適來出自偶爾有老宿云毀又爭得又老宿云惜取眉毛師都别云若非和尚證明拂子一生無用石頭大師參同契豫嘗覽斯作頗見開士皆摛辭肇極成贊厥道因亦隨興以擬之匪求蝕木於文也噫先覺洪規可洞照遐古豈復情謂逾越於其間哉蓋往往學者抑問勉意不獲而巳其或金沙混流淘之汰之固必存彼匠手明矣竺土大仙心誰是能舉東西密相付惜取眉毛人根有利鈍作麼生道無南北祖且欵欵靈源明皎潔撫掌呵呵枝派暗流注亦未相許執事元是迷展開兩手契理亦非悟拈却了也門門一切境捨短從長回互不回互以頭換尾回而更相涉者箇是拄杖子不爾依位住莫錯認定盤星色夲殊質像豈辨開眸聲元異樂苦還同掩耳暗合上中言心不負人明明淸濁句口冝挂壁四大性自復隨所依如子得其母可知也火熱風動搖春水自消水濕地堅固從旦至暮眼色耳音聲海晏河清鼻香舌醎醋可慿可據然於一一法重報君依根葉分布好明取本末須歸宗唯我能知尊卑用其語不犯之令當明中有暗暗必可明勿以暗相遇明還非覩當暗中有明一見三勿以明相覩無異說明暗各相對若為分比如前後步不如此萬物自有功㫖爾寧止當言用及處縱橫十字事存函蓋合子細看理應箭鋒拄莫教錯承言須會宗未兆非明勿自立規矩突出難辨觸目不㑹道又何妨運足焉知路也不惡進步非近逺唱彌髙迷隔山河爾和彌寡謹白參玄人聞必同歸光隂莫虛度誠哉是言也真讚禪定大師虛凝不器有象殊域伊何郢流卓爾原極鷲峯崔嵬蟾輪乍回列剎望重勞生眼開開也誰覩迅振髙古或葉或花自三自五天子褒稱兮禪定師而今而後兮香風吹集賢殿學士曾侯天石麟豈輕獻日角月角藏億萬當年文陳獲全功不奪龍頭幾人怨若冰大師水之有光非珠澄徹山之有光非玉凝潔若冰大師殊彼淸絶殊兮必群絶兮可覩一字根極三千頂住乍曰義龍或稱律虎相對風規分不分金田獨步君看取清照大師巨海秋碧鼇峯晝寒巧出匠手依依對看寶几乍憑花巾非結以熖續熖話月指月古兮今兮請試甄别恭首座道離微兮誰與鄰貌古淡兮飛淸塵巖檜蒼蒼經幾春乳竇堂中第一人禪徒寫豫幻質復請為讃辭曰祖佛怨兮非其師叢林害兮誰相資冰枯雪殘深索索水冷雲淡空纍纍寶聖錯僧瑤知人間天上爭容伊周生強圖夢身豫亦不能伏筆上下三指彼此七馬拈花未曾微笑何也石謂玉兮器必分水淩虛兮月非下不知誰是傍觀者又咄者枯枿遽生瓜葛來自三川欺乎兩浙指鹿為馬將日作月罪兮彌天焉可分說廣慧禪師寥寥雄機落落虛宇本之不兆傳之奚取取既有規規還倫古凝明孤寬垂應萬端海蚌光絶天珠影殘南來北來玄眸可觀安巖山照禪師并序愚昔游漢水抵廬嶽率訪叢室襲禪家流偕象馬蹴踏至於心口憤悱品藻當代誠難其師然非厚誣方來且指掌輪握何取豈斯欵陪老作覩繪真相古之今之歎恨亡矣髙深莫究其極明晦靡盡其際故時欽依乃勉抉稱詠庶文外之士道存而同歸者也覺雄慧燈記飲光滅光聮不巳龍昌遽絶善續者誰梅峯之師化偃二浙聲流四維大名無當髙讓太白韜晦殊運虛明曠索歸休安巖寒籠翠杉我笑方外花非類銜郢工筆狂梵儀頓舉肩雲頂絲秋蟾夜渚靜應南軒兮相對時空生未解兮聞斯語開眸凝瞻迅雷不及掩耳瀑泉集竟人去他亦不迥頌曰聖諦廓然何當辨的對朕者誰還云不識因兹暗渡江豈免生深棘闔國人追不再來千古萬古空相憶休相憶清風匝地有何極師顧視左右云這裏還有祖師麼自云有喚來與老僧洗腳舉趙州示衆云至道無難唯嫌揀擇才有語言是揀擇是明白老僧不在明白裏是汝還護惜也無時有僧問云既不在明白裏護惜箇什麼州云我亦不知僧云和尚既不知為什麼道不在明白裏州云問事即得禮拜了退頌曰至道無難言端語端一有多種二無兩般天際日上月下檻前山深水寒髑髏識盡喜何立枯木龍吟消未乾難難㨂擇明白君自看舉馬大師不安院主問和尚近日尊位如何大師云日靣佛月靣佛頌曰日靣佛月靣佛五帝三皇是何物二十年來曾苦辛為君幾下蒼龍窟屈堪述明眼衲僧莫輕忽舉德山到溈山挾復子於法堂上從西過東邊從東過西邊顧視云無無便出師著語云勘破了也德山至門首却云也不得草草便具威儀載入相見溈山坐次德山提起坐具云和尚溈山擬取拂子德山便喝拂袖而出師著語云勘破了也德山背却法堂著草鞋便行溈山至晚問首座適來新到在什麼處首座云當時背却法堂著草鞋出去也溈山云此子巳後向孤峯頂上盤結草庵呵佛罵祖去在師著語云雪上加霜頌曰一勘破二勘破雪上加霜曾險墮飛騎將軍入虜庭載得完全能幾箇急走過不放過孤峯頂上草裏坐咄舉雪峯示衆云盡大地撮來如粟米粒大拋向靣前􅃮桶不㑹打鼓普請看頌曰牛頭沒馬頭回曹溪鏡裏絶塵埃打鼓看來君不見百花春至為誰開舉雲門大師垂語云十五日巳前不問汝十五日巳後道將一句來自代云日日是好日頌曰去却一拈得七上下四維無等匹徐行踏斷流水聲縱觀寫出飛禽跡草茸茸煙羃羃空生巖畔花狼藉彈指堪悲舜若多莫動著動著三十棒舉僧問法眼慧超咨和尚如何是佛法眼云汝是慧超頌曰江國春風吹不起鷓鴣啼在深花裏三級浪髙魚化龍癡人猶戽夜塘水舉翠巖夏末示衆云一夏巳來為兄弟說話看翠巖眉毛在麼保福云作賊人心虛長慶云生也雲門云關頌曰翠巖示徒千古無對關字相酬失錢遭罪潦倒保福抑揚難得嘮嘮翠巖分明是賊白圭無玷誰辨真假長慶相諳眉毛生也舉僧問趙州如何是趙州州云東門南門西門北門頌曰句裏呈機劈靣來爍迦羅眼絶纎埃東南西北門相對無限輪鎚擊不開舉睦州問僧近離什麼處僧便喝州云老僧𬒳汝一喝僧又喝州云三喝四喝後作麼生僧無語州便打云這掠虛漢頌曰兩喝與三喝作者知機變若謂騎虎頭二俱成瞎漢誰瞎漢拈來天下與人看舉黃蘗和尚示衆云汝等諸人盡是噇酒糟漢與麼行腳何處有今日還知大唐國裏無禪師麼時有僧出云只如諸方匡徒領衆又作麼生蘗云不道無禪只是無師頌曰凛凛孤風不自誇端居寰海定龍蛇大中天子曾輕觸三度親遭弄爪牙舉僧問洞山如何是佛山云麻三斤頌曰金烏急玉兔速善應何曾有輕觸展事投機見洞山跛鱉盲龜入空谷花蔟蔟錦蔟蔟南地竹兮北地木因思長慶陸大夫解道合笑不合哭咦舉僧問巴陵如何是提婆宗巴陵云銀碗裏盛雪頌曰老新開端的别解道銀碗裏盛雪九十六箇應自知不知却問天邊月提婆宗提婆宗赤幡之下起清風舉僧問雲門如何是一代時教門云對一說頌曰對一說太孤絶無孔鐵鎚重下楔閻浮樹下笑呵呵昨夜驪龍拗角折别别韶陽老人得一橛舉僧問雲門不是目前機亦非目前事時如何雲門云倒一說頌曰倒一說分一節同死同生為君决八萬四千非鳯毛三十三人入虎穴别别擾擾忩忩水裏月舉僧問鏡清學人啐請師啄淸云還得活也無僧云若不活遭人怪笑清云也是草裏漢頌曰古佛有家風對揚遭貶剝子母不相知是誰同啐啄啄覺猶在殼重遭撲天下衲僧徒名邈舉僧問香林如何是祖師西來意林云坐久成勞頌曰一箇兩箇千萬箇脫却籠頭卸角䭾左轉右轉隨後來紫胡要打劉鐵磨舉肅宗帝問忠國師百年後所須何物國師云與老僧作箇無縫塔帝曰請師塔樣國師良久云㑹麼帝云不㑹國師云吾有付法弟子耽源却諳此事請詔問之國師遷化後肅宗帝詔耽源問此意如何源云相之南潭之北師云獨掌不浪鳴中有黃金充一國山形拄杖子無影樹下合同船海晏河淸琉璃殿上無知識拈了也頌曰無縫塔見還難澄潭不許蒼龍蟠層落落影團團千古萬古與人看舉俱胝和尚凡有所問只竪一指頌曰對掦深愛老俱胘宇宙空來更有誰曾向滄溟下浮木夜濤相共接盲龜舉龍牙問翠微如何是祖師西來意微云與我過禪板來牙取禪板與翠微微接得便打牙云打即任打要且無祖師意又問林際如何是祖師西來意際云與我過蒲團來牙取蒲團與臨際際接得便打牙云打即任打要且無祖師意頌曰龍牙山裏龍無眼死水何曾振古風禪板蒲團不能用只應分付與盧公師拈云這老漢也未得勦絶復成頌曰盧公付了亦何慿坐倚休將繼祖燈堪對暮雲歸未合逺山無限碧層層舉僧問智門蓮花未出水時如何智門云蓮花僧云出水後如何智門云荷葉頌曰蓮花荷葉報君知出水何如未出時江北江南問王老一狐疑了一狐疑舉雪峯示衆云南山有一條鱉鼻蛇汝等諸人切須好看長慶出云今日堂中大有人喪身失命僧舉似玄沙沙云須是稜兄始得然雖如此我即不與麼僧云和尚作麼生沙云用南山作麼雲門以拄杖攛向雪峯靣前作怕勢頌曰象骨巖髙人不到到者須是弄蛇手稜師備師不奈何喪身失命有多少韶陽知重撥草南北東西無處討忽然突出拄杖頭拋對雪峯大張口大張口兮同閃電剔起眉毛還不見如今藏在乳峯前來者一一看方便師髙聲喝云看腳下舉保福長慶遊山次福以手指云只這裏便是妙峯頂慶云是即是可惜許師著語云今日共這漢遊山啚什麼復云百千年後不道無只是少後舉似鏡清清云若不是孫公便見髑髏遍野頌曰妙峯孤頂草離離拈得分明付與誰不是孫公辨端的髑髏著地幾人知舉劉鐵磨到溈山山云老牸牛汝來也磨云來日臺山大㑹齊和尚還去麼山放身卧磨便出去頌曰曾騎鐵馬入重城勑下傳聞六國清猶握金鞭問歸容夜深誰共御街行舉蓮花峯庵主拈拄杖示衆云古人到這裏為什麼不肯住衆無語自云為他途路不得力復云畢竟如何又自云楖栗橫擔不顧人却入千峯萬峯去頌曰眼裏塵沙耳裏土千峯萬峯不肯住落花流水太茫茫剔起眉毛何處去舉僧問百丈如何是竒特事丈云獨坐大雄山僧禮拜丈便打頌曰祖域交馳天馬駒化門舒卷不同途電光石火存機變堪笑人來捋虎鬚舉僧問雲門樹凋葉落時如何門云體露金風頌曰問既有宗答亦攸同三句可辨一鏃遼空大野兮涼飊颯颯長天兮踈雨濛濛君不見少林久坐未歸客靜依熊耳一叢叢舉南泉參百丈涅槃和尚丈問從上諸聖還有不為人說底法麼泉云有丈云作麼生是不為人說底法泉云不是心不是佛不是物丈云說了也泉云某甲只與麼和尚作麼生丈云我又不是善知識爭知有說不說泉云某甲不會丈云我大煞為汝說也頌曰祖佛從來不為人衲僧今古􅔡頭走明鏡當臺列象殊一一靣南看北斗斗柄垂無處討拈得鼻孔失却口舉僧問大隨劫火洞然大千俱壞未審這箇壞不壞隨云壞僧云與麼則隨他去也隨云隨他頌曰劫火光中立問端衲僧猶滯兩重關可憐一句隨他語萬里區區獨往還舉僧問趙州承聞和尚親見南泉是否州云鎮州出大蘿蔔頭頌曰鎮州出大蘿蔔天下衲僧取則只知自古自今爭辨鵠白烏黑賊賊衲僧鼻孔曾拈得舉麻谷持錫到章敬繞繩床三匝振錫一下卓然而立章敬云是是師著語云錯麻谷又到南泉繞繩床三匝振錫一下卓然而立泉云不是不是師著語云錯谷當時云章敬道是和尚為什麼道不是泉云章敬即是是汝不是此是風力所轉終成敗壞頌曰此錯彼錯切忌拈却四海浪平百川潮落古䇿風髙十二門門門有路空蕭索非蕭索作者好求無病藥舉定上座問臨際如何是佛法大意際下繩床擒住與一掌便托開定佇立傍僧云定上座何不禮拜定方禮忽然大悟頌曰斷際全機繼後蹤持來何必在從容巨靈擡手無多子分破華山千萬重舉陳操尚書看資福福見來便畫一圎相陳操云弟子恁麼來早是不著便更畫圎相資福便掩却門師云陳操只具一隻眼頌曰團團珠繞玉珊珊馬載驢駝上鐵船分付海山無事客鈞鼇時下一棬攣師復云天下衲僧跳不出舉仰山問僧近離甚處僧云廬山仰山云曾到五老峯麼僧云不曾到仰山云闍梨不曾遊山雲門云此語皆為慈悲之故有落草之談頌曰出草入草誰解尋討白雲重重紅日杲杲左顧無暇右眄巳老君不見寒山子行太早十年歸不得忘却却來時道舉文殊問無著近離甚處著云南方殊云南方佛法如何住持著云末法比丘少奉戒律殊云多少衆著云或三百或五百著問此間如何住持殊云凡聖同居龍蛇混雜著云多少衆殊云前三三後三三頌曰千峯盤屈色如藍誰謂文殊是對談堪笑淸涼多少衆前三三與後三三舉長沙一日遊山歸至門首首座問和尚什麼處去來沙云遊山來座云到什麼處來沙云始隨芳草去又逐落花迥座云大似春意沙云也勝秋露滴芙蕖師著語云謝答話頌曰大地絶纎埃何人眼不開始隨芳草去又逐落花迥嬴鶴翹寒木狂猿嘯古臺長沙無限意咄舉槃山垂語云三界無法何處求心頌曰三界無法何處求心白雲為蓋流泉作琴一曲兩曲無人㑹雨過夜堂秋水深舉風穴在郢州衙內上堂云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時有盧陂長老出問某甲有鐵牛之機請師不搭印風穴云慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云還記話頭麼試舉看盧陂擬開口穴又打一拂子牧主云佛法與王法一般穴云見箇什麼牧主云當斷不斷返招其亂穴便下座頌曰擒得盧陂跨鐵牛三玄戈甲未輕酬楚王城畔朝宗水喝下曾令却倒流舉僧問雲門如何是清淨法身門云花藥欄僧云便與麼去時如何門云金毛師子頌曰花藥欄莫顢頇星在稱兮不在盤便與麼太無端金毛師子大家看舉陸亘大夫與南泉語話次夫云肇法師道天地同根萬物一體也甚竒怪南泉指庭前花召大夫云時人見此一株花如夢相似頌曰聞見覺知非一一山河不在鏡中觀霜天月落夜將半誰共澄潭照影寒舉趙州問投子大死底人却活時如何投子云不許夜行投明須到頌曰活中有眼還同死藥忌何須鑒作家古佛尚言曾未到不知誰解撒塵沙舉龐居士辭藥山山命十人禪客相送至門首士指空中雪云好雪片片不落别處時有全禪客云落在什麼處士打一掌全云居士也不得草草士云汝恁麼稱禪客閻老子未放汝在全云居士作麼生士又打一掌云眼見如盲口說如啞師别初問處但握雪團便打頌曰雪團打雪團打龐老機關沒可把天上人閒不自知眼裏耳裏絶蕭灑蕭灑絶碧眼胡僧難辨别舉僧問洞山和尚寒暑到來如何迥避山云何不向無寒暑處僧云如何是無寒暑處山云寒時寒殺闍梨熱時熱殺闍梨頌曰垂手還同萬仞崖正偏何必在安排琉璃古殿照明月忍俊韓獹空上階舉禾山垂語云習學謂之聞絶學謂之鄰過此二者是為真過僧出問如何是真過山云解打鼓問如何是真諦山云解打鼓問即心即佛即不問如何是非心非佛山云解打鼓問向上人來如何接山云解打鼓頌曰一拽石二般土發機須是千鈞弩象骨老師曾輥毬爭似禾山解打鼓報君知莫莽鹵甜者甜兮苦者苦舉僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤頌曰編辟曽挨老古錐七斤衫重幾人知如今拋擲西湖裏下載清風付與誰舉鏡清問僧門外什麼聲僧云雨滴聲清云衆生顚倒迷已逐物僧云和尚作麼生清云洎不迷已僧云洎不迷已意旨如何清云出身猶可易脫體道應難頌曰虛堂雨滴聲作者難酬對若謂曾入流依前還不㑹㑹不㑹南山北山轉雱霈舉僧問雲門如何是法身門云六不收頌曰一二三四五六碧眼胡僧數不足少林謾道付神光卷衣又說歸天竺天竺茫茫無處尋夜來却對乳峯宿舉王太傅入招慶煎茶時朗上座與明招把銚朗翻却茶銚太傅見問上座茶爐下是什麼㓪云捧爐神太傅云既是捧爐神為什麼翻却茶朗云仕官千日失在一朝太傅拂袖便去明招云朗上座喫却招慶飯了却江外打野榸朗云上座作麼生招云非人得其便師云當時但踏倒茶爐頌曰來問若成風應機非善巧可悲獨眼龍曾未呈牙爪牙爪開生雲雷逆水之波經幾回舉三聖問雪峯透網金鱗未審以何為食峯云待汝出網來向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事煩頌曰透網金鱗休云滯水搖乾蕩坤振鬛擺尾千尺鯨噴洪浪飛一聲雷振清飊起清飊起天上人閒知幾幾舉僧問雲門如何是塵塵三昧門云鉢裏飯桶裏水頌曰鉢裏飯桶裏水多口阿師難下觜北斗南星位不殊白浪滔天平地起擬不擬止不止箇箇無裩長者子舉雪峯住庵時有兩僧來禮拜峯見來以手托庵門放身出云是什麼僧亦云是什麼峯低頭歸庵僧後到巖頭頭問什麼處來僧云嶺南來頭云曾到雪峯麼僧云曾到頭云有何言句僧舉前話頭云他道什麼僧云他無語低頭歸庵頭云噫我當初悔不向他道末後句若向伊道天下人不奈雪老何僧至夏末載舉前話請益頭曰何不早問僧云未敢容易頭云雪峯雖與我同條生不與我同條死要識末後句只這是頌曰末後句為君說明暗雙雙底時節同條生也共相知不同條死還殊絶還殊絶黃頭碧眼須甄别南北東西歸去來夜深同看千巖雪舉僧問趙州久響趙州石橋到來只見略彴州云汝只見略彴不見石橋僧云如何是石橋州云渡驢渡馬頌曰孤危不立道方髙入海還須釣巨鼇堪笑同時灌溪老解云劈箭亦徒勞舉馬大師與百丈行次見野鴨子飛過大師云是什麼丈云野鴨子大師云什麼處去也丈云飛過去也大師遂扭百丈鼻頭丈作忍痛聲大師云何曾飛去頌曰野鴨子知何許馬祖見來相共語話盡山雲海月情依前不㑹還飛去欲飛去却把住道道舉雲門問僧近離甚處僧云西禪門云西禪近日有何言句僧展兩手門打一掌僧云某甲話在門却展兩手僧無語門便打頌曰虎頭虎尾一時收凛凛威風四百州却問不知何太險師云放過一著舉道吾與漸源至一家吊慰源拍棺木云生耶死耶吾云生也不道死也不道源云為什麼不道吾云不道不道迥至中路源云和尚快與某甲道若不道打和尚去吾云打即任打道即不道源便打後道吾遷化源至石霜舉似前話霜云生也不道死也不道源云為什麼不道霜云不道不道源於言下有省一日將鍬子於法堂上東邊過西邊西邊過東邊霜云作什麼源云覔先師靈骨霜云洪波浩渺白浪滔天覔什麼先師靈骨師著語云蒼天蒼天源云正好著力太原孚云先師靈骨猶在頌曰兔馬有角牛羊無角絶毫絶釐如山如嶽黃金靈骨今猶在白浪滔天何處著無處著隻履西歸曾失却舉良禪客問欽山一鏃破三關時如何云放出關中主看良云與麼則知過必改山云更待何時良云好箭放不著所在便出山云且來闍梨良回首山把住云一鏃破三關即且致試與欽山發箭看良擬議山打七棒云且聽這漢疑三十年頌曰與君放出關中主放箭之徒莫莽鹵取箇眼兮耳必聾捨箇耳兮目雙瞽可憐一鏃破三關的的分明箭後路君不見玄沙有言兮大丈夫先天為心祖舉僧問趙州至道無難唯嫌揀擇如何是不揀擇州云天上天下唯我獨尊僧云此猶是揀擇州云田厙奴什麼處是揀擇僧無語頌曰似海之深如山之固蚊虻弄空裏猛風螻蟻撼於鐵柱揀兮擇兮當軒布鼓舉僧問趙州至道無難唯嫌揀擇是時人窠窟否州云曾有人問我直得五年分踈不下頌曰象王嚬呻師子哮吼無味之談塞斷人口南北東西烏飛兔走舉僧問趙州至道無難唯嫌揀擇才有語言是揀擇和尚如何為人州云何不引盡這語僧云某甲只念到這裏州云只這至道無難唯嫌揀擇頌曰水灑不著風吹不入虎步龍行鬼號神泣頭長三尺知是誰相對無言獨足立舉雲門以拄杖示衆云拄杖子化為龍吞却乾坤了也山河大地甚處得來頌曰拄杖子吞乾坤徒說桃花浪奔燒尾者不在拏雲霧曝鰓者何必喪膽忘魂拈了也聞不聞直須灑灑落落休更紛紛紜紜七十二棒且輕恕一百五十難放君師驀拈拄杖下座大衆一時走散舉風穴垂語云若立一塵家國興盛不立一塵家國喪亡師拈拄杖云還有同生同死底衲僧麼頌曰野老從教不展眉且啚家國立雄基謀臣猛將今何在萬里風清秖自知舉雲門垂語云乾坤之內宇宙之間中有一寶袐在形山拈燈籠向佛殿裏將三門來燈籠上頌曰看看古岸何人把釣竿雲冉冉水漫漫明月蘆花君自看舉南泉一日東西堂猫兒南泉見遂提起云道得即不斬衆無對泉斬却猫兒為兩段頌曰兩堂俱是杜禪和撥動煙塵不奈何賴得南泉能舉令一刀兩段任偏頗南泉復舉前話問趙州州便脫草鞋於頭上戴出泉云子若在恰救得猫兒頌曰公案圎來問趙州長安城裏任間遊草鞋頭戴無人㑹歸到家山便即休舉外道問佛不問有言不問無言世尊良久外道讃歎云世尊大慈大悲開我迷雲令我得入外道去後阿難問佛云外道有何所證而言得入佛云如世良馬見鞭影而行頌曰機輪曾未轉轉必兩頭走明鏡忽臨臺當下分妍醜妍醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得回喚得回鳴指三下舉僧問大龍色身敗壞如何是堅固法身龍云山花開似錦澗水湛如藍頌曰問曾不知答還不會月冷風髙古巖寒檜堪笑路逢逹道人不將語默對手把白玉鞭驪珠盡擊碎不擊碎增瑕纇國有憲章三千條罪舉雲門大師垂語云古佛與露柱相交是第幾機自代云南山起雲北山下雨頌曰南山雲北山雨四七二三面相覩新羅國裏曾上堂大唐國裏未打鼓苦中樂樂中苦誰道黃金如糞土舉巖頭問僧什麼處來僧云西京來頭云黃巢過後還收得劒麼僧云收得巖頭引頸近前云㘞僧云師頭落也巖頭呵呵大笑僧後到雪峯峯問什麼處來僧云巖頭來峯云有何言句僧舉前話雪峯打三十趂出頌曰黃巢過後曾收劒大笑還應作者知三十山藤且輕恕得便冝是落便冝舉梁武帝請傅大士講經大士便於座上揮案一下便下座武帝愕然志公問陛下還㑹麼帝云不㑹公云大士講經竟頌曰不向雙林寄此身卻於梁土惹埃塵當時不得志公老也是恓恓去國人舉仰山問三聖汝名什麼聖云慧寂山云慧寂是我聖云我名慧然仰山呵呵大笑頌曰雙收雙放若為宗騎虎由來要絶功笑罷不知何處去只應千古動悲風舉南泉歸宗麻谷同去禮拜忠國師至路南泉於地上畫一圎相云道得即去歸宗於圎相中坐麻谷便作女人拜泉云漝麼則不去也宗云是什麼心行頌曰由基箭射猿繞樹何太直千箇與萬箇是誰曾中的相喚相呼歸去來曹溪路上休登陟復云曹溪路坦平為什麼休登陟舉溈山五峯雲巖同侍立百丈百丈問溈山併却咽喉唇吻作麼生道溈山云却請和尚道百丈云我不辭向汝道恐巳後喪我兒孫頌曰却請和尚道虎頭生角出荒草十洲春盡花凋殘珊瑚樹林日杲杲舉百丈復問五峯併却咽喉唇吻作麼生道五峯云和尚也須併却百丈云無人處斫額望汝頌曰和尚也併却龍蛇陳上看謀略令人長憶李將軍萬里天邊飛一鶚舉百丈又問雲巖併却咽喉唇吻作麼生道雲巖云和尚有也未百丈云喪我兒孫頌曰和尚有也未金毛師子不踞地兩兩三三舊路行大雄山上空彈指舉僧問馬大師離四句絶百非請師直指某甲西來意馬師云我今日勞倦不能為汝說問取智藏去僧問智藏藏云何不問和尚僧云和尚教來問智藏云我今日頭痛不能為汝說問取海兄去僧問海海云我到這裏却不㑹僧舉似馬大師馬師云藏頭白海頭黑頌曰藏頭白海頭黑明眼衲僧㑹不得馬駒踏殺天下人臨際者是白拈賊離四句絶百非天上人閒唯我知舉金牛和尚每至齊時自將飯於僧堂前作舞呵呵大笑云菩薩子喫飯來師云雖然如此金牛不是好心僧問長慶古人道菩薩子喫飯來意旨如何長慶云大似因齊慶讃頌曰白雲影裏笑呵呵兩手持來付與他若是金毛師子子三千里外見誵訛舉僧問大光長慶道因齊慶讃意旨如何大光作舞僧禮拜光云見箇什麼便禮拜僧作舞光云這野狐精頌曰前箭猶輕後箭深誰云黃葉是黃金曹溪波浪如相似無限平人𬒳陸沉舉鹽官一日喚侍者與我將犀牛扇子來侍者云扇子破也官云扇子既破還我犀牛兒來侍者無對投子云不辭將出恐頭角不全師拈云我要不全底頭角石霜云若還和尚即無也師拈云犀牛兒猶在資福畫一圎相於中書一牛字師拈云適來為什麼不將出保福云和尚年尊别請人好師拈云可惜勞而無功頌曰犀牛扇子用多時問著元來㹅不知無限清風與頭角盡同雲雨去難追師復云若要清風再覆頭角重生請禪客下一轉語問云扇子既破還我犀牛兒來時有僧出云大衆參堂去師喝云拋鈎釣鯤鯨釣得箇蝦䗫便下座舉丗尊一日升座文殊白槌云諦觀法王法法王法如是丗尊便下座頌曰列聖叢中作者知法王法令不如斯㑹中若有仙陀客何必文殊下一槌舉僧從定州和尚㑹裏到烏臼烏臼問定州法道何似這裏僧云不别臼云若不别更轉彼中去便打僧云棒頭有眼不得草草打人臼云今日打著一箇也又打三下僧便出去臼云屈棒元來有人喫在僧轉云爭奈杓柄在和尚手裏臼云汝若要山僧回與汝僧近前奪臼手中棒打臼三下臼云屈棒屈棒僧云有人喫在臼云草草打著箇漢僧便禮拜臼云却與麼去也僧大笑而出臼云消得漝麼消得漝麼頌曰呼即易遣即難互換機鋒子細看劫石固來猶可壞滄溟深處立須乾烏臼老烏臼老幾何般與他杓柄太無端舉丹霞問僧甚處來僧云山下來霞云喫飯也未僧云喫飯了也霞云將飯與汝喫底人還具眼麼僧無語長慶問保福將飯與人喫報恩有分為什麼不具眼福云施者受者二俱瞎漢慶云盡其機來還成瞎否福云道我瞎得麼頌曰盡機不成瞎按牛頭喫草四七二三諸祖師寶器持來成過咎過咎深無處尋天上人間同陸沉舉僧問雲門如何是超佛越祖之談門云糊餅頌曰超談禪客問偏多縫鏬披離見也麼糊餅𡎺來猶不住至今天下有誵訛舉古有十六開士於浴僧時隨例入室忽悟水因諸禪德作麼生會他道妙觸宣明成佛子住也須七穿八穴始得頌曰了事衲僧消一箇長連床上展腳卧夢中曾說悟圓通香水洗來驀靣唾舉僧問投子一切聲是佛聲是否投子云是僧云和尚莫㞘沸碗鳴聲子便打又問粗言及細語皆歸第一義是否子云是僧云喚和尚作一頭驢得麼子便打頌曰投子投子機輪無阻放一得二同彼同此可憐無限弄潮人畢竟還落潮中死忽然活百川倒流閙􅣇􅣇舉僧問趙州和尚初生孩子還具六識也無州云急水上打毬子僧復問投子急水上打毬子意旨如何子云念念不停流頌曰六識無功伸一問作家曾共辨來端茫茫急水打毬子落處不停誰解看舉僧問藥山平田淺草塵鹿成羣如何射得塵中塵山云看箭僧放身便倒山云侍者拖出僧便走山云弄泥團漢有什麼限師拈云三步雖活五步須死頌曰塵中塵君看取下一箭走三步五步若活成羣趂虎正眼從來付獵人師髙聲云看箭舉維摩詰問文殊師利何等是菩薩入不二法門文殊師利曰如我意者於一切法無言無說無示無識離諸問答是為入不二法門於是文殊師利問維摩詰我等各自說巳仁者當說何等是菩薩入不二法門師云維摩道什麼復云勘破了也頌曰咄這維摩老悲生空懊惱卧疾毗耶離全身太枯槁七佛祖師來一室且頻掃請問不二門當時便靠倒不靠倒金毛師子無處討舉僧到桐峯庵主處便問這裏忽逢大蟲又作麼生庵主便作虎聲僧便作怕勢庵主呵呵大笑僧云這老賊主云爭奈老僧何僧休去師云是即是兩箇惡賊只解掩耳偷鈴頌曰見之不取思之千里好箇班班爪牙未備君不見大雄山下忽相逢落落聲光皆振地大丈夫見也無收虎尾兮捋虎鬚舉雲門大師垂語云人人盡有光明在看時不見暗昏昏作麼生是諸人光明自代云厨庫三門又云好事不如無頌曰自照列孤明為君通一線花謝樹無影看時誰不見見不見倒騎牛兮入佛殿舉雲門大師示衆云藥病相治盡大地是藥那箇是自已頌曰盡大地是藥古今何太錯閉門不造車通途自寥廓錯錯鼻孔遼天亦穿却舉玄沙示衆云諸方老宿盡道接物利生忽遇三種病人來作麼生接患盲者拈槌竪拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得且作麼生接若接此人不得佛法無靈驗僧請益雲門門云汝禮拜著僧禮拜起門以拄杖便挃僧退後門云汝不是患盲復喚近前來僧近前門云汝不是患聾乃云還㑹麼僧云不㑹門云汝不是患啞其僧於此有省頌曰盲聾音啞沓絶機冝天上天下堪笑堪悲離朱不辨正色師曠豈識玄絲爭如獨坐虛窗下葉落花開自有時復云還㑹也無無孔鐵鎚舉雲巖問道吾大悲菩薩用許多手眼作什麼吾云如人夜半背手摸枕子巖云我㑹也吾云汝作麼生㑹巖云遍身是手眼吾云道即大殺道只得八成巖云師兄作麼生吾云通身是手眼頌曰遍身是通身是拈來猶較十萬里展翅崩騰六合雲搏風鼓蕩四溟水是何埃塏兮忽生那箇毫釐兮未止君不見網珠垂範影重重棒頭手眼從何起喝舉僧問智門如何是般若體門云蚌含明月僧云如何是般若用門云兔子懷胎頌曰一片虛凝絶謂情天人從此見空生蚌含玄兔深深意曾與禪家作戰爭舉楞嚴經云吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝頌曰全象全牛翳不殊從來作者共名模如今要見黃頭老剎剎塵塵在半途舉長慶有時云寧說阿羅漢有三毒不說如來有二種語不道如來無語只是無二種語保福云作麼生是如來語慶云聾人爭得聞保福云情知汝向第二頭道長慶云作麼生是如來語保福云喫茶去頌曰頭兮第一第二卧龍不鑒止水無處有月波澄有處無風浪起稜禪客稜禪客三月禹門遭點額舉趙州示衆三轉語頌曰泥佛不度水神光照天地立雪如未休何人不雕僞金佛不度爐人來訪紫胡牌中數箇字淸風何處無木佛不度火常思破竈墮杖子忽擊著方知辜負我舉金剛經云若為人輕賤是人先丗罪業應墮惡道以今世人輕賤故先世罪業則為消滅頌曰明珠在掌有功者賞胡漢不來全無伎倆伎倆既無波旬失途瞿曇瞿曇識我也無復云勘破了也舉天平依和尚行腳時參西院常云莫道㑹佛法覔箇舉話人也無一日西院遙見召云從依平舉頭西院云錯平行三兩步西院又云錯平近前西院云適來這兩錯是西院錯上座錯平云從依錯西院云錯平休去西院云且在這裏過夏待共上座商量這兩錯平當時便行後住謂衆云我當初行腳時𬒳風吹到思明長老處連下兩錯更留我過夏待共我商量我不道恁麼時錯發足南方去時早知道錯了也頌曰禪家流愛輕薄滿肚參來用不著堪悲堪笑天平老却謂當初悔行腳錯錯西院淸風頓銷鑠復云忽有箇衲僧出云錯雪竇錯何似天平錯舉肅宗帝問忠國師如何是十身謂御師云檀越踏毗盧頂上行帝云寡人不㑹師云莫認自已淸淨法身一國之師亦強名南陽獨許振嘉聲大唐扶得真天子曾踏毗盧頂上行鐡鎚擊碎黃金骨天地之閒更何物三千剎海夜澄澄不知誰入蒼龍窟舉僧問巴陵如何是吹毛劒陵云珊瑚枝枝撑著月頌曰要平不平大巧若拙或指或掌倚天照雪大冶兮磨礱不下良工兮拂拭未歇別別珊瑚枝枝撑著月雪竇顯和尚頌古一百則竟參學仙都沙門簡能校勘
