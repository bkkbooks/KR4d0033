front:
  text: 雪竇顯和尚明覺大師頌古集序昔雪峯以吾佛之道唱於閩雲門繼而和於而降賡厥聲者夥矣然皆未甚燀赫於世也天禧中雪竇始以是道宏其音髙其調藹然鼓之于吳繇是吳之學佛輩翕然魯變格于正始逮今洋洋焉不可勝計大哉真諦之為言也視焉而無際徇焉而無朕非夫至神洞照者雖復歷于丗數勤以求之勞形骸竭思慮曾莫得其髣佛焉必藉先覺為之啓發不一瞬間而妙圎巳極今雪竇應昌期以挺其粹嗣智門以恢其宗軟語微言固巳盛行於丗矣今又採古聖機緣之妙者凡百則發言以為頌由頌以宣義由義以垂𥙿俾夫昧者明窒者通泥而不能致逺者咸有所救焉且夫靜以虛其應動以利于物此先聖人之能事也揭是事而行之于澆季循循而不怠愚未見有如雪竇者矣門弟子逺塵既繕録之小子曇玉復繼而序之歲攝提格月仲牡哉生魄
