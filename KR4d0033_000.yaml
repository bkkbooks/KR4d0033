body:
  text: 參學小師逺塵集舉梁武帝問達磨大師如何是聖諦第一義達磨云廓然無聖帝云對朕者誰達磨云不識帝不契遂渡江至魏武帝舉問志公志公云陛下還識此人否帝曰不識志公云此是觀音大士傳佛心印帝悔遂遣使取志公云莫道陛下發使去取闔國
  hash: sha256:20703e594dedfa059ab7b5765174261d4f11eaa9ac74a27c4907af3cc547f0d9
