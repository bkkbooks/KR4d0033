front:
  text: 慶元府雪竇明覺大師祖英集上
  hash: sha256:d751b4e84bd5774e76eac7ab42b9a08ee6348121ef6b8931d660a37d1cd95a91
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0033_SBCK_002-1a}
body:
  text: 參學小師文政序師之形言也且異乎陽春白雪碧雲清風者也夫大圭不琢貴乎天真至言不文尚於理實乃世之衡鑑豈智識而擬議哉師自戾止翠峯雪竇或先德言句淵密師因而頌之或感興懷别貽贈之作固亦多矣其有好道者並録而囊之一日揔緝成二百二十首乃寫呈師師曰余偶興而作寧存于本不許行焉禪者應曰乃祖闈千載之芳烈也勿輕舍諸師察其慤志勉弗獲巳抑而從之文政幸侍座機輒述序引用識歲時炎宋天聖十年孟陬月謹序送寶相長老并序大師歡禪德將赴丹丘辟命光闡宗乘蓋時應必行固不可抑留者也且撫會之作肇曠絶之道雖一凝一流一彼一此又何間然率織蕪辭以代賮别奧域靈區存物外獨標台嶺為絶槩掩勝濳竒列作屏堆青寫碧深如黛彤霞暖影生巖壁香桂茂隂籠蘚石赤松子也浪虛間白道猷兮太輕擲曹溪有叟歸其中風從虎兮雲從龍乘興正值二三月坐斷還依千萬峯花飛飛日遲遲清飈吹無時玲瓏八面自回合峭峻一方誰敢窺窺來須得乾坤眼照古騰今謂非間若能此去副全提開發人天有何限送法海長老常愛裴相國式芳塵斷際髙風慕要倫擬欲事師為弟子不知將法付何人常愛李相國垂列星藥嶠深源宅性靈我來問道無餘説雲在清霄水在瓶緬想當時二台輔出鎮藩維訪諸祖寥寥浮幻輕百年落落宏規照千古今聞仙都賢太守入政褰帷聲浩浩英佐一一分化條文經武緯亦難討逺逺箋函飛乳峯選開士兮恢吾宗覿夜光非震滄海聆正音豈玩焦桐徒誇麟龍自西自東應排罔象得象必須覺雄讓雄今既塞請還也竒别茫茫普熱紛紛下雪倒流四河載發枯枿卷舒立方外乾坤蹤橫挂域中日月黃頭碧眼知未知去去慿誰繼清絶送文政禪者古有焦桐音聽寡不在彈古有陽春曲和寡不在言言兮牙齒寒未極離微根彈兮歲月闌未盡升沉源少林幾坐花木落庾嶺獨行天地寬因笑仲尼溫伯雪傾蓋同途不同轍麟兮鳯兮安可論許兮巢兮復何説秋光澄澄蟾印水秋風蕭蕭葉初墜送君髙蹈誰不知如曰不知則為貴送昭敏首座君不見鷲峯勝集百萬茫茫等間過壞衲之外皆淸墯君又不見熊嶺孤運歲月索索艱難生深雪之中有一箇宛轉流落千餘年危分嶮布空平闐辨龍蛇兮眼何正擒虎兕兮機不全石窗四顧滄溟窄寥寥不許白雲白掣斷金鎖天麒麟髙舉鐵鞭擊三百猶輕舍爭知也别有七星光鬪射風前把欲贈行人將報不平繞天下送知白禪者松不直棘不曲誰笑卞和三獻玉經天緯地太無端邁古超今亦輕觸靡羇束何必云素範還還真規復復旃檀葉落香風清千里萬里長相逐送勝因長老黃梅散席三百載續熖聮芳事空在宗兮派兮生異端花兮葉兮太煩碎韶陽間出多慷慨權要雄雄曾絶待曲木據位知幾何利刀翦却令人愛近還有箇披老衲楚甸橫身風颯颯鐵作一尋非等間壁立千仞須摧踏報君知江南江北徒纍纍鼇轉海運兮纎鱗片甲雷奔電驅兮寸毫尺氂斯言勿謂存規矩平不留兮險非取周行獨立如便休誰振宏綱照千古送重郜禪者春雨如膏春雲如鶴忽此忽彼乍休乍作枯荄離離維風太遲幽石片片遼空亦危一花五葉兮不相似獨孤明兮還自知還自知歷魏遊梁徒爾為送僧歸靈隱因矚白雲無羇白雲無羇冷淡清竒雪格未可鶴態還卑垂天沃日兮似結不結為雨從龍兮後期必期噫悠悠忽爾春風吹南北東西唯我知誰知菡蓞峯前布影時送僧之石梁萬卉流芳不知春力巖畔澗下蹙紅皺碧乘興復誰同孤蹤逺讎敵君不見五百聖者導雄機靈峯晦育深無極寒山老寒山老隨沉迹迢迢此去須尋覔花落花開獨望時記取白雲抱幽石送師旻禪者深巖寂寂披蘭芷碧霧紅霞映流水空生别我期未期絶域殊方擬輕擬堪笑歸嶺南奔馳何鄙彼危急亂拋下盡云提不起伊豫本自不將來相送奚慿挂唇齒旻禪客旻禪客師子子應須落落存終始君不見古人有言兮撲碎麗龍明月珠大丈夫到如此行行不用頻彈指寄白雲長老八紘雲靜明寥泬夜永松堂對寒月凋殘片葉墜虛庭冷寂何人立深雪因憶錢唐郜禪者十載巖栖曾未下分飛誰謂絶相同逺念冥冥欲奚寫忽聞赴請之仙都聲光藹藹登清途孰云天驥驟方外自笑大鵬離海隅乾坤窄乾坤窄湛盧濳射斗牛白茫茫無限未歸人到必為時除點額送智遷首座雲蘿杳杳藏巖曲碧疊清飛冷相促瘦藤輕衲休便休短熖殘芳續何續禪家本自冥羇絆洲渚園林曾不憚十影神駒立海涯五色祥麟步天岸君看取君看取匝地茫茫有誰舉瓴甋頻磨如未回為吾深憶盧公語送善暹首座名之基實之蒂深兮固兮宛相繼古之名也在希聲今之實也同浮翳子州善卷之流也堯驅舜馳讓無暇歸去來兮歸不歸到頭未出冥冥者吾徒孰謂標竒絶動靜慿君試甄别葉零零兮秋暮半凋花片片兮春暖齊發暹禪老暹禪老意曾髙曠排沽待忽致譏褒天人列請兮屢輕笑祖佛位卑兮還擬逃我恐逃之逃不得大方無外皆充塞茫茫擾擾知何極八面香風惹衣裓送僧吳山碧楚江碧吳楚悠悠興何極一尋寒木自為鄰三事秋雲更誰識乾坤不是無知巳玉石休云辨真偽待時沽譽漫淪生晦迹韜光亦何意春風急春風急八駿奔馳追不及南北東西把定時為君直上孤峯立觀氣分枝非獨古有誠之言也頌藥山師子話送僧厇訴金毛師子子栴檀林下青莎裏置也置也威自全一出六出眉剔起非擬擬知幾幾星流不問三千里天外風清哮吼時為君吸盡西江水咄送秀大師巖竇宵寒擁山帔月髙古木霜禽睡西庵禪者來扣門别我凌晨下層翠欲留不可留寫意不及意屈眴迢迢安足云花偈聮聮太容易君不見劉陽叟絶希冀送人只道無他事行行會有知音知何必清風動天地送廣華嚴歸鷲峯海山孤僻非蓬島霧冷雲深松桂老有客凝冬何太髙巨野宵征苦相討巖房杳杳凌寒空冰霜落落分談叢誰云百城沉古月自笑八面生清風俄然别我還歸去惠理之徒望回馭重重無盡樓問門到必為時略輕據送逺塵禪者衲卷殘雲風髙絶鄰倚天照雪堪抗要津八紘極目兮春山若黛九野縱步兮汀草如茵三十四老未輕識凛然方外奚相親送德隆山主霜葉凋殘巖風凛寒彼之禪老忽下崇巒衲有雲兮曾卷未卷琴無絃兮解彈不彈迢迢既行冝聽斯語明暗路岐生死洲渚而今而後知不知頽綱委地慿誰舉送澄禪者春色依依襲爾原草春風浩浩拂我窗牖念此分飛贈無瓊玖片片亂飄巖上梅條條縱舞溪邊栁澄禪澄禪聽斯言古也今也行路難知之者石火星流未急不知者龍驥步驟曾寬看看孰云平地起波瀾送惠儔禪者少林風規何太蕭灑籠古罩今睥真睨假誰云發機射虎自笑品類觀馬劒客茫茫不要呈甑人往往須擒下儔禪儔禪崢嶸象駕送惠文禪者正法眼絶塵沙二三四七水月空花千燈續𦦨曽間五葉分披未葩君不見卷席百丈掩耳丹霞龍行虎步爭孤立盡同雲雨去無涯文禪文禪騰煥吾家送道成禪者曹溪流非止水一點忽來千波自起直須釣鼇釣鯨莫問得皮得髓君不見石頭有言兮聖不慕他靈不在已成禪成禪誰家之子送清演禪者我年老大心力衰微贈别無語冥同振飛因思古之送人有言吾不知其殊途同歸獨愛新豐曲騰清輝寸草不生千萬里出門春色共依依送繼寶禪者寶非寶日杲杲上上機無處討赤水求來何太狂荆山覔得苦相惱不惱不狂排夜光險惡道中為津梁送小師元楚道之冥機一何相守汝競光隂我親蒲栁母厚辨之奪席母薄愚之誦帚深思彼伐木丁丁之聲照古照今兮冝善求友送清杲禪者春雨濛濛春風動兮靜兮匪待時出雲霞間淡作性金鐵冷落為骨知我者謂我髙蹈丗表不知我者謂我下視塵窟道恣隨方情融羇鎖紫栗一尋青山萬朵行行思古人之言無可不可南北東西但唯我酬行奯長老黃金為骨松為姿道髙曾鄙天人師有言遺我千古竒無人知石虎吞却木羊兒至人不器誰當機舉不賺亦還稀摧殘峭峻銷爍玄微重關曾巨闢作者未同歸玉兔乍圎乍缺金烏似飛不飛盧老不知何處去白雲流水共依依因事示衆石本落落玉自碌碌古之今之一何速師子不咬麒麟猛虎不食伏肉君不見洞庭孤島煙浪深木馬追風有人識日暮遊東澗五首極目生晚照溪雲偶成朵大朴曾未分青山自唯我極目生晚照逺樹籠微隂誰知清淺流别有滄海深極目生晚照幽情眷蘭芷白蘋葉裏風不在秋江起極目生晚照步影何遲遲歸禽古木中相對頻相窺極目生晚照蓬萊匪仙境釣得十二鼇重來謝孤影思歸引三首一住翠峯頂兩見溪草緑不知朝市間幾畨生榮辱蕭條巖上雲冷淡水邊竹報誰歸去來向此空踟躅常憶在廬山隨時寄瓶錫五百與一千聚頭同遣日猿攀影未回鶴望情還失教他王老師癡鈍無處覔時雨灑如膏萬卉皆滋益枯根甘自休也似春無力耕夫曉尚眠蠶婦夜多息從兹家業荒共落風塵迹送藴歡禪者西上金闕路曾遙行行值開泰石房雲未間杳杳若相待髙蹤逾履冰何人不傾蓋早晚承帝恩再卜林泉會送僧春雲情既髙片假飛虛碧去留機未消今古望還積澄澄天影回杳杳地形直别夜共相思誰栖此泉石法爾不爾夏雲多竒峯乾城冷相映借問諸禪僧那箇堪慿定乾城髙鎖月夏雲欲為雨若謂非全功子細看規矩送諸方化主空巖暖律回極目望還普數點方外雲幾處人間雨寥寥滄海月依依少林祖去必示勞生清風立千古劉禹端公問雲居雨從何來東平問官人風作何色雨從何來風作何色龍門萬仞曾留宿客進退相將誰遭點額風作何色雨從何來不用彈指樓閣門開波波稜稜南方未回送僧松風清未休水月淡相對去來非等間必許孤雲會頌雲門九九八十一二首三三九九八十一一一觀風隨召出千古有誰同共知一毛師子衆毛畢九九八十一大勳不豎賞若謂無詨訛金剛曾合掌烏龍和尚空巖清夜坐蘚徑積深雪瞑目思古人徹曙落殘月童敲石磬寒猿挂枯枝折杳杳無限情分明向誰説秋日送僧邊鴈影邪寒蟬聲速乘時毳流逺别巖谷林驚一葉兮微風觸袖水肅百川兮片月在目因憶象骨老師曾送人行行不謂抽金鏃早參示衆曉天雲靜濃霜白千峯萬峯鎖寒色驪龍失珠知不知無限平人遭點額春風辭寄武威石袐校春風何蕭蕭和雨復兼雪坼花功未深偃草勢曾烈毗城癡愛老怯寒對清拙衰巖影響士難御同孤劣鼇峯人不來柴門亦休閉松頭栗鼠下時把藤牀囓庭際霜禽歸屢啄苔錢缺一旦春風息暖日生林樾幽徑磐石上拄笻行且歇無絃兮莫彈有語兮存舌冷落流水聲古之若為説凋殘早梅樹今之若為别俯仰身力輕翻憶春風切為吾吹却塵欲革分歧轍為吾吹却雲欲問遼空月不知天地間堪為誰交結送百丈專使大雄孤頂曾遐舉遍索諸方誰敢拒乳竇峯前捋虎鬚再得完全又歸去送清素禪者之金華古䇿風髙瓶浪闊春雲片假分清絶金盆后夜孤頂寒去去誰同落殘月擬寒山送僧擇木有靈禽寒空寄羽翼不止蓬萊山冥冥去何極送如香大師栴檀葉落雨初歇天外風清亦何别後夜蓮城溪月寒孤光誰共倚寥泬寄于袐丞二首石徑通巖竇引步藏欹側蓬萊人不來掃盡蒼苔色飛瀑千萬層五月狀冰雪將期雲霧開永夜對孤月再成古詩霜花一鑷中玉童摘未摘斯言如不聞千古動愁色因憶商山吟在鳥如在白答當生不生咄咄休強名芻狗亦為纍寂寥金粟身曾未求諸巳戲靠安巖呈雙溪大師陜府鐵牛却知有春秋幾幾成過咎一身還作二如來黑白不分辨香臭疏黑白無從天地不仁萬化蠢蠢若謂非緣竹何從笋髮兮髮兮黑白是凖暮冬感懷寄瑞巖禪師雪水繞松檻遲遲結清淺病眼時懶開幽情況難遣故人久相别飛文屢慙􅌤仰謝十二峯分照月如翦送知久禪者霜竹凝寒携九節銅瓶浪鎖千溪月天上人間不自知行行誰共分清絶送慶顔禪者巖桂風清香露滴定起髙秋映虛碧斷雲不是歸帝鄉飛落人間有誰識春日懷古四首門外春將半巖冰暖有聲玄沙曾未到虛得偃溪名門外春將半青青野色分桃花開欲盡無處覔靈雲門外春將半群芳鬪盛時鄰家有庭柏諸祖共相知門外春將半幽禽語共新寶陀巖上客應笑未歸人送僧之金陵勝遊生末迹杳自狎時群卷衲消寒木揚帆寄斷雲曙瓶花外汲午磬浪邊聞别後石城月依依逺共分送僧知方流古意雲樹别諸鄰月不澄微水山應立是塵靜空孤鶚逺髙柳一蟬新欲究勞生問歸思莫厭頻千里不來不見古君子因循又隔秋浮生多自擲好事更誰留碧巘髙沉月寒雲靜鎖樓宗雷何處是白鳥下汀洲僧歸霅上海國浮輕楫悠悠興未闌草隨春岸緑風倚夜濤寒沙鷺冝相狎霜蟾望更寬河聲西聽日誰得共雲端春晴野步乘興携多士遲遲傍水濆春山不在目啼鳥共誰聞片石寒籠蘚殘花冷襯雲只應融老輩庵際境猶分賦瑞雪送穆大師五六皆名出飄花獨見稀若教同一色還似負群機玉馬猶空説銅駝轉更非爭如千萬里相對共依依送鐵佛專使荷䇿來尋我泛舟思舊山不知何處月相照在深灣風助秋濤急雲兼野樹間到時如請益先憶趙州關同于袐丞賦瀑泉大禹不知鑿來源亦自成色應鄰衆白聲合讓孤清逺勢曾吞海飛流未噴鯨靈槎如可泛天派問歸程送簡能禪者歸仙都荷䇿下丹嶂紛紛雪正飛浮生誰未到舊國自重歸雲背猿聲斷天遙鶚影微蓮城古風月又得振清機天竺送僧雪霽蓮峯頂孤禪起石牀向時機自絶異域路空長啼狖衝寒影歸鴻見斷行後期無定迹煙水共茫茫寄石袐校重林冥坐久引望復遲遲煩暑未消日涼風來幾時天雲飛積火巖溜散垂絲欲擬相尋去浮生巳共知因事示衆客從逺方來遺我徑寸璧中有四箇字字字無人識清涵鯨海寬冷射蟾輪窄今朝呈似看請道末後句靜而善應二首覿面相見不在多端龍蛇易辨衲子難瞞金槌影動寶劒光寒直下來也急著眼看對揚殊特本同參誰自遼空強指南今古不存師弟子一輪秋月印寒潭自誨麟龍不為瑞草木生光輝三尺一丈六且同携手歸慙爾懲丗師巍巍何巍巍宗門三印三首印空印水印泥炳然字義還迷黃頭大士不識敢問誰得親提印泥印空印水匝地寒濤競起其中無限麟龍幾處爭求出觜印水印泥印空衲子不辨西東撥開向上一竅千聖齊立下風革轍二門四首劫火曾洞然木人淚先落可憐傅大士處處失樓問德雲間古錐幾下妙峯頂喚他癡聖人擔雪共填井祖佛未生前巳震塗毒鼓如今誰樂聞請試分回互宛轉復宛轉真金休百鍊喪却毗耶離無人解看箭擬弋者慕翠羽立髙枝危巢對落輝碧潭千萬丈直下取魚歸透法身句二首潦倒雲門泛鐵船江南江北競頭看可憐無限垂鈎者隨例茫茫失釣竿一葉飄空便見秋法身須透閙啾啾明年更有新條在惱亂春風卒未休靈隱小參六合茫茫競不知靈山經夏是便冝虛堂夜靜無餘事留得禪僧立片時因雪示衆清光欹月不相饒堆積虛庭卒未消為瑞為祥也難得不知誰解立齊腰袐魔巖把斷重津過者難擎扠須信髑髏乾藿山到後知端的同死同生未足觀保福四謾人竿木隨身老作家逢埸作戲更難加謾人謾我無人會水長船髙眼裏沙靈雲和尚夲無迷悟數如麻獨許靈雲是作家借問遍參諸祖客不知何處見桃花僧問緣生義義列緣生笑未聞孰呈布鼓向雷門金剛鐵劵諸方問報道三千海嶽昏名實無當玉轉珠回祖佛言精通猶是汚心田老盧只解長春米何得黃梅萬古傳迷悟相返霏霏梅雨灑危層五月山房冷似冰莫謂乾坤乖大信未明心地是炎蒸道貴如愚雨過雲凝曉半開數峯如畫碧崔嵬空生不解巖中坐惹得天花動地來大功不宰牛頭峯頂鎖重雲獨坐寥寥寄此身百鳥不來春又過不知誰是到庵人晦迹自貽圗畫當年愛洞庭波心七十二峯青如今髙卧思前事添得盧公倚石屏五老師子踞地磐空勢未休爪牙何必競時流天教生在千峯上不得雲擎也出頭與時寡合居士門髙謁未期間隈巖石且相冝太湖三萬六千頃月在清波説向誰冝謙山主赴鄞城命休向千峯過好時白雲髙卧趣還卑塗中無限未歸客不待相依更待誰庭前柏樹子二首七百甲子老禪和安貼家邦苦是他人問西來指庭柏却令天下動干戈千聖靈機不易親龍生龍子莫因循趙州奪得連城璧秦主相如揔喪身贈琴僧太古清音發指端月當松頂夜堂寒悲風流水多嗚咽不聽希聲不用彈送僧帆挂澄江雨霽時緑鋪春岸草離離定乾坤句輕相送逢著知音舉向伊送僧之婺城二首孤雲徒自類行蹤髙指金華思不窮日暮輕帆映秋色沙禽啼斷一江風婺溪煙景稱生涯輕泛蘭舟意未賖八詠淸風好相繼碧雲流本是詩家送文用庵主歸舊隱太白峯前舊隱基杉松寒翠滴無時經年拋却又歸去再聽巖猿只自知送顯沖禪者之霅上覲兄著作選佛選官應在我難兄難弟不唯他汀花岸草芳菲日逺逺清風爭奈何送寶月禪者之天台春風吹斷海山雲别夜寥寥絶四鄰月在石橋更無月不知誰是月邊人玄沙和尚本是釣魚船上客偶除鬚髮著袈裟祖佛位中留不得夜來依舊宿蘆花偶作拾翠尋芳烈夜燈蘆芽穿滕笑無能飛泉冷淡與誰聽空落斷崖千萬層送僧路歧長草帶青青雲片相兼野思生多謝春風莫吹散等間為蓋贈君行送純禪者莎蘿雨滴蒼苔痕前峯後峯啼斷猿携笻别我下層翠何處靜敲仁者門和頏書記見寄古松吟繞石磷磷湯惠休辭豈易聞紅葉寫成藏不得暮風吹斷碧溪雲送允誠禪者飛泉列岫壓窮野冷碧寒青光鬪射片雲片石何太髙為誰留在長松下送僧古藤枝寒索索方倚靠又拈却海闊天遙非等間風前曾共孤雲約送清禪者瘦藤春雲深天涯去無侣時笑野泉聲似共流鶯語落落風規今古情相逢會有知音舉辭于袐丞永夜濳思稿木身蓬仙門館漸經旬雖干清政為髙客爭奈白雲無主人巖瀉瀑泉機未息雨零寒葉夢猶頻此時賢宰容歸去古像焚檀祝有因送僧涼飈新葉墜巖隂禪起髙秋别翠岑孤月冷光清有興斷雲間影合無心瓶分吳浪情何極鉢化膺門道更深好是却回舊房日倚欄同看橘鋪金往復無間十二首平旦寅眹兆之前巳喪真老胡鶴樹慚開口猶舉雙趺誑後人日出卯萬國香花競頭走邯鄲學步笑傍觀豈知凶禍逐其後食時辰大嚮那堪列主賔維摩香飯夲非設怪他鶖鷺獨生瞋禺中巳荆棘園林遍大地南北東西卒未休金剛熖復從何起日南午寥廓騰輝示天鼓鬱頭藍巳定全身何假周行誇七步日昳未碧眼胡來欺漢地九年計較不能成剛有癡人求斷臂晡時申急急逃生路上人草鞋踏盡家鄉逺頂罩燒鍾一萬斤日入酉室內覆盆且依舊塵塵彼彼丈夫兒井中之物同哮吼黃昏戍寰中不礙平人出瓦礫光生珠玉間將軍豈用驅邊卒人定亥六合茫茫誰不在長空有月自尋常霧起雲騰也竒怪半夜子樵唱漁歌聲未巳雨花徒説問空生髙枕千門睡方美雞鳴丑貴賤尊卑各相守忙者忙兮間者間古今休論自長久送僧巖泉髙鎖黃金宅衲卷秋雲古標格離歌誰贈欲行人遍界同為一宿客春色依依日杲杲南北東西好看好閙市拶笑嬌尸迦草頭靑點俱胝老阿呵呵人間天上不知他糲竭節有頂門眼歸去淸風拂薜蘿寄李都尉水月拈來作者殊東西南北謾區區也知金粟李居士瑞坐重城笑老盧咄寄池陽曾學士山萬重兮水萬枝堆靑流碧冷便冝算來免得生遙恨不在詩情在祖師寄四明使君沈祠部二首露冕民謡物物成江山千里古風清曹溪客是無機者日在深雲聽頌聲蒼蒼德也亦如斯政化全歸副倚毗十萬人家寫春色不知誰解立生祠寄內侍太保二首千尺巖泉噴冷聲草堂雲淡竹風清蒲團時倚無他事永日寥寥謝太平蘿龕蘚室狎猿猱忽捧綸言挂紫𫀆恩大不知何以報五雲天上望空勞寄曹都護故國休言萬里程為官為釋且分明道存不必曾傾蓋俱有清風匝地生送僧虎角深藏不待時全機曾許雪林知如今百越拈來也草偃風行是信旗寄靈隱惠明禪師二首千峯影裏葉初凋極望還將慰寂寥也謂毫端不相隔秋雲秋水奈遙遙海嶠生片雲有時忽如蓋不挂飛來峯悠悠擬何待送益書記之霅水白蘋汀是舊家鄉歸興蘭舟泛渺茫日暮沙禽啼欲斷不知誰在碧雲房慶元府雪竇明覺大師祖英集上慶元府雪竇明覺大師祖英集下三寶讚并序豫天禧中寓迹靈隱與寶真禪者為友或遊或處固以道義相揖投報相襲泠泠然自樂天常之性也一日真公謂豫曰愚近偶作三寶讚三十韻冝請賡唱因披閲加歎率爾而繼之類蝕木也俄屬分飛吳楚將二十載殊不復記憶真公不以事曠誠隔逺逺附僧如衍而至再窺荒斐愧慰多集且夫聖人之立言也必眹虛必冥奧使文外之士同振古風垂千萬丗又焉知來者及之不及道在其中也斯之贊辭曾不沽不待但遐仰覺皇宗致禪徒告而行之得不曲為序引佛寶甘蔗流苗應剎塵覺埸髙發利生因紫金蓮捧千輪足白玉毫飛萬德身孤立大方資定惠等觀含類捨怨親挨星相好中天主匝地名聞出丗人螺髮右旋仙島碧月眉斜印海門新鸞翔鳯舞非殊品象轉龍蟠絶比倫瓔珞聚中騰瑞色花鬘影裏奪芳春慈儀戀望知何極𣑽德言辭莫可陳胸字杳分無量義頂珠常照百由旬雙林孰謂歸圎寂坐斷乾坤日見真法寶後得智生功德聚大悲留演潤禽魚貫花雖自科千品標月還歸理一如過量劫應期廣布剎那心合未忘書四衢道內拋紅熖五欲波中綻白蕖排斥衆魔登壽域引携諸子上安車義天星象熒熒也辭海波瀾浩浩歟違背此恩難拯拔遭逢末丗豈躊躇聞來半偈須相斆惜去全身莫共居飛辨恨曾虧激問頥幽欣且免長噓生生頂奉輝心鏡廓照塵勞信有餘僧寶方袍圎頂義何宣續熖千燈豈小緣花雨座前猶滯相虎馴庵畔尚稽詮巖栖冢宿難依望鶴貌雲心迥灑然寶杖夜鳴寒嶠月銅瓶秋漱碧潭煙名標練若澄喧猾迹念昏衢警睡眠林下雅為方外客人間堪作火中蓮情髙不是超三際道在非同入四禪浮丗勉誰知逝水深峯甘自聽飛泉苾芻草馥僧祇後玳瑁盂傳古佛先珍重覺皇有真子坤維髙步列金田夏寄辨禪者山房枕簟雲作屏必固黃金宅軒窗月為晝豈止虛生白麟龍愧頭角雕鶚慙羽翮庶擬羣類心在寬如在窄和錢太博見寄覔山藥二首文柄誰持合自持憂民風槩乍清羸禪林草藥如為效願見皇家急詔時聖君鴻業在扶持日角龍章固不羸摛藻玉堂歸未晚百花開赴御筵時送錢太博應賢良選賢才當召試彪炳對吾君千古不遺恨八元應主文岸花明列斾天籟拂微雲後夜觀垂象中台位巳分答天童新和尚中峯深且寒欹接海邊島松凋不死枝花坼未萌草飛瀑吼咬宫幽徑分鳥道伊余空寂徒浮光寄枯稿冥遊天地間誰兮可尋討孤立雲霞外誰兮可長保兹來仁者來還稱太白老荷䇿扣巖扄重席展懷抱示我商頌清休誇郢歌好報投慙抒辭難以論嘉藻和頌珍瓏巖古寺冠乎明越境海眼通洌泉天心聳危嶺嘗遊興未闌遐想神忽凝彼士真覺雄相鄰不孤迥吾愛濟橫流孰云煩慮屏吾愛整頽綱豈止浮根靜棲梧瑞九包追風駿十影顧我不爭衡與誰間鬪茗乘時既磊落照丗非昏暝佇為王者師三千統摩頂贈别太臻禪者武陵山水何袐邃元化功兮不容易壇曾善卷韜龍光洞亦桃花副麟趾仍思昔日吾祖浩浩提綱宗消息曠斷寰字空又聞髙大舜讓公器祥瑞却生蘆葦叢人由境兮冥道德境有人兮分玉石臻禪夲自偃殊方忽向其中誕孤迹迢迢海甸來尋我一十二年同冷坐羽翼博風今是時拂盡天雲乃飛過雲門俱字百草頭何太極重與禪徒下錐刺雲門俱字好參詳雪峯輥毬亦端的黛非靑兮藍一色辰錦砂兮敢言赤紫羅帳裏有真珠曹溪路上生荆棘還會麼此時若不究根源直向當來問彌勒僧問四賔主因而有頌頌之如何是賔中賔云滿面埃塵又曰噫頌賔中之賔少喜多瞋丈夫壯志當付何人如何是賔中主云兆分其五又曰引頌賔中之主玄沙猛虎半合半開唯自相許如何是主中賔云月帶重輪又曰收頌主中之賔溫故知新互換相照師子嚬呻如何是主中主云大千揑聚又曰揭頌主中之主正令齊舉長劒倚天誰敢當禦都頌賔主分不分顢頇絶異聞解布勞生手寄言來白雲令僧把衲七八既難直須教透來不在前去不在後粗細自看緊緩相就一日圎成呈似君想得諸方未知有送知一入京兼簡清河從事六月千江水似秋片帆髙挂岸雲收行行莫謂朝天闕況倚文星在巨舟送德珉山主溪山春色映雲𫀆愛住隍城意轉髙翻笑忘機自安者不能垂手入塵勞送僧二首紅芍藥邊方舞蝶碧梧桐裏正啼鶯離亭不折依依柳況有春山送又迎祖域髙親日未央家林歸去意何長舊交不識初相見曾振滄溟奪夜光送崇巳闍梨歸天台石橋雲瀑冷相侵蘚徑蘿龕入更深却羡搘笻逺歸去半千尊者是知音送邃悟上人之會稽百越江山冠九州如屏還愧謾相褒惠休此去多吟賞嬴得淸風價轉髙送僧四首乘興飛帆别翠峯水光春靜冷涵空到人若問曹溪意秖報盧能在下風禪石飛流濺碧莎利生還喜下雲坡途中若立三千客剔起眉毛不在多栴檀林裏振金毛四顧清風拂幾遭曾許全威作雲雨不知何處是塵勞雲衣輕拂下層巒松檜生風觸袖寒誰問親遊乳峯意百千年後與誰看寄貟外黃君碧岫層層列杳冥漣漪環繞賁寒青韜藏未識古君子空仰嘉聲過洞庭送僧五色祥麟白月輪乘時應不念離群松根石上未歸日誰看暮山飛斷雲寄劉秀才逺逺飛來一幅書愈風誠重復何如相逢相見未期日目斷千山插太虛送僧古之别今之别目對春江倚寥泬三樹兩樹啼斷猿千峯萬峯落殘雪花濛濛雨濛濛坤維步步生清風聞百舌鳥送僧曾來芳樹幾回飛煙靄初晴又見伊巧語向人莫相笑知音知後更誰知送中座主入廣舶主船中寄惠持雲霞無迹共依依海山見説多嘉賞莫便因循忘却歸送隴西秀才入京國器難藏孰可知携來書劒莫遲遲明年桂籍登文陳奪取龍頭更是誰送僧雪殘春島路迢迢水靜雲開見碧霄别後誰同此深意秖應孤月共寥寥因仰山氣毬頌四大假合非虛妄儱儱侗侗為二相東西南北不相知留與衲僧作榜樣赴翠峯請别靈隱禪師臨行情緒懶開言提唱宗乘亦是間珍重導師并海衆不勝依戀向靈山送僧歸閩雪老當年曾入嶺真禪今日又思鄉孤帆隱隱曾唯我月照夜濤空渺茫送僧春風花正飛紅霞碧靄籠髙低越山日暮少林客應聽子規深夜啼寄陳恱秀才水中得火旨何深握草由來不是金莫道莊生解齊物幾人窮極到無心寄錢唐觀音朋山主逺念依依闕附書還同秋水淡相於沖雲況是曾無定幾掩寒蟾出太虛送僧極目春光水照空岸莎汀草碧茸茸三千里外生靈望獨倚寒藤振祖風春日示衆二首門外春將半間花處處開山童不用折幽鳥自銜來門外春將半間花處處開山童曾折後幽鳥不銜來寄烏龍長老雪帶煙雲冷不開相思無復上髙臺江山況是數千里只聽嘉聲動地來寄太平端和尚千朵危峯杳靄間石房長帶瀑聲寒鳥啼花發尋常事松本靑靑雪裏看送僧千峯雨雪時别我情何極不知天地間更有誰相識因官人請升座曉天雲靜冷涵霜滿檻風清敵夜光莫謂座間人不識孤明孤影射虛堂因金鵝和尚語藥病藥病相治見最難百重關鎖太無端金鵝道者來相訪學海波瀾一夜乾賦沖雲鷂送僧側翼雄飛天勢闊電閃星流太輕脫南北東西相對看千里萬里阿喇喇風幡競辨二首不是幡兮不是風衲僧於此作流通渡河用筏尋常事南山燒炭北山紅不是風幡何處著新開作者曾拈却如今懵憧癡禪和謾道玄玄為獨腳漁父春光冉冉岸煙輕水靣無風釣艇橫千尺絲輪在方寸不知何處得鯤鯨牧童嘔阿唱與那嗚咿百草拈來鬪不知日晚騎牛未歸去指前坡笑又噓􅐵送僧嵓房髙下拆寒梅極目寥寥鴈影回相别相逢竟何事一聲江上發春雷寄天童凝和尚經旬抱疾阻春霖莎砌重重蘚暈侵曾約偕遊未能得暮山空鎖碧雲深送僧入城雲籠碧嶂月籠臺此去城中早晚回不為佛光謁韓愈問君何事出山來病中寄諸化主雪裏梅花見早春東西南北路行人不知何處圎蟾夜同念山頭老病身和于袐丞見召之什二首民瘼求來吏放間萬家深夜啓重關齋中既是淸涼國應笑支公别買山垂垂甘自養衰殘度歲無人到竹關何幸文星枉嘉什殷勤相喚出層山和王殿直見寄二首華野非殊古所難得安間處未為安天方無外誰相到空笑重雲鎖碧巒清風凛凛字人官堪對彌天釋道安不日歸朝狎鴛鷺也須音問寄層巒送僧澄江依棹碧光流風冷蒹葭雨乍收别夜新吟許誰約白蘋汀上月陵秋送僧歸永嘉韶石曾披此性靈三年孤與急流爭永嘉舊隱今歸去堪聽海濤中夜聲兔角拄杖少室傳來兔角杖千聖護持為頂相虎踞龍蟠勢未休雲影山形冷相向有時間倚在虛堂寥寥匝地凝秋霜有時大作師子吼德嶠臨際何茫茫今日提來還不惜分明普示諸知識解拈天下任橫行髙振風規有何極送從吉禪者君不見行路難亦容易握草為金不為貴難曾平地湧波瀾易復到處列祥瑞堪笑堪悲能幾幾天上人間立髙䡄兄弟十字越參星一義同心淡秋水因憶韶陽古風骨石火雷光遲出沒隔身之句是程途扣門之問非窠窟殷勤報君君記取方外周遊看爪距虎狼叢不遇知音剔起眉毛便歸去寄承天長老道義相資復是誰巖房深夜思遲遲海山雲靜見孤月髙照婺城人不知送僧古路枝分列洲渚綱兮領兮若為舉病眼方開忽送人落花驚斷山禽語親禪客親禪客行復行獨步坤維消此情送因大師瘦藤清對紫方𫀆間步坤維意轉髙若到愼江人借問金輪王子是吾曹送實師弟天倫曾重意難分爭奈孤蹤若斷雲去去休同亮禪者西山一入杳無聞送新茶二首元化功深陸羽知雨前微露見鎗旗收來獻佛餘堪惜不寄詩家復寄誰乘春雀舌占髙名龍麝相資笑解醒莫訝山家少為送鄭都官謂草中英賦月生雲際送誠監寺皎潔離雲鶴夢時孤光還與雪相冝金盂後夜重垂影拂盡天風不自知送僧之金華兼簡周屯田瘦藤輕屨蘚衣并路過危峯截杳冥若到金華拂雲霧不應容易見文星送僧之永嘉故國不是阻天涯花木光中見獨歸蜃水鄞江人莫問月分春浪冷依依寄送疑長老德不孤兮必有鄰四明留住是因循如今髙步錢塘境只許靈山箇老人放白鷴朱冠青戢雪為毛不近鸞凰意亦髙放你雲林莫回首如今何處是仙曹喜禪人回山别我遊方意未論瓶盂還喜到雲根舊巖房有安禪石再折松枝拂蘚痕送僧七尺巖藤握便行舊山歸去幾多程相逢忽問迢迢意應發春雷動地聲送僧歸天童峩峩太白峯倚翠列霄岸羡君乘興歸憑欄與誰看和曾推官示嘉遁之什少微星出古風還匝地聲光不掩關三館峻遷同陌路九華髙卧是蓬山巖莎步入祥麟穩海樹飛來白鳯間秖恐致君休未得蒲輪重到薜蘿間經古堰偶作出城四十里古堰若天外飛棹淸淺中孤影自相對謝張太保見訪老病還同葉半凋經旬門掩夜蕭蕭海城都護曾垂訪一片淸風慰寂寥送宗朴禪者洞庭乳竇皆泉石抱疾何緣寄幽迹曾列狂機一二三東山西嶺非相識屈指嚬眉不可尋雲飛雨散空沉沉如今轉覺流年隔強把冥悰苦搜索縱止言欺白雪辭寧忘笑與黃梅客朴禪者朴禪者珠月有光慙照夜送尚辭浮圗之子履道為貴天兮地兮何泰何否動無飾非靜還雕偽辭也云行後生可畏歌寄留英禪德當時臨際辭黃蘗或指河南或河北英禪此日下中峯機案曾焚笑仍則九包一角慙稱瑞導月觀星亦非意爭似韶陽振古風半途未肯還希冀歸去來歸去來飛泉浩浩聲如雷送小師元賁愧爾求師為吾弟子學雖無聞道亦可擬平飛辨月照復流水斯意斯言兮如不忘行行兮步蘭芷善應殊宗吾不知也思之送文佶歸廬嶽春色未深興無遲早瓶謝九江峯尋五老到日攀蘿獨上時依依莫忘海山腦送侃禪者之丹丘石橋多古迹路嶮少人過如同白日間冷拂青苔坐寒老若相逢為吾略嘲破送實山主野水春山風光極目千里萬里太遲太速絶域澄澄兮非犀炬可照希聲杳杳兮非鳯膠可續葉落花開知不知人天景行為髙躅示衆丫角女子白頭絲報你諸方作者知借問住山何境界春風春鳥喧喧翠峯不能助發心印却是他傳和范監簿吏散簾垂思莫窮山光溪影恣相容誰誇靖節偏栽桞自笑隱居髙聽松丹闕尚遙芝檢密訟庭間列蘚花重巖間野客雖多病終再携笻謁士龍又品彚不自適善政還可尋縣樓清夜上島月思雲侵誰有古菱花照此真宰心因香嚴和尚我有一機禪子須知爍迦羅眼揔是膠黐若人借問伏惟伏惟送雄直歲罷參還欲勘諸方竿木隨身不易當是則俱行非則擒下翻憶古來興化老主賔用盡力牽羊為道日損三分光隂二早過靈臺一點不措磨貪生逐日區區去喚不回頭爭奈何疏古我有面鏡到處懸挂凡聖不來誰上誰下訪俞秀才萬疊雲山未得歸寂寥心許老盧知江城雨雪書名紙不謁鴻儒更謁誰再酬萬卷無書道用歸間文公也未須知倚天長劒如重戰更有龍頭復是誰留暹首座從龍為雨復清間片假依依水石間慙問秋風欲吹散不能留得覆靑山不慙問者為我留之送俞居士歸蜀何處深棲役夢頻靑城拋却數溪雲如今老大歸難得秖寫情懷逺送君和王殿丞櫻粟種之什纎纎圎實占芳春得自侯門勝楚珍開葉開花人不會百千年是等間身和江橋晚望公餘縱目望江山萬化窮來罔象間聞説聖君將下詔未容清淡與僧間病起示衆門掩還同歲月摧石窗經雨積莓苔一牀枕簟淨名老時見斷雲孤月來送麻居士紗帽山儀白苧𫀆逺披孤頂近吾曹携來七尺霜前竹劃斷天雲不放髙酬李校書一回辭我一回吟眷戀巖叢意轉深翻謝霜松不凋落與君同有歲寒心苦熱中懷寄永固山主火雲髙下影相連幾欲披尋恨不前無限清風無處問只應遲步繞林泉送元安禪者群峯杳藹留不住逺道依依秖藤屨舊隱羅龕付與誰寒猿後夜啼髙樹賦病鶴送奉倫禪者欲飛飛未得冷泊杉松枝如何垂天雲逺逺同一涯偶作列岫霽新雨憑欄秖淡交夕陽明逺水秋葉露空巢思極曾無玷神清未動爻秖應千古意誰得共雲拗謝鮑學士惠臘茶叢卉乘春獨讓靈建溪從此振嘉聲使君分賜深深意曾敵禪曹萬慮淸因遊育王亭寄收主郎給事冷翠千萬峯當軒列如黛蒲團及禪板永日淡相對彤雲曾無機燒松亦成蓋逺謝幽隱情難與台星會送遇能禪者湖繞嚴城列象寬萬家臺榭水光寒片帆隱隱生遙極誰問曹溪意轉難送覺海大師秋雲巖葉兩悠悠半逐風馳半水流慿問禪家有何意不知方外若為酬送曾侍禁冷匣秋波射斗星鐵衣隨從古霜清宣池莫問當年事一片威風動地生病起酬如禪德大明一寸光腐草一何假人命呼吸間誠哉是言也呼之曾巳休吸之尚未舍寄問諸苦源來者不來者送雲禪德古之送人言作懷寶我慙老病困乏辭藻熊嶺迢迢兮曾立夜雪謝池依依兮笑生春草頭角麟龍安可論清風步步應相討送久禪德歸蘭亭右軍墨池月照我復照誰千里忽相到中峯多病師送羲大師巖房抱病經一月門有諸生阻來謁長往之期猶未能七十之年更何説若耶溪老忽留語溪上舊遊且歸去春風兮兼斷雲弱栁依依兮帶輕絮古今離恨雖如此動靜於吾亦多意髙握霜笻獨步時音書莫忘逺飛寄酬海宗二侍者二首蓀之得蘭其道匪難扶吾病起如珠在盤一兮二兮自看誰看蘭之得蓀其道必有扶吾病起古風入門二兮一兮且論勿論謝郎給事送建茗陸羽仙經不易誇詩家珍重寄禪家松根石上春光裏瀑水烹來鬪百花送山茶上知府郎給事榖雨前收獻至公不爭春力避芳叢煙開曾入深深塢百萬槍旗在下風送郎侍郎致政歸錢塘帆挂西風别海城二踈千古道相應誰誇冨貴沽時譽自笑經綸作技能殘葉賦題紅片片逺山供望碧層層武林到日符嘉遁髙訪巖扄秖許僧山行逢勤禪德乳巖秋日無他作䇿杖層層止寥廓四顧有誰分野情一點彤雲起深壑蘚石遲遲略輕踞逢箇衲僧忽驟步頻喚回頭不肯回及至回兮眉卓竪阿喇喇千里萬里橫該抹咄送小師元哲老盧之子四三二一將欲振飛卷比叢室松凌霜兮運靑水帶巖兮流急南北東西雲開見日永豐莊新植徑松忽二本鄰偃抒辭紀之雙偃松何似螺文結數遭淸聲雖競發寒影不相髙對客圎分蓋孤禪翠滴𫀆若教圖畫得爭奈有蕭搔送白雲宣長老鄞江秋晚忽成春況有台星作主人去去髙携古刀尺二千年運續芳塵送親禪者萬木帶秋聲古今念睽别我有贈行意臨行為君説重巖休滯雲逺水且觀月生生知不知天風助清徹送顯沖禪者聚散非常凖古今亦標格如何無事人還似未歸客秋風生群林野水資寒色誰兮謝寸隂觀彼青山白沖禪行復行五葉待時拆送天童普和尚迢迢别海涯帆挂抄秋時島樹落寒葉人誰訪祖師浪開遊象急天闊過鴻遲早晚歸林下千徒不共知張秀才下第得第何人愧不平道存顔巷亦為榮應知未喪斯文也且把新詩樂性情寄久監收田中稻熟及時收顆粒圎成免外求一日歸來古巖上白雲紅樹共悠悠暮冬夜坐寄岫禪者碧落無片雲虛庭積深雪負舂還有誰徹曙對孤月巖松影拂翠不斷瀑水聲來聽忽絶岫禪岫禪知也如未知八面淸風逺逺待時説寄崇壽懷長老歌寂住峯兮觸星斗寂住師兮古為道死中得活未輕酬不許夜行投曉到藹藹聲光一百年吾其後兮吾其先振領提綱笑多事掩扉塞路空依然龍朔老盧同兀兀土為貌兮金作骨萬國爭求肯便行我要重新敲鐵佛東西南北休云識枯稿冥冥頗相憶天外清風結陳來狂歌逺寄從拋擲送廷利禪者雷峯孤頂誰家路上兮下兮復何故曽列三千一半徒我今獨滿當時數鯨麟麟龍鱗鱗坤維髙步生清塵休云裴相慕黃蘗額有圎珠七尺身利禪者利禪者倚天長劒應牢把或謂風雲不再來誰為蒼蒼分晝夜送倧禪者涪江怒激鯨鼇宅岌岌三山大傾側冥數俄然一箇來步武群方作禪客振聲謂我分綱宗今兮古兮何忩忩令吾強為抉辭句句句字字凛凛生狂風拂散四七單傳之落葉掃蕩二三直指之流蓬似帶微芒敢未勦絶寒木在握兮全機可笑秋水橫按兮半提可滅使八極頂目者不自爭衡見斯人兮駕御昂枿送鼎禪者落落禪家流携笻卷雲毳别我振辭鋒夜堂消祖偈鼎禪之句霜天飛一鶚目對彈其滯春岸立千峯指也乎其勢行行復行行清飈起蘭蕙觀泉送演禪者雲根漱野泉照空復照月冷聲曾未消飛瀾似相别巖近生風雷天遙新冰雪演禪乘與知不知源流依依共澄潔答忠禪者一字七字三五字萬象窮來不為據夜深月白下滄溟搜得驪珠有多許和陸軫學士夏日見寄良牧歸詩匠雅風消鬱蒸官清難滯爵吏散逺同僧棠樹非煙合仙槎碧浪乘因思窮萬化使君早製圎明鑑圖冠之序引或聞或見令人曠達千古更無能送化主春色依依籠逺樹卷衲搘藤輕屨塵丗茫茫無限人不知誰問曹溪路送通判劉國博黃中為星當二職權化不相饒白屋如多恨清風何處消岸鷗窺列斾天辟看升朝别有生靈意寒枝未變條送别陳袐丞古意悠悠層山雲斷兮仍復續離離雙岸草變兮且兼緑知何苦雪霜後凋蠧松竹松竹有節操雪霜無伎倆敢折歲寒枝贈君作嘉賞行行天地間清風在誰掌送通判學士歸南國楊斾擁帆開照德星天風髙興國風清武夷仙仗知回也各下祥雲到地迎千里之外應之非此則殊待者也和酬郎簽判殿丞向國心存了了身大方無外且同塵江城早晚重相見解笑宗雷十八人歌送范陽盧君兼簡華嚴昱大師范陽居士來鄞水動地仙飈向人起乳峯直上雲霞開步驟天衢到如此茫茫塵丗誰知交當埸問我非相饒禪家畢竟無他事古雪巖前曾未消俄然悵望辭叢室荷負難兮淚深溢逺幸流方且莫論再得從容又何日迢迢故國殊存想冷碧柯山分指掌況有覺雄華藏師歸去百城共遊賞送廣教專使峩峩石頭使乎讓祖巳之匪存聖之奚慕或妄以山或索云斧音耗不通兮清源派分吾斯語兮詎可論古送微文章雙蓮亭上送行客菡蓞清香散秋色野興斷山雲片髙孤影澄江月華白希聲險絶堪誰知大道機存曾未可縱闢天常立下風安教類變叢流火君不見梁兮闔國難滯留千古遺恨空悠悠君又不見魏兮小桂生寒翠一花對雪開無休微禪亦並聮芳駕德星文星仰蕭灑物外情深不等間環中趣别非輕捨相訪從容為我言屈指多求更何者送懷秀禪者麻衣草座思靈徹一食安間更無别倐忽遷流數百年杳杳誰來繼其絶吾兮亦是踈慵輩冷淡身心存慷愷偶續靈峯照夜燈遽泛鐵船下滄海深嗟知困不知休奔馳駭浪空淹留縱得長鼇擬何待堪白頭時好白頭因觀壞衲秀禪客清苦如冰復如蘗别我携笻步大方為葉為花恣披拆伏枕寥寥情意闌率寫狂歌贈行色孤運銘雲根石壙容身待老南來北來間且尋討五葉一花兮堪對誰寥寥萬古兮空知有寄海會之長老百花開後一花開風遞清香逺逺來誰問黃梅不平事照中依舊惹塵埃雜言送賢專使使乎誰老作者百戰埸中飛鐵馬秋水藏來人不知笑李將軍𬒳擒下阿呵呵却歸湖山唱凱歌歌紀四明汪君信士古君子兮道諸巳道器用兮合天理同塵還若待時生觀象不知何處起荆叢叢襲莪叢叢孝兮悌兮非沚中聚應落落滴仙露散或冷泠揚士風風之上兮風之下近一指兮逺一馬秋水淡交無限情夜光照乘胡為者伊豫匪謂存餘力詠髙義兮困胸臆巴歌百字巖葉書飛寄汪門舊知識送仲卿禪德髙兮竺卿秋水虛明夫何之象堪云指程知吾不知笑理出情謂冝撫掌爾伽耶城真州資福禪院新鑄鐘銘并序國朝紫微舍人趙公丙戌年出鎮姑蘇裁情示空巖之客所恨不能效善財展轉南方以求先覺如别幅敘雲嶽長老令僧惠敏造鍾既成創重樓以􅶅之欲為銘記且言當使學者有所警悟槩也縱能道其歸禪人惡肯信惟師為善知識行重名當代願為此銘因機垂化不亦美乎然重顯固陋荷大君子外獎敢不從命輒復引寄夫形聲未先曠默奚準器用之後幽靈絶常故聖人以鍾為大惟聖人則之襲兮忘兮求以深矣其能具諸種智對飛雄辨但未兼極有生權化之來未易窮也感通傳稱昔拘留孫於乾竺造青石鍾如青玉色可容十斛頂類諸天腹陷衆寶八角四面花光互分有化如來與日偕出明宣袐演或聞不聞王舍城中大千界內匪同錚錚者乎今嶽禪老於淮甸造青銅鍾如青珠色過百鈞之用上旋旁植繞獸蹲熊其或層城晝間祇園夜永寥寥霜月射寒影以爭輝殷殷地雷發虛音而交振師之唱險資之繼難寅夕鏗鏗主伴索索足使一鱗半甲無違真化之方二聽五觀有寄神遊之域善存殊應扣惟良哉謹為銘曰淮之要衝真之會府中列梵居我禪祖參徒駢羅慧敏干櫓爰構鯨音息彼輪苦峻橫崇臺金飛碧回斯門屢掩向人或開希兮微兮乍延乍催先聞未及後時不來增悲遐宣無困天理帶識萬端警悟齊起遵晦陟明其母得子塵塵訪誰剎剎問已大緣斯成大功不宰君奉禹湯臣仰元凱碑勒紺園銘寡文彩庶期妙峯永聳滄海四明洪舉刋慶元府雪竇明覺大師祖英集下跋四庫著録祖英集二卷提要稱重顯字隱之遂州李氏子幼依普安院僧仁銑落髮後至靈隱峯晚住明州雪竇皇祐四年卒事迹詳僧寶傳云云與呂夏鄉明覺大師塔銘合塔銘謂其弟子相與裒記提唱語詩頌為洞庭語録雪竇開堂録瀑泉集祖英集頌古集拈古集雪竇後録凡七集今均見於日本大正新修大藏經諸宗部中此為宋四明洪舉所刊都凡四集曰頌古曰拈古曰瀑泉曰祖英字畫方徑雅近歐顔序連正文猶存舊式廓字闕筆當為寧宗後刻本昔年涵芬樓儲有元至正刊頌古集曾取以校勘異同惜未録成遽罹劫火拈古集前有允誠序瀑泉集首載明州軍州官請住雪竇疏蘇州在城檀越請住翠峰疏蘇州僧正並諸名員疏三首大正藏均已刪削非宋刊舊第矣祖英集傳世亦希惟宜秋館李氏刊入宋人集中乃録自文津閣者李氏跋稱常熟鐵琴銅劍樓今尚儲有宋槧四集原本倘能移録合刊以成全璧為快當何如耶茲承瞿氏通假之惠四集完備影印流通向日李氏所願欲而不遂者今遹觀厥成矣民國二十有三年十月崑山胡文楷
